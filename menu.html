<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>圖文選單編輯器</title>
    <!-- Version: 2026.04.18.V125_Syntax_Error_Fix -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="bg-slate-100 flex h-screen overflow-hidden text-slate-800">

    <!-- 左側儀錶板 -->
    <aside id="sidebar" class="w-[360px] shrink-0 bg-white border-r border-slate-200 h-full flex flex-col relative z-40">
        <div class="px-5 py-4 border-b border-slate-200 flex justify-between items-center">
            <h2 class="font-bold text-slate-800 text-[18px]">圖文選單編輯器</h2>
        </div>
        
        <div class="flex-1 overflow-y-auto">
            <div class="p-5 space-y-5 border-b border-slate-200">
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">1. 載入底圖 (JPG/PNG)</label>
                    <input type="file" id="image-upload" accept="image/jpeg, image/png" class="hidden">
                    <button onclick="document.getElementById('image-upload').click()" class="w-full py-3 bg-blue-50 text-blue-600 border border-blue-200 hover:bg-blue-100 rounded-xl font-bold flex items-center justify-center gap-2">上傳底圖</button>
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-1">2. 選單名稱</label>
                    <input type="text" id="save-filename" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm" value="New Rich Menu">
                </div>
            </div>
            <div id="editor-ui" class="p-5 space-y-4"></div>
        </div>

        <div class="p-5 bg-white border-t border-slate-200 shrink-0">
            <textarea id="json-output" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-xs font-mono h-24 bg-slate-50 resize-none" readonly></textarea>
        </div>
    </aside>

    <!-- 畫布區 -->
    <main class="flex-1 flex flex-col h-full bg-slate-50 overflow-y-auto">
        <div class="bg-white/90 border-b border-gray-200 w-full py-3 flex justify-between items-center px-6 sticky top-0 z-30 shadow-sm">
            <button onclick="MenuModule.toggleDrawMode()" id="menu-draw-btn" class="px-8 py-2.5 rounded-md text-sm font-bold bg-slate-800 text-white">開始劃定區域</button>
            <div class="flex gap-2">
                <button onclick="StorageModule.toggleDrawer()" class="px-6 py-2.5 rounded-md text-sm font-bold text-orange-600 bg-orange-50 border border-orange-200 shadow-sm">雲端檔案庫</button>
                <button onclick="MenuModule.openDeployModal()" class="px-6 py-2.5 rounded-md text-sm font-bold text-white bg-indigo-600 shadow-sm">部署至 LINE</button>
            </div>
        </div>

        <div class="p-10 flex flex-col items-center min-h-[800px]">
            <div id="menu-canvas-container" class="bg-white p-4 rounded-xl shadow-2xl border border-gray-200 relative">
                <canvas id="menu-canvas"></canvas>
            </div>
        </div>
    </main>

    <!-- 雲端檔案庫抽屜 -->
    <div id="right-drawer-overlay" onclick="StorageModule.toggleDrawer()" class="hidden fixed inset-0 bg-slate-800/20 z-40 backdrop-blur-sm"></div>
    <aside id="right-drawer" class="fixed right-0 top-0 h-full w-[360px] bg-white shadow-2xl translate-x-full transition-transform duration-300 z-50 flex flex-col border-l border-slate-200">
        <div class="px-6 py-5 border-b border-slate-200 flex justify-between items-center bg-white">
            <h2 class="font-bold text-slate-800 text-lg">雲端選單檔案庫</h2>
            <button onclick="StorageModule.toggleDrawer()" class="text-slate-400 p-2"><i class="fas fa-times"></i></button>
        </div>
        <div class="p-6 border-b" id="drawer-action-area"></div>
        <div class="flex-1 overflow-y-auto p-5 space-y-4 bg-slate-50" id="saved-files-list"></div>
    </aside>

    <!-- 部署 Modal -->
    <div id="deploy-modal" class="hidden fixed inset-0 bg-black/60 z-[100] flex items-center justify-center backdrop-blur-sm">
        <div class="bg-white rounded-2xl shadow-2xl w-[90%] max-w-lg p-6">
            <h3 class="font-bold text-lg mb-4">確認部署</h3>
            <p class="text-sm text-slate-500 mb-6">這將會覆蓋 LINE 官方帳號目前的預設圖文選單。確定執行？</p>
            <div class="flex justify-end gap-3">
                <button onclick="MenuModule.closeDeployModal()" class="px-6 py-2.5 rounded-lg text-sm font-bold text-slate-500 bg-slate-100">取消</button>
                <button id="deploy-submit-btn" onclick="MenuModule.executeDeploy()" class="px-8 py-2.5 rounded-lg text-sm font-bold text-white bg-indigo-600 shadow-md">確認部署</button>
            </div>
        </div>
    </div>

    <script>
        // 通訊輔助
        const ApiHelper = {
            getWorkerUrl: () => (window.parent && window.parent.WORKER_URL) ? window.parent.WORKER_URL : 'https://action.fangwl591021.workers.dev/',
            call: async (act, pl = {}) => {
                try {
                    const res = await fetch(ApiHelper.getWorkerUrl(), {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ action: act, payload: pl })
                    });
                    const json = await res.json();
                    if (json.status !== 'success') throw new Error(json.message || '異常');
                    return json.data;
                } catch (e) { alert(e.message); return null; }
            }
        };

        window.MenuModule = (function() {
            var canvas, isDrawingMode = false, isMouseDown = false, currentRect, startX, startY;
            var currentImgHeight = 843;
            var savedBase64Image = null;

            return {
                init: function() {
                    canvas = new fabric.Canvas('menu-canvas', { selection: true });
                    this.bindEvents();
                    document.getElementById('image-upload').addEventListener('change', (e) => {
                        const file = e.target.files[0]; if (!file) return;
                        const reader = new FileReader();
                        reader.onload = (f) => this.load(file.name, "{}", f.target.result);
                        reader.readAsDataURL(file);
                    });
                },
                getCurrentBase64: () => savedBase64Image,
                load: function(name, jsonStr, base64) {
                    savedBase64Image = base64;
                    var data = {}; try { data = JSON.parse(decodeURIComponent(jsonStr)); } catch(e) {}
                    var tempImg = new Image();
                    tempImg.onload = () => {
                        var ratio = tempImg.height / tempImg.width;
                        currentImgHeight = Math.round(2500 * ratio);
                        canvas.setWidth(600); canvas.setHeight(600 * ratio);
                        fabric.Image.fromURL(base64, (img) => {
                            canvas.setBackgroundImage(img, canvas.renderAll.bind(canvas), { scaleX: 600 / img.width, scaleY: (600 * ratio) / img.height });
                            this.importAreas(data.areas || [], 600 / 2500);
                        });
                    };
                    tempImg.src = base64;
                },
                bindEvents: function() {
                    canvas.on('mouse:down', (o) => {
                        if (!isDrawingMode || canvas.findTarget(o.e)) return;
                        isMouseDown = true; var pointer = canvas.getPointer(o.e); startX = pointer.x; startY = pointer.y;
                        currentRect = new fabric.Rect({ left: startX, top: startY, width: 0, height: 0, fill: 'rgba(84, 192, 97, 0.3)', stroke: '#06C755', strokeWidth: 1 });
                        currentRect.action = { type: 'uri', uri: 'https://' };
                        canvas.add(currentRect);
                    });
                    canvas.on('mouse:move', (o) => {
                        if (!isMouseDown) return;
                        var pointer = canvas.getPointer(o.e);
                        currentRect.set({ left: Math.min(startX, pointer.x), top: Math.min(startY, pointer.y), width: Math.abs(startX - pointer.x), height: Math.abs(startY - pointer.y) });
                        canvas.renderAll();
                    });
                    canvas.on('mouse:up', () => {
                        if (!isMouseDown) return;
                        isMouseDown = false; isDrawingMode = false;
                        document.getElementById('menu-draw-btn').innerText = '開始劃定區域';
                        this.updateOutput();
                    });
                    canvas.on('object:modified', () => this.updateOutput());
                },
                toggleDrawMode: function() { isDrawingMode = true; document.getElementById('menu-draw-btn').innerText = '請在畫布上拖曳...'; },
                updateOutput: function() {
                    var scale = 2500 / canvas.getWidth();
                    var areas = canvas.getObjects('rect').map(o => ({
                        bounds: { x: Math.round(o.left * scale), y: Math.round(o.top * scale), width: Math.round(o.getScaledWidth() * scale), height: Math.round(o.getScaledHeight() * scale) },
                        action: o.action
                    }));
                    var result = { size: { width: 2500, height: currentImgHeight }, selected: true, name: document.getElementById('save-filename').value, chatBarText: "選單", areas: areas };
                    document.getElementById('json-output').value = JSON.stringify(result, null, 2);
                    this.renderAreaEditor(areas);
                },
                renderAreaEditor: function(areas) {
                    var container = document.getElementById('editor-ui'); container.innerHTML = '';
                    areas.forEach((a, idx) => {
                        var div = document.createElement('div'); div.className = "p-4 bg-slate-50 border rounded-lg";
                        div.innerHTML = `<div class='font-bold mb-2'>區域 #${idx+1}</div><input class='w-full border p-2 text-xs font-mono' value='${a.action.uri || ""}' oninput='MenuModule.updateAreaProp(${idx}, "uri", this.value)'>`;
                        container.appendChild(div);
                    });
                },
                updateAreaProp: function(idx, prop, val) {
                    var objects = canvas.getObjects('rect'); if(objects[idx]) { objects[idx].action[prop] = val; this.updateOutput(); }
                },
                importAreas: function(areas, scale) {
                    canvas.getObjects('rect').forEach(o => canvas.remove(o));
                    areas.forEach(a => {
                        var r = new fabric.Rect({ left: a.bounds.x * scale, top: a.bounds.y * scale, width: a.bounds.width * scale, height: a.bounds.height * scale, fill: 'rgba(84, 192, 97, 0.3)', stroke: '#06C755', strokeWidth: 1 });
                        r.action = a.action; canvas.add(r);
                    });
                    canvas.renderAll(); this.updateOutput();
                },
                openDeployModal: () => document.getElementById('deploy-modal').classList.remove('hidden'),
                closeDeployModal: () => document.getElementById('deploy-modal').classList.add('hidden'),
                executeDeploy: async function() {
                    const richMenuObj = JSON.parse(document.getElementById('json-output').value);
                    const data = await ApiHelper.call('DEPLOY_RICH_MENU', { richMenuObj: richMenuObj, imageBase64: savedBase64Image });
                    if(data) alert('部署完成'); this.closeDeployModal();
                }
            };
        })();

        // 雲端儲存模組：採用索引加載法避開語法錯誤
        window.StorageModule = (function() {
            let currentFileId = null;
            let cloudFiles = []; // 暫存區

            return {
                toggleDrawer: function() {
                    const drawer = document.getElementById('right-drawer');
                    const overlay = document.getElementById('right-drawer-overlay');
                    if (drawer.classList.contains('translate-x-full')) {
                        drawer.classList.remove('translate-x-full');
                        overlay.classList.remove('hidden');
                        this.loadList();
                    } else {
                        drawer.classList.add('translate-x-full');
                        overlay.classList.add('hidden');
                    }
                },
                loadList: async function() {
                    const container = document.getElementById('saved-files-list');
                    container.innerHTML = '<div class="p-10 text-center">正在同步雲端...</div>';
                    const data = await ApiHelper.call('ADMIN_GET_RICH_MENUS');
                    if (data) {
                        cloudFiles = data; // 更新暫存
                        this.renderList(data);
                    }
                },
                saveFile: async function(asNew) {
                    const base64 = MenuModule.getCurrentBase64(); if(!base64) return alert('請先上傳底圖');
                    const data = await ApiHelper.call('ADMIN_SAVE_RICH_MENU', {
                        id: asNew ? null : currentFileId,
                        name: document.getElementById('save-filename').value,
                        configJson: document.getElementById('json-output').value,
                        imageBase64: base64
                    });
                    if (data) { currentFileId = data.id; alert('已存入雲端庫'); this.loadList(); }
                },
                // ✅ 關鍵修復：從暫存區索引載入，不透過 onclick 傳遞大字串
                applyFromIndex: function(idx) {
                    const file = cloudFiles[idx];
                    if (!file) return;
                    currentFileId = file.id;
                    document.getElementById('save-filename').value = file.name;
                    MenuModule.load(file.name, encodeURIComponent(file.configJson), file.imageBase64);
                    this.toggleDrawer();
                },
                renderList: function(list) {
                    const container = document.getElementById('saved-files-list');
                    if(!list.length) { container.innerHTML = '<div class="p-10 text-center text-slate-400">雲端庫為空</div>'; return; }
                    container.innerHTML = list.map((m, idx) => `
                        <div class="bg-white p-4 rounded-xl border border-slate-200">
                            <div class="font-bold text-sm mb-2">${m.name}</div>
                            <button onclick="StorageModule.applyFromIndex(${idx})" class="w-full py-2 bg-slate-800 text-white text-xs font-bold rounded-lg shadow-sm">載入此選單</button>
                        </div>
                    `).join('');
                },
                resetCurrentId: () => { currentFileId = null; }
            };
        })();

        MenuModule.init();
    </script>
</body>
</html>
