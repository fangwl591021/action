<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>預約排班中控台</title>
    <!-- Version: 2026.05.02.V252_Consult_Admin_CleanFix -->
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vue/3.3.4/vue.global.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        [v-cloak] { display: none !important; }
        body { background-color: #F8FAFC; color: #1e293b; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .slot-grid { display: grid; grid-template-columns: 80px repeat(30, 1fr); gap: 1px; background: #e2e8f0; }
        .slot-cell { background: white; height: 48px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 12px; transition: all 0.1s; }
        .slot-cell:hover { background-color: #f8fafc; }
        .slot-open { background-color: #dcfce7 !important; color: #166534; font-weight: 800; border: 1px solid #86efac; z-index: 1; }
        .slot-booked { background-color: #fee2e2 !important; color: #991b1b; cursor: not-allowed; }
        .slot-time-label { background: #f8fafc; font-weight: 800; color: #64748b; }
        .btn-green { background-color: #06C755; color: white; font-weight: 800; padding: 10px 24px; border-radius: 8px; transition: 0.2s; display: inline-flex; align-items: center; gap: 8px; }
        .btn-green:hover { background-color: #05a647; }
        .btn-green:disabled { opacity: 0.5; cursor: not-allowed; }
        .input-field { width: 100%; border: 1px solid #cbd5e1; border-radius: 8px; padding: 12px; font-size: 15px; outline: none; background: #fff; font-weight: 600; text-align: center; }
        .input-field:focus { border-color: #06C755; box-shadow: 0 0 0 2px rgba(6, 199, 85, 0.1); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .animate-fade-in { animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="p-0 m-0">
    <div id="app" v-cloak class="min-h-screen flex flex-col">
        
        <!-- 登入驗證區塊 -->
        <div v-if="!isAuthenticated" class="min-h-screen flex items-center justify-center bg-[#F8FAFC] px-4 relative text-center">
            <div class="max-w-[360px] w-full bg-white rounded-2xl shadow-sm p-8 border border-slate-200 relative overflow-hidden">
                <div class="absolute top-0 left-0 w-full h-1.5 bg-[#06C755]"></div>
                <div class="mb-8">
                    <div class="w-14 h-14 bg-[#f0fdf4] text-[#06C755] rounded-xl flex items-center justify-center text-2xl mx-auto mb-4 border border-[#dcfce7]">
                        <i class="fas fa-calendar-check"></i>
                    </div>
                    <h2 class="text-xl font-bold text-slate-800">排班中控台</h2>
                    <p class="text-slate-500 text-sm mt-1.5 font-medium">系統安全驗證</p>
                </div>
                <div class="space-y-4">
                    <button @click="lineLogin" :disabled="isLoading" class="w-full py-3.5 bg-[#06C755] text-white rounded-lg font-bold text-sm shadow-sm hover:bg-[#05b04a] transition flex items-center justify-center gap-2 active:scale-95">
                        <i v-if="isLoading" class="fas fa-spinner fa-spin"></i><i v-else class="fab fa-line text-lg"></i>
                        {{ isLoading ? '身分驗證中...' : 'LINE 授權一鍵登入' }}
                    </button>
                    <div class="relative flex items-center py-3">
                        <div class="flex-grow border-t border-slate-100"></div>
                        <span class="shrink-0 px-3 text-[11px] text-slate-400 font-bold uppercase tracking-widest">或使用備用密碼</span>
                        <div class="flex-grow border-t border-slate-100"></div>
                    </div>
                    <input type="text" v-model="loginForm.account" placeholder="管理員帳號" class="input-field bg-slate-50">
                    <input type="password" v-model="loginForm.password" placeholder="登入密碼" class="input-field bg-slate-50" @keyup.enter="handleLogin">
                    <button @click="handleLogin" class="w-full py-3 bg-slate-800 text-white rounded-lg font-bold text-sm shadow-sm hover:bg-slate-700 transition mt-2">密碼登入</button>
                </div>
            </div>
        </div>

        <!-- 系統主畫面 -->
        <div v-else class="flex flex-col h-screen animate-fade-in">
            <header class="bg-white border-b border-slate-200 p-4 flex justify-between items-center sticky top-0 z-40 shadow-sm">
                <div class="flex items-center gap-4">
                    <a href="./admin.html" class="w-10 h-10 rounded-full flex items-center justify-center bg-slate-50 text-slate-500 hover:bg-slate-100 transition"><i class="fas fa-arrow-left"></i></a>
                    <h1 class="text-xl font-black text-slate-800">預約排班中控台 <span class="text-xs bg-indigo-50 text-indigo-600 px-2 py-1 rounded-md border border-indigo-100 ml-2 align-middle">獨立模組</span></h1>
                </div>
                <div class="flex gap-3">
                    <button @click="fetchData" class="px-4 py-2 text-sm font-bold text-slate-600 bg-white border border-slate-200 rounded-lg shadow-sm hover:bg-slate-50 transition flex items-center gap-2">
                        <i class="fas fa-sync-alt text-[#06C755]" :class="{'fa-spin': isLoading}"></i> 重整資料
                    </button>
                    <button @click="logout" class="px-4 py-2 text-sm font-bold text-red-500 bg-red-50 border border-red-100 rounded-lg shadow-sm hover:bg-red-100 transition">
                        登出
                    </button>
                </div>
            </header>

            <main class="flex-grow flex overflow-hidden">
                <aside class="w-72 bg-white border-r border-slate-200 overflow-y-auto flex flex-col hide-scrollbar shadow-[4px_0_24px_rgba(0,0,0,0.02)] z-30">
                    <div class="p-4 border-b border-slate-100 bg-slate-50/50 sticky top-0 z-10">
                        <div class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Teacher List</div>
                        <div class="font-black text-slate-800 text-lg">選擇導師</div>
                    </div>
                    <div v-if="teachers.length === 0" class="p-8 text-center text-slate-400 font-bold text-sm">
                        <i class="fas fa-user-slash text-3xl mb-3 block text-slate-200"></i>目前尚無核准的導師<br>請至管理站建立
                    </div>
                    <div v-for="t in teachers" :key="t.userId" @click="selectTeacher(t)" class="p-4 border-b border-slate-100 cursor-pointer transition-all relative overflow-hidden group" :class="activeTeacher?.userId === t.userId ? 'bg-green-50 border-l-4 border-l-[#06C755]' : 'hover:bg-slate-50 border-l-4 border-l-transparent'">
                        <div class="flex items-center gap-3">
                            <div class="w-12 h-12 rounded-full bg-white shadow-sm border border-slate-200 overflow-hidden shrink-0">
                                <img :src="t.pictureUrl || 'https://images.unsplash.com/photo-1573496359142-b8d87734a5a2?auto=format&fit=crop&w=150&q=80'" class="w-full h-full object-cover">
                            </div>
                            <div class="min-w-0">
                                <div class="font-bold text-slate-800 truncate text-[15px] group-hover:text-[#06C755] transition-colors" :class="{'text-[#06C755]': activeTeacher?.userId === t.userId}">{{ t.name }}</div>
                                <div class="text-[11px] text-slate-400 mt-1 truncate bg-white inline-block px-1.5 py-0.5 rounded border border-slate-100">合約: {{ t.config?.rent || 0 }}P / {{ t.config?.comm || 0 }}%</div>
                            </div>
                        </div>
                    </div>
                </aside>

                <section class="flex-1 relative overflow-auto bg-[#F8FAFC]">
                    <div v-if="!activeTeacher" class="absolute inset-0 flex flex-col items-center justify-center text-slate-300">
                        <div class="w-24 h-24 bg-white rounded-full flex items-center justify-center shadow-sm border border-slate-100 mb-4">
                            <i class="fas fa-calendar-alt text-4xl text-[#06C755] opacity-50"></i>
                        </div>
                        <span class="font-bold text-lg text-slate-400">請從左側點擊導師開始排班</span>
                    </div>
                    <div v-else class="p-6 h-full flex flex-col animate-fade-in">
                        <div class="flex justify-between items-center mb-5 bg-white p-4 rounded-xl border border-slate-200 shadow-sm sticky left-0">
                            <div>
                                <h2 class="text-xl font-black text-slate-800 flex items-center gap-2"><i class="fas fa-user-edit text-[#06C755]"></i> {{ activeTeacher.name }} 的排班表</h2>
                                <p class="text-xs text-slate-500 font-bold mt-1">點擊下方網格可開關時段。綠色為已開放，紅色鎖頭為已被預約。</p>
                            </div>
                            <div class="flex items-center gap-3">
                                <div v-if="hasDrafts" class="text-sm font-bold text-orange-600 bg-orange-50 px-3 py-1.5 rounded-lg border border-orange-100 animate-pulse">有未儲存的變更！</div>
                                <button v-if="hasDrafts" @click="clearDrafts" class="px-4 py-2.5 text-sm font-bold text-slate-500 hover:text-slate-700 transition">取消變更</button>
                                <button v-if="hasDrafts" @click="submitDrafts" :disabled="isLoading" class="btn-green shadow-lg shadow-green-100"><i v-if="isLoading" class="fas fa-spinner fa-spin"></i><i v-else class="fas fa-save"></i>確認結算 ({{ totalDraftCost }} 點)</button>
                            </div>
                        </div>
                        
                        <div class="border border-slate-200 rounded-xl overflow-hidden shadow-sm bg-white flex-grow relative">
                            <div class="overflow-auto h-full w-full">
                                <div class="slot-grid pb-4" style="min-width: 2000px;">
                                    <div class="slot-cell slot-time-label sticky left-0 z-20 border-r border-b shadow-[2px_0_5px_rgba(0,0,0,0.02)]">時段 \ 日期</div>
                                    <div v-for="d in dates" :key="d.fullDate" class="slot-cell bg-slate-50 border-b border-slate-200 flex flex-col py-1 h-auto sticky top-0 z-10">
                                        <span class="text-[10px] text-slate-400 font-bold">{{ d.weekDay }}</span>
                                        <span class="text-[14px] font-black text-slate-700">{{ d.day }}</span>
                                    </div>
                                    
                                    <template v-for="time in timeSlots" :key="time">
                                        <div class="slot-cell slot-time-label sticky left-0 z-10 border-r border-b border-slate-100 shadow-[2px_0_5px_rgba(0,0,0,0.02)]">{{ time }}</div>
                                        <div v-for="d in dates" :key="d.fullDate" @click="handleToggleSlot(d.fullDate, time)" class="slot-cell border-b border-r border-slate-100" :class="getSlotStyle(d.fullDate, time)">
                                            <i v-if="getSlotStatus(d.fullDate, time) === 'OPEN' && !isDraftClose(d.fullDate, time)" class="fas fa-check text-[11px]"></i>
                                            <i v-if="getSlotStatus(d.fullDate, time) === 'BOOKED'" class="fas fa-lock text-[11px]"></i>
                                            <span v-if="isDraftOpen(d.fullDate, time)" class="text-[10px] font-bold text-green-700">待新增</span>
                                            <span v-if="isDraftClose(d.fullDate, time)" class="text-[10px] font-bold text-slate-500">待關閉</span>
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
            </main>
        </div>
    </div>

    <script>
        const { createApp, ref, computed, onMounted } = Vue;
        const WORKER_URL = 'https://action.fangwl591021.workers.dev/';

        createApp({
            setup() {
                const isAuthenticated = ref(false);
                const loginForm = ref({ account: '', password: '' });
                const isLoading = ref(false);
                const liffProfile = ref({});
                
                const teachers = ref([]);
                const slots = ref([]);
                const activeTeacher = ref(null);
                const draftOpen = ref([]);
                const draftClose = ref([]);
                const dates = ref([]);
                const timeSlots = ['09:00', '10:00', '11:00', '12:00', '13:00', '14:00', '15:00', '16:00', '17:00', '18:00', '19:00', '20:00', '21:00'];

                const callApi = async (act, pl = {}, silent = false) => {
                    try {
                        const res = await fetch(WORKER_URL, { 
                            method: 'POST', 
                            headers: { 'Content-Type': 'application/json' }, 
                            body: JSON.stringify({ action: act, payload: pl, userProfile: liffProfile.value || {} }) 
                        });
                        if (!res.ok) throw new Error('伺服器無回應或網路異常');
                        const text = await res.text();
                        let json;
                        try { json = JSON.parse(text); } catch(e) { throw new Error(`後端回傳格式異常。\n(回應開頭: ${text.substring(0, 50)}...)`); }
                        if (json.status !== 'success') throw new Error(json.message || `後台尚未授權此操作 (${act})`); 
                        return json.data;
                    } catch (e) { 
                        if (!silent) alert(`❌ 系統提示：\n${e.message}`); 
                        throw e;
                    }
                };

                const fetchData = async () => {
                    isLoading.value = true;
                    try {
                        const data = await callApi('ADMIN_GET_DATA', {}, true);
                        if (data && data.teachers) {
                            teachers.value = data.teachers.map(t => ({ ...t, config: t.config || { rent: 0, comm: 0, price: 0 } }));
                        }
                        
                        const slotData = await callApi('ADMIN_GET_SLOTS', {}, true);
                        if (slotData) {
                            slots.value = Array.isArray(slotData) ? slotData : (slotData.slots || []);
                        }
                        
                        if (activeTeacher.value) {
                            const stillExists = teachers.value.find(t => t.userId === activeTeacher.value.userId);
                            if (!stillExists) activeTeacher.value = null;
                            draftOpen.value = []; draftClose.value = [];
                        }
                    } catch(e) { console.error(e); alert('資料同步失敗：' + e.message); } finally { isLoading.value = false; }
                };

                const autoLineLogin = async () => {
                    try {
                        const data = await callApi('GET_SETTINGS', {}, true);
                        let finalLiffId = String(data.liff_id || '').trim();
                        if (finalLiffId.includes('liff.line.me/')) finalLiffId = finalLiffId.split('liff.line.me/')[1].split('?')[0].replace(/\//g, '');
                        if (finalLiffId) {
                            await liff.init({ liffId: finalLiffId });
                            if (liff.isLoggedIn()) {
                                liffProfile.value = await liff.getProfile();
                                const checkRes = await callApi('CHECK_USER', {}, true);
                                if (checkRes && (checkRes.isAdmin || (checkRes.info && checkRes.info.memberTier && checkRes.info.memberTier.includes('導師')))) {
                                    isAuthenticated.value = true;
                                    await fetchData();
                                    if (!checkRes.isAdmin) {
                                        teachers.value = teachers.value.filter(t => t.userId === liffProfile.value.userId);
                                        if (teachers.value.length > 0) activeTeacher.value = teachers.value[0];
                                    }
                                }
                            }
                        }
                    } catch (e) { console.log('Silent LIFF login skip:', e); }
                };

                const lineLogin = async () => {
                    isLoading.value = true;
                    try {
                        const data = await callApi('GET_SETTINGS', {}, false);
                        let finalLiffId = String(data.liff_id || '').trim();
                        if (finalLiffId.includes('liff.line.me/')) finalLiffId = finalLiffId.split('liff.line.me/')[1].split('?')[0].replace(/\//g, '');
                        if (!finalLiffId) throw new Error('管理員尚未設定系統主 LIFF ID');

                        await liff.init({ liffId: finalLiffId });
                        if (!liff.isLoggedIn()) { liff.login({ redirectUri: window.location.href }); return; }

                        liffProfile.value = await liff.getProfile();
                        const checkRes = await callApi('CHECK_USER', {}, false);

                        if (checkRes && (checkRes.isAdmin || (checkRes.info && checkRes.info.memberTier && checkRes.info.memberTier.includes('導師')))) {
                            isAuthenticated.value = true;
                            await fetchData();
                            if (!checkRes.isAdmin) {
                                teachers.value = teachers.value.filter(t => t.userId === liffProfile.value.userId);
                                if (teachers.value.length > 0) activeTeacher.value = teachers.value[0];
                            }
                        } else { alert('⛔ 您沒有管理或導師權限，無法進入排班系統。'); }
                    } catch (e) { alert(`登入失敗: ${e.message}`); } finally { isLoading.value = false; }
                };

                const handleLogin = () => {
                    const acc = String(loginForm.value.account || '').trim().toLowerCase();
                    const pwd = String(loginForm.value.password || '').trim();
                    if (acc === 'admin' && pwd === '@1234') { isAuthenticated.value = true; fetchData(); } else { alert('帳號或密碼錯誤'); }
                };

                const logout = () => { isAuthenticated.value = false; loginForm.value = { account: '', password: '' }; };

                const selectTeacher = (t) => { if (activeTeacher.value?.userId !== t.userId) { draftOpen.value = []; draftClose.value = []; activeTeacher.value = t; } };

                const getStatus = (date, time) => {
                    if (!activeTeacher.value) return 'CLOSED';
                    const found = slots.value.find(s => s && s.teacherUid === activeTeacher.value.userId && s.date === date && s.time === time);
                    return found ? found.status : 'CLOSED';
                };

                const isDraftOpen = (date, time) => draftOpen.value.some(s => s.date === date && s.time === time);
                const isDraftClose = (date, time) => draftClose.value.some(s => s.date === date && s.time === time);

                const getSlotStyle = (date, time) => {
                    if (isDraftOpen(date, time)) return 'bg-green-50 text-green-600 border-green-300 border-dashed border-2 shadow-inner';
                    if (isDraftClose(date, time)) return 'bg-slate-100 text-slate-400 line-through opacity-60';
                    const s = getStatus(date, time);
                    if (s === 'OPEN') return 'slot-open shadow-sm';
                    if (s === 'BOOKED') return 'slot-booked opacity-80';
                    return 'bg-white text-slate-200';
                };

                const handleToggleSlot = (date, time) => {
                    if (!activeTeacher.value) return;
                    const uid = activeTeacher.value.userId;
                    const status = getStatus(date, time);
                    if (status === 'BOOKED') { alert('此時段已被預約，無法更改！'); return; }
                    const oIdx = draftOpen.value.findIndex(s => s.date === date && s.time === time);
                    const cIdx = draftClose.value.findIndex(s => s.date === date && s.time === time);
                    if (oIdx > -1) { draftOpen.value.splice(oIdx, 1); return; }
                    if (cIdx > -1) { draftClose.value.splice(cIdx, 1); return; }
                    if (status === 'OPEN') draftClose.value.push({ uid, date, time }); else draftOpen.value.push({ uid, date, time });
                };

                const submitDrafts = async () => {
                    if (!activeTeacher.value) return;
                    const cost = draftOpen.value.length * (activeTeacher.value.config?.rent || 0);
                    if (!confirm(`確定送出排班異動？\n新增開放：${draftOpen.value.length} 個時段\n關閉時段：${draftClose.value.length} 個時段\n將從紅包扣除：${cost} 點租金`)) return;
                    isLoading.value = true;
                    try {
                        const res = await callApi('ADMIN_BATCH_TOGGLE_SLOTS', { teacherUid: activeTeacher.value.userId, draftOpen: draftOpen.value, draftClose: draftClose.value });
                        if (res) { alert('✅ 排班結算完成！'); draftOpen.value = []; draftClose.value = []; await fetchData(); }
                    } catch (e) { console.error(e); } finally { isLoading.value = false; }
                };

                onMounted(() => {
                    const today = new Date(); const names = ['日', '一', '二', '三', '四', '五', '六'];
                    for (let i = 0; i < 30; i++) {
                        const d = new Date(today); d.setDate(today.getDate() + i);
                        dates.value.push({ fullDate: d.toISOString().split('T')[0], day: d.getDate(), weekDay: names[d.getDay()] });
                    }
                    autoLineLogin();
                });

                return {
                    isAuthenticated, loginForm, isLoading, liffProfile,
                    teachers, slots, activeTeacher, draftOpen, draftClose, dates, timeSlots,
                    lineLogin, handleLogin, logout, fetchData, selectTeacher,
                    getSlotStatus: getStatus, isDraftOpen, isDraftClose, getSlotStyle, handleToggleSlot,
                    hasDrafts: computed(() => draftOpen.value.length > 0 || draftClose.value.length > 0),
                    totalDraftCost: computed(() => draftOpen.value.length * (activeTeacher.value?.config?.rent || 0)),
                    clearDrafts: () => { draftOpen.value = []; draftClose.value = []; }, submitDrafts
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
