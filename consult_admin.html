<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">

    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        [v-cloak] { display: none !important; }
        body { 
            background-color: #F8FAFC; 
            color: #1e293b; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            overscroll-behavior-y: none; 
        }
        .slot-grid { display: grid; grid-template-columns: 80px repeat(30, 1fr); gap: 1px; background: #e2e8f0; }
        .slot-cell { background: white; height: 48px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 12px; transition: all 0.1s; }
        .slot-cell:hover { background-color: #f8fafc; }
        .slot-open { background-color: #dcfce7 !important; color: #166534; font-weight: 800; border: 1px solid #86efac; z-index: 1; }
        .slot-booked { background-color: #fee2e2 !important; color: #991b1b; cursor: not-allowed; }
        .slot-time-label { background: #f8fafc; font-weight: 800; color: #64748b; }
        .btn-green { 
            background-color: #06C755; 
            color: white; 
            font-weight: 800; 
            padding: 10px 24px; 
            border-radius: 8px; 
            transition: 0.2s; 
            display: inline-flex; 
            align-items: center; 
            gap: 8px; 
        }
        .btn-green:hover { background-color: #05a647; }
        .btn-green:disabled { opacity: 0.5; cursor: not-allowed; }
        .input-field { 
            width: 100%; 
            border: 1px solid #cbd5e1; 
            border-radius: 8px; 
            padding: 12px; 
            font-size: 15px; 
            outline: none; 
            background: #fff; 
            font-weight: 600; 
            text-align: center; 
        }
        .input-field:focus { border-color: #06C755; box-shadow: 0 0 0 2px rgba(6, 199, 85, 0.1); }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .smooth-scroll { -webkit-overflow-scrolling: touch; }
        .animate-fade-in { animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
