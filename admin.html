<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宏學管理後台</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vue/3.3.4/vue.global.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap"
        rel="stylesheet">
    <style>
        [v-cloak] { display: none !important; }
        :root { --line-green: #06C755; --bg-body: #f8fafc; --text-main: #1e293b; }
        body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg-body); color: var(--text-main); overflow: hidden; }
        .sidebar { width: 220px; background: white; border-right: 1px solid #e2e8f0; display: flex; flex-direction: column; flex-shrink: 0; z-index: 50; }
        .menu-item { display: flex; align-items: center; width: 100%; height: 50px; padding: 0 24px; color: #64748b; font-size: 14px; font-weight: 500; cursor: pointer; border-left: 4px solid transparent; }
        .menu-item.active { background-color: #f0fdf4; color: var(--line-green); border-left-color: var(--line-green); font-weight: 700; }
        .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .top-header { height: 60px; background: white; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; }
        .content-scroll { flex: 1; overflow-y: auto; padding: 24px; }
        .card { background: white; border-radius: 8px; border: 1px solid #e2e8f0; margin-bottom: 20px; overflow: hidden; }
        .data-table { width: 100%; border-collapse: collapse; }
        .data-table th { padding: 12px 16px; background: #f8fafc; color: #94a3b8; font-size: 11px; font-bold; text-align: left; border-bottom: 1px solid #e2e8f0; }
        .data-table td { padding: 14px 16px; font-size: 14px; border-bottom: 1px solid #f1f5f9; }
        .btn-green { background: var(--line-green); color: white; padding: 8px 16px; border-radius: 6px; font-weight: 700; font-size: 13px; display: inline-flex; align-items: center; }
        .btn-white { background: white; border: 1px solid #e2e8f0; color: #475569; padding: 8px 16px; border-radius: 6px; font-size: 13px; }
        .input-line { width: 100%; border: 1px solid #e2e8f0; border-radius: 6px; padding: 8px 12px; font-size: 14px; outline: none; }
        .modal-mask { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.4); z-index: 9999; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(2px); }
        .modal-pop { background: white; width: 90%; max-width: 800px; max-height: 90vh; border-radius: 12px; display: flex; flex-direction: column; box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
        .upload-placeholder { width: 100%; height: 120px; border: 2px dashed #e2e8f0; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #94a3b8; cursor: pointer; transition: 0.2s; }
        .upload-placeholder:hover { border-color: var(--line-green); color: var(--line-green); }
    </style>
</head>

<body>

    <div id="app" v-cloak class="flex h-screen w-full">
        
        <!-- --- 登入頁面 --- -->
        <div v-if="!isLoggedIn" class="fixed inset-0 z-[1000] flex items-center justify-center bg-slate-50">
            <div class="bg-white p-10 rounded-2xl shadow-sm w-[90%] md:w-[400px] text-center border border-slate-200">
                <h1 class="text-2xl font-black text-slate-800 mb-8 tracking-tight">宏學管理系統</h1>
                <div class="space-y-4">
                    <input v-model="account" type="text" class="input-line h-12" placeholder="管理帳號 (action)">
                    <input v-model="password" @keyup.enter="login" type="password" class="input-line h-12" placeholder="管理密碼 (@1234)">
                    <button @click="login" :disabled="isLoading" class="w-full btn-green justify-center h-12 text-base">
                        {{ isLoading ? '連線中...' : '登入系統' }}
                    </button>
                </div>
                <p v-if="error" class="text-red-500 text-sm mt-6 font-bold">{{ error }}</p>
            </div>
        </div>

        <!-- --- 主管理介面 --- -->
        <template v-else>
            <aside class="sidebar shadow-sm">
                <div class="p-6 font-black text-lg border-b text-slate-800 hidden md:block">宏學管理站</div>
                <nav class="flex-1 py-2">
                    <div class="menu-item" :class="{active: currentTab==='dashboard'}" @click="currentTab='dashboard'">
                        <i class="fas fa-th-large w-5 mr-3"></i> <span>總覽</span>
                    </div>
                    <div class="menu-item" :class="{active: currentTab==='courses'}" @click="currentTab='courses'">
                        <i class="fas fa-book w-5 mr-3"></i> <span>課程</span>
                    </div>
                    <div class="menu-item" :class="{active: currentTab==='orders'}" @click="currentTab='orders'">
                        <i class="fas fa-receipt w-5 mr-3"></i> <span>訂單</span>
                    </div>
                    <div class="mt-4 border-t pt-2">
                        <div class="menu-item text-slate-400" @click="logout">
                            <i class="fas fa-sign-out-alt w-5 mr-3"></i> <span>登出</span>
                        </div>
                    </div>
                </nav>
            </aside>

            <main class="main-content">
                <header class="top-header">
                    <h2 class="text-lg font-bold text-slate-800">{{ tabName }}</h2>
                    <div class="flex gap-2">
                        <button v-if="currentTab==='courses'" @click="executeMacroImport" class="btn-white text-blue-600 border-blue-200">
                            <i class="fas fa-cloud-download-alt mr-1"></i> 自動匯入
                        </button>
                        <button @click="fetchData" class="btn-white"><i class="fas fa-sync-alt" :class="{'fa-spin':isLoading}"></i> 同步</button>
                    </div>
                </header>

                <div class="content-scroll">
                    <!-- 儀表板 -->
                    <div v-if="currentTab==='dashboard'">
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                            <div class="card p-6 border-l-4 border-l-green-500">
                                <p class="text-slate-400 text-xs font-bold uppercase mb-1">實收金額</p>
                                <h3 class="text-2xl font-black">${{ dashboardStats.totalRevenue.toLocaleString() }}</h3>
                            </div>
                            <div class="card p-6 border-l-4 border-l-orange-400">
                                <p class="text-slate-400 text-xs font-bold uppercase mb-1">待收筆數</p>
                                <h3 class="text-2xl font-black">{{ dashboardStats.pendingCount }} 筆</h3>
                            </div>
                            <div class="card p-6 border-l-4 border-l-blue-500">
                                <p class="text-slate-400 text-xs font-bold uppercase mb-1">課程總量</p>
                                <h3 class="text-2xl font-black">{{ courses.length }} 堂</h3>
                            </div>
                        </div>
                    </div>

                    <!-- 課程管理 -->
                    <div v-if="currentTab==='courses'">
                        <div class="flex justify-between items-center mb-6">
                            <input v-model="searchCourseTerm" class="input-line max-w-xs" placeholder="關鍵字搜尋...">
                            <button @click="openAddCourse" class="btn-green shadow-sm"><i class="fas fa-plus"></i> 新增課程</button>
                        </div>
                        <div class="card overflow-hidden">
                            <table class="data-table">
                                <thead>
                                    <tr>
                                        <th class="w-16">預覽</th>
                                        <th>課程名稱</th>
                                        <th>日期</th>
                                        <th>費用/名額</th>
                                        <th class="text-center">狀態</th>
                                        <th class="text-right">管理</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr v-for="c in filteredCourses" :key="c.id" class="hover:bg-slate-50 transition">
                                        <td>
                                            <div class="w-10 h-10 bg-slate-100 rounded overflow-hidden">
                                                <img v-if="c.image" :src="c.image" class="w-full h-full object-cover">
                                                <div v-else class="w-full h-full flex items-center justify-center text-slate-300 text-xs"><i class="fas fa-image"></i></div>
                                            </div>
                                        </td>
                                        <td>
                                            <div class="font-bold text-slate-700">{{ c.name }}</div>
                                            <div class="text-[10px] text-slate-400 font-mono">{{ c.id }}</div>
                                        </td>
                                        <td class="text-sm text-slate-500">{{ c.startDate }}</td>
                                        <td>
                                            <div class="font-bold text-green-600">${{ c.price }}</div>
                                            <div class="text-xs text-slate-400">{{ c.enrolled }} / {{ c.capacity }}</div>
                                        </td>
                                        <td class="text-center">
                                            <span class="px-2 py-0.5 rounded text-[10px] font-bold" :class="c.status==='上架'?'bg-green-100 text-green-700':'bg-slate-100 text-slate-400'">{{ c.status }}</span>
                                        </td>
                                        <td class="text-right space-x-3">
                                            <button @click="openAttendance(c)" class="text-blue-600 font-bold text-xs">簽到</button>
                                            <button @click="openEditCourse(c)" class="text-slate-400 font-bold text-xs">編輯</button>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <!-- 訂單管理 -->
                    <div v-if="currentTab==='orders'">
                        <div class="mb-6"><input v-model="searchTerm" class="input-line max-w-md" placeholder="搜尋姓名、電話、單號..."></div>
                        <div class="card overflow-hidden">
                            <table class="data-table">
                                <thead>
                                    <tr>
                                        <th>學員資訊</th>
                                        <th>報名課程</th>
                                        <th>金額 / 狀態</th>
                                        <th class="text-right">操作</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr v-for="o in filteredOrders" :key="o.orderId" class="hover:bg-slate-50 border-b">
                                        <td>
                                            <div class="font-bold text-slate-700 text-sm">{{ o.name }}</div>
                                            <div class="text-xs text-slate-400">{{ o.phone }}</div>
                                        </td>
                                        <td class="text-sm text-slate-500">{{ getCourseName(o.courseId) }}</td>
                                        <td class="text-center">
                                            <div class="font-bold text-green-600 text-sm">${{ o.amount }}</div>
                                            <span class="text-[10px] px-1.5 py-0.5 rounded font-bold" :class="o.status==='PAID'?'bg-green-100 text-green-700':'bg-yellow-100 text-yellow-700'">{{ o.status }}</span>
                                        </td>
                                        <td class="text-right"><button @click="openOrder(o)" class="text-blue-500 font-bold text-xs hover:underline">詳情</button></td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </main>
        </template>

        <!-- --- 課程編輯彈窗 --- -->
        <div v-if="showCourseModal" class="modal-mask">
            <div class="modal-pop">
                <div class="h-14 border-b px-6 flex justify-between items-center bg-white shrink-0">
                    <h3 class="font-black text-slate-800">{{ isEditingCourse ? '修改課程資訊' : '建立宏學新課程' }}</h3>
                    <button @click="showCourseModal=false"><i class="fas fa-times text-slate-400"></i></button>
                </div>
                <div class="p-8 overflow-y-auto grid grid-cols-1 md:grid-cols-2 gap-5 bg-slate-50/50">
                    <!-- 圖片上傳區塊 -->
                    <div class="md:col-span-2">
                        <label class="text-[11px] font-bold text-slate-400 block mb-2 uppercase">課程宣傳圖 (自動壓縮)</label>
                        <div @click="$refs.fileInput.click()" class="upload-placeholder overflow-hidden bg-white">
                            <img v-if="courseForm.image" :src="courseForm.image" class="w-full h-full object-contain">
                            <template v-else>
                                <i class="fas fa-cloud-upload-alt text-2xl mb-2"></i>
                                <span class="text-xs">點擊上傳圖片</span>
                            </template>
                        </div>
                        <input type="file" ref="fileInput" @change="processImage" accept="image/*" class="hidden">
                    </div>

                    <div class="md:col-span-2">
                        <label class="text-[11px] font-bold text-slate-400 block mb-1 uppercase">課程名稱</label>
                        <input v-model="courseForm.name" class="input-line" placeholder="輸入名稱">
                    </div>
                    <div>
                        <label class="text-[11px] font-bold text-slate-400 block mb-1 uppercase">開始日期</label>
                        <input v-model="courseForm.startDate" class="input-line" placeholder="YYYY-MM-DD">
                    </div>
                    <div>
                        <label class="text-[11px] font-bold text-slate-400 block mb-1 uppercase">上架狀態</label>
                        <select v-model="courseForm.status" class="input-line">
                            <option value="下架">下架</option>
                            <option value="上架">上架</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[11px] font-bold text-slate-400 block mb-1 uppercase">費用</label>
                        <input v-model="courseForm.price" type="number" class="input-line font-bold text-green-600">
                    </div>
                    <div>
                        <label class="text-[11px] font-bold text-slate-400 block mb-1 uppercase">名額</label>
                        <input v-model="courseForm.capacity" type="number" class="input-line">
                    </div>
                </div>
                <div class="h-16 border-t px-6 flex justify-end items-center gap-3 bg-white shrink-0">
                    <button @click="showCourseModal=false" class="btn-white px-6">取消</button>
                    <button @click="saveCourse" :disabled="isLoading" class="btn-green px-10 shadow-sm">
                        {{ isLoading ? '處理中...' : '確認儲存' }}
                    </button>
                </div>
            </div>
        </div>

        <!-- 簽到與訂單彈窗 (略，維持原有邏輯) -->
        <div v-if="showAttendanceModal" class="modal-mask">...</div>
        <div v-if="showOrderModal" class="modal-mask">...</div>

    </div>

    <script>
        const { createApp, ref, computed, onMounted } = Vue;
        const API_ENDPOINT = 'https://action.fangwl591021.workers.dev/';

        createApp({
            setup() {
                const isLoggedIn = ref(false), account = ref(''), password = ref(''), isLoading = ref(false), error = ref('');
                const currentTab = ref('dashboard'), courses = ref([]), orders = ref([]);
                const searchTerm = ref(''), searchCourseTerm = ref('');

                const showCourseModal = ref(false), isEditingCourse = ref(false), courseForm = ref({});
                const showOrderModal = ref(false), editingOrder = ref({});
                const showAttendanceModal = ref(false), attendanceCourse = ref(null), attendanceDate = ref(''), attendanceList = ref([]);

                const tabName = computed(() => ({ 'dashboard': '統計總覽', 'courses': '課程管理', 'orders': '報名訂單' }[currentTab.value]));

                const callApi = async (action, payload = {}) => {
                    const res = await fetch(API_ENDPOINT, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer macro-import-2026' },
                        body: JSON.stringify({ action, payload })
                    });
                    const json = await res.json();
                    if (json.status !== 'success' && json.success !== true) throw new Error(json.message || '連線錯誤');
                    return json.data || json.message;
                };

                // 前端圖片處理：Canvas 壓縮
                const processImage = (event) => {
                    const file = event.target.files[0];
                    if (!file) return;
                    
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const img = new Image();
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            let width = img.width;
                            let height = img.height;
                            const max_size = 800; // 限制最大寬度 800px

                            if (width > max_size) {
                                height *= max_size / width;
                                width = max_size;
                            }
                            canvas.width = width;
                            canvas.height = height;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, width, height);
                            
                            // 壓縮為 JPEG 0.7 品質
                            const compressedBase64 = canvas.toDataURL('image/jpeg', 0.7);
                            courseForm.value.image = compressedBase64;
                        };
                        img.src = e.target.result;
                    };
                    reader.readAsDataURL(file);
                };

                const login = async () => {
                    error.value = '';
                    if (account.value !== 'action' || password.value !== '@1234') { error.value = '帳號或密碼錯誤'; return; }
                    isLoading.value = true;
                    try {
                        isLoggedIn.value = true;
                        fetchData();
                    } catch (e) { error.value = '無法建立連線'; } finally { isLoading.value = false; }
                };

                const fetchData = async () => {
                    isLoading.value = true;
                    try {
                        const d = await callApi('ADMIN_GET_DATA');
                        courses.value = d.courses || [];
                        orders.value = (d.orders || []).reverse();
                    } catch (e) { console.error(e); } finally { isLoading.value = false; }
                };

                const executeMacroImport = async () => {
                    if (!confirm('執行匯入？')) return;
                    isLoading.value = true;
                    try {
                        const msg = await callApi('MACRO_IMPORT');
                        alert(msg); fetchData();
                    } catch (e) { alert(e.message); } finally { isLoading.value = false; }
                };

                const filteredCourses = computed(() => {
                    const s = searchCourseTerm.value.toLowerCase();
                    let res = courses.value.filter(c => !s || String(c.name).toLowerCase().includes(s) || String(c.id).toLowerCase().includes(s));
                    return res.sort((a, b) => (b.startDate || '').localeCompare(a.startDate || '') || (b.id || '').localeCompare(a.id || ''));
                });

                const filteredOrders = computed(() => {
                    const s = searchTerm.value.toLowerCase();
                    return orders.value.filter(o => !s || String(o.name).includes(s) || String(o.phone).includes(s) || String(o.orderId).includes(s));
                });

                const dashboardStats = computed(() => {
                    let rev = 0;
                    orders.value.forEach(o => { if (o.status === 'PAID') rev += Number(o.amount); });
                    return { totalRevenue: rev, pendingCount: orders.value.filter(o => o.status === 'PENDING').length };
                });

                const openAddCourse = () => {
                    isEditingCourse.value = false;
                    courseForm.value = { id: '', name: '', startDate: '', price: 0, capacity: 20, status: '下架', image: '' };
                    showCourseModal.value = true;
                };

                const openEditCourse = (c) => { isEditingCourse.value = true; courseForm.value = { ...c }; showCourseModal.value = true; };
                
                const saveCourse = async () => {
                    isLoading.value = true;
                    try {
                        const action = isEditingCourse.value ? 'ADMIN_UPDATE_COURSE' : 'ADMIN_ADD_COURSE';
                        await callApi(action, courseForm.value);
                        alert('已成功儲存！'); showCourseModal.value = false; fetchData();
                    } catch (e) { alert('儲存失敗：' + e.message); } finally { isLoading.value = false; }
                };

                const logout = () => { isLoggedIn.value = false; account.value = ''; password.value = ''; };
                const getCourseName = (id) => (courses.value.find(c => c.id === id) || { name: '未知' }).name;

                return {
                    isLoggedIn, account, password, isLoading, error, currentTab, tabName,
                    courses, orders, searchTerm, searchCourseTerm, filteredCourses, filteredOrders, dashboardStats,
                    showCourseModal, isEditingCourse, courseForm, showOrderModal, editingOrder, showAttendanceModal, attendanceCourse, attendanceDate, attendanceList,
                    login, logout, fetchData, executeMacroImport, openAddCourse, openEditCourse, saveCourse, processImage, getCourseName
                };
            }
        }).mount('#app');
    </script>
</body>

</html>
