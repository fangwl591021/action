<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宏學管理後台</title>
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vue/3.3.4/vue.global.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        [v-cloak] { display: none !important; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #F8F9FA; color: #333; }
        .sidebar { width: 220px; background: #2F3136; color: #FFF; position: fixed; height: 100%; z-index: 10; transition: 0.3s; }
        .main-content { margin-left: 220px; padding: 25px; min-height: 100vh; }
        .menu-item { padding: 14px 20px; cursor: pointer; transition: 0.2s; font-size: 14px; opacity: 0.75; display: flex; align-items: center; }
        .menu-item:hover, .menu-item.active { background: #3D4148; opacity: 1; border-left: 3px solid #06C755; }
        .line-table { width: 100%; border-collapse: collapse; background: white; border-radius: 4px; }
        .line-table th { background: #FFFFFF; padding: 12px 15px; text-align: left; font-size: 12px; color: #999; border-bottom: 1px solid #F0F0F0; font-weight: normal; text-transform: uppercase; }
        .line-table td { padding: 15px; border-bottom: 1px solid #F8F8F8; font-size: 14px; vertical-align: middle; }
        .btn-line { background: #06C755; color: #FFF; padding: 8px 20px; border-radius: 4px; font-size: 13px; transition: 0.2s; border: none; cursor: pointer; }
        .btn-line:hover { background: #05b34c; }
        .btn-ghost { background: transparent; color: #999; border: 1px solid #DDD; padding: 6px 12px; border-radius: 4px; font-size: 12px; cursor: pointer; }
        .badge { padding: 3px 10px; border-radius: 100px; font-size: 11px; display: inline-block; }
        .input-line { width: 100%; border: 1px solid #EEE; border-radius: 4px; padding: 12px; font-size: 14px; outline: none; background: #FAFAFA; transition: 0.2s; }
        .input-line:focus { border-color: #06C755; background: #FFF; }
        .modal-mask { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(2px); }
        .modal-pop { background: #FFF; width: 95%; max-width: 650px; border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .stat-card { background: white; padding: 20px; border-radius: 8px; border-bottom: 2px solid transparent; transition: 0.3s; }
        .stat-card:hover { border-bottom-color: #06C755; }
        @media (max-width: 768px) { .sidebar { width: 60px; } .sidebar span { display: none; } .main-content { margin-left: 60px; padding: 15px; } }
    </style>
</head>
<body>
    <div id="app" v-cloak class="flex">
        <!-- 登入介面 -->
        <div v-if="!isLoggedIn" class="fixed inset-0 z-[1000] flex items-center justify-center bg-[#F8F9FA]">
            <div class="bg-white p-12 rounded-3xl shadow-sm w-96 text-center border border-gray-100">
                <h2 class="text-2xl font-normal mb-8 tracking-wide">宏學管理登入</h2>
                <input v-model="account" type="text" class="input-line mb-4" placeholder="管理帳號">
                <input v-model="password" @keyup.enter="login" type="password" class="input-line mb-8" placeholder="管理密碼">
                <button @click="login" class="w-full btn-line py-4 rounded-xl shadow-lg shadow-green-100">進入系統</button>
                <p v-if="error" class="text-red-400 text-xs mt-6">{{ error }}</p>
            </div>
        </div>

        <template v-else>
            <aside class="sidebar">
                <div class="p-8 font-normal text-lg border-b border-white/5 text-center tracking-widest opacity-90">宏學後台</div>
                <nav class="mt-6">
                    <div v-for="tab in tabs" :key="tab.id" @click="currentTab=tab.id" class="menu-item" :class="{active: currentTab===tab.id}">
                        <i :class="tab.icon" class="w-8 text-center text-sm"></i> <span>{{ tab.name }}</span>
                    </div>
                </nav>
                <div class="absolute bottom-10 w-full px-6 text-center"><button @click="logout" class="text-xs opacity-40 hover:opacity-100 transition">登出管理系統</button></div>
            </aside>

            <main class="main-content flex-grow">
                <div class="flex justify-between items-center mb-8">
                    <h2 class="text-2xl font-light text-gray-700">{{ currentTabName }}</h2>
                    <div class="flex gap-3">
                        <button @click="fetchData" class="btn-ghost" :disabled="isLoading"><i class="fas fa-sync-alt mr-2" :class="{'fa-spin':isLoading}"></i>資料同步</button>
                        <button v-if="currentTab==='courses'" @click="openAddCourse" class="btn-line"><i class="fas fa-plus mr-2"></i>建立課程</button>
                    </div>
                </div>

                <!-- 營運統計頁面 -->
                <div v-if="currentTab==='dashboard'">
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                        <div class="stat-card shadow-sm">
                            <div class="text-[11px] text-gray-400 uppercase tracking-widest mb-2">已完款總額</div>
                            <div class="text-3xl font-light text-[#06C755]">${{ dashboardStats.totalRevenue.toLocaleString() }}</div>
                        </div>
                        <div class="stat-card shadow-sm">
                            <div class="text-[11px] text-gray-400 uppercase tracking-widest mb-2">待收總額</div>
                            <div class="text-3xl font-light text-orange-400">${{ dashboardStats.pendingRevenue.toLocaleString() }}</div>
                        </div>
                        <div class="stat-card shadow-sm">
                            <div class="text-[11px] text-gray-400 uppercase tracking-widest mb-2">有效學員數</div>
                            <div class="text-3xl font-light text-blue-400">{{ dashboardStats.totalMembers }}</div>
                        </div>
                        <div class="stat-card shadow-sm">
                            <div class="text-[11px] text-gray-400 uppercase tracking-widest mb-2">報名總筆數</div>
                            <div class="text-3xl font-light text-purple-400">{{ dashboardStats.totalOrders }}</div>
                        </div>
                    </div>
                    
                    <div class="mt-10 bg-white p-8 rounded-lg shadow-sm">
                        <h3 class="text-sm text-gray-400 mb-6 tracking-widest uppercase">近期報名動態</h3>
                        <div v-if="orders.length === 0" class="text-center py-10 text-gray-300 text-sm">目前尚無任何報名資訊</div>
                        <table v-else class="line-table">
                            <thead>
                                <tr><th>單號</th><th>學員</th><th>課程</th><th>金額</th><th>狀態</th></tr>
                            </thead>
                            <tbody>
                                <tr v-for="o in orders.slice(0, 5)" :key="o.orderId">
                                    <td class="text-xs font-mono text-gray-400">{{ o.orderId.slice(-8) }}</td>
                                    <td>{{ o.name }}</td>
                                    <td class="text-sm text-gray-500">{{ getCourseName(o.courseId) }}</td>
                                    <td>${{ o.amount }}</td>
                                    <td><span :class="getStatusClass(o.status)" class="badge">{{ getStatusLabel(o.status) }}</span></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- 會員名冊 -->
                <div v-if="currentTab==='members'" class="bg-white rounded-lg shadow-sm">
                    <table class="line-table">
                        <thead>
                            <tr><th>姓名</th><th>性別</th><th>行業</th><th>聯絡電話</th><th class="text-right">管理</th></tr>
                        </thead>
                        <tbody>
                            <tr v-for="u in users" :key="u.userId">
                                <td>{{ u.name }}</td>
                                <td class="text-gray-400">{{ u.gender }}</td>
                                <td class="text-gray-500 text-sm">{{ u.industry || '-' }}</td>
                                <td>{{ u.phone }}</td>
                                <td class="text-right"><button @click="openMember(u)" class="text-blue-400 hover:text-blue-600 transition text-sm">查看詳情</button></td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <!-- 課程管理 -->
                <div v-if="currentTab==='courses'" class="bg-white rounded-lg shadow-sm">
                    <table class="line-table">
                        <thead>
                            <tr><th>課程名稱</th><th>類型</th><th>費用</th><th>名額</th><th class="text-right">管理</th></tr>
                        </thead>
                        <tbody>
                            <tr v-for="c in courses" :key="c.id">
                                <td>
                                    <div class="text-gray-800">{{ c.name }}</div>
                                    <div class="text-[10px] text-gray-300 font-mono mt-1">{{ c.id }}</div>
                                </td>
                                <td><span class="text-xs text-gray-400 bg-gray-50 px-2 py-1 rounded">{{ c.type }}</span></td>
                                <td class="text-[#06C755]">${{ c.price.toLocaleString() }}</td>
                                <td class="text-sm">{{ c.enrolled }} / {{ c.capacity }}人</td>
                                <td class="text-right"><button @click="openEditCourse(c)" class="text-gray-300 hover:text-blue-500 transition"><i class="fas fa-edit"></i></button></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </main>
        </template>
        
        <!-- 課程編輯彈窗 (修復類型選擇) -->
        <div v-if="showCourseModal" class="modal-mask">
            <div class="modal-pop">
                <div class="p-8 border-b flex justify-between items-center bg-gray-50/50">
                    <h3 class="text-lg font-light">{{ isEditingCourse ? '編輯課程詳情' : '建立全新課程' }}</h3>
                    <button @click="showCourseModal=false" class="text-gray-300 hover:text-gray-500"><i class="fas fa-times"></i></button>
                </div>
                <div class="p-8 overflow-y-auto" style="max-height: 70vh;">
                    <div class="space-y-6">
                        <div>
                            <label class="text-[11px] text-gray-400 mb-2 block uppercase tracking-wider">課程名稱</label>
                            <input v-model="courseForm.name" class="input-line" placeholder="請輸入完整課程標題">
                        </div>
                        <div class="grid grid-cols-2 gap-6">
                            <div>
                                <label class="text-[11px] text-gray-400 mb-2 block uppercase tracking-wider">課程類型</label>
                                <select v-model="courseForm.type" class="input-line">
                                    <option value="單日課程">單日課程</option>
                                    <option value="多日營隊">多日營隊</option>
                                    <option value="常態課後">常態課後</option>
                                </select>
                            </div>
                            <div>
                                <label class="text-[11px] text-gray-400 mb-2 block uppercase tracking-wider">標價 (TWD)</label>
                                <input v-model="courseForm.price" type="number" class="input-line">
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-6">
                            <div>
                                <label class="text-[11px] text-gray-400 mb-2 block uppercase tracking-wider">開始日期</label>
                                <input v-model="courseForm.startDate" type="date" class="input-line">
                            </div>
                            <div>
                                <label class="text-[11px] text-gray-400 mb-2 block uppercase tracking-wider">截止日期</label>
                                <input v-model="courseForm.endDate" type="date" class="input-line">
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-6">
                            <div>
                                <label class="text-[11px] text-gray-400 mb-2 block uppercase tracking-wider">總人數限制</label>
                                <input v-model="courseForm.capacity" type="number" class="input-line">
                            </div>
                            <div>
                                <label class="text-[11px] text-gray-400 mb-2 block uppercase tracking-wider">授課教練</label>
                                <input v-model="courseForm.instructor" class="input-line">
                            </div>
                        </div>
                    </div>
                </div>
                <div class="p-6 border-t text-right bg-white flex justify-end gap-3">
                    <button @click="showCourseModal=false" class="btn-ghost px-8">取消</button>
                    <button @click="saveCourse" class="btn-line px-12">儲存變更</button>
                </div>
            </div>
        </div>

        <!-- 會員資料彈窗 -->
        <div v-if="showMemberModal" class="modal-mask">
            <div class="modal-pop" style="max-width: 480px;">
                <div class="p-8 border-b flex justify-between items-center bg-gray-50/50">
                    <h3 class="text-lg font-light">會員詳情</h3>
                    <button @click="showMemberModal=false" class="text-gray-300"><i class="fas fa-times"></i></button>
                </div>
                <div class="p-8 space-y-6">
                    <div><label class="text-[11px] text-gray-400 mb-1 block">真實姓名</label><input v-model="editingMember.name" class="input-line"></div>
                    <div class="grid grid-cols-2 gap-6">
                        <div><label class="text-[11px] text-gray-400 mb-1 block">性別</label><select v-model="editingMember.gender" class="input-line"><option value="男">男</option><option value="女">女</option></select></div>
                        <div><label class="text-[11px] text-gray-400 mb-1 block">生日</label><input v-model="editingMember.birthday" type="date" class="input-line"></div>
                    </div>
                    <div><label class="text-[11px] text-gray-400 mb-1 block">聯絡電話</label><input v-model="editingMember.phone" class="input-line"></div>
                    <div><label class="text-[11px] text-gray-400 mb-1 block">行業類別</label><input v-model="editingMember.industry" class="input-line"></div>
                    <div><label class="text-[11px] text-gray-400 mb-1 block">通訊地址</label><input v-model="editingMember.address" class="input-line"></div>
                </div>
                <div class="p-6 border-t text-right"><button @click="saveMember" class="btn-line px-10">更新資料</button></div>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, computed, onMounted } = Vue;
        const API_ENDPOINT = 'https://action.fangwl591021.workers.dev/';

        createApp({
            setup() {
                const isLoggedIn = ref(false), account = ref(''), password = ref(''), isLoading = ref(false), error = ref(''), authPayload = ref({});
                const currentTab = ref('dashboard');
                const courses = ref([]), orders = ref([]), users = ref([]);
                const tabs = [
                    {id:'dashboard', name:'營運統計', icon:'fas fa-chart-line'},
                    {id:'members', name:'會員名冊', icon:'fas fa-user-friends'},
                    {id:'courses', name:'課程管理', icon:'fas fa-book'}
                ];
                const showCourseModal = ref(false), isEditingCourse = ref(false), courseForm = ref({});
                const showMemberModal = ref(false), editingMember = ref({});

                const dashboardStats = computed(() => {
                    let totalRev = 0, pendingRev = 0;
                    orders.value.forEach(o => {
                        if (o.status === 'PAID') totalRev += Number(o.amount) || 0;
                        else if (o.status === 'PENDING') pendingRev += Number(o.amount) || 0;
                    });
                    return { totalRevenue: totalRev, pendingRevenue: pendingRev, totalOrders: orders.value.length, totalMembers: users.value.length };
                });

                const login = async () => {
                    isLoading.value = true; error.value = '';
                    try {
                        authPayload.value = { account: account.value.trim(), password: password.value.trim() };
                        await callApi('ADMIN_LOGIN');
                        isLoggedIn.value = true;
                        fetchData();
                    } catch (e) { error.value = '驗證失敗，請檢查帳號密碼'; } finally { isLoading.value = false; }
                };

                const fetchData = async () => {
                    isLoading.value = true;
                    try {
                        const d = await callApi('ADMIN_GET_DATA');
                        courses.value = d.courses || [];
                        orders.value = (d.orders || []).reverse();
                        users.value = d.users || [];
                    } catch (e) { alert('資料同步失敗'); } finally { isLoading.value = false; }
                };

                const callApi = async (action, payload = {}) => {
                    const res = await fetch(API_ENDPOINT, { method: 'POST', body: JSON.stringify({ action, payload: { ...authPayload.value, ...payload } }) });
                    const json = await res.json();
                    if (json.status !== 'success') throw new Error(json.message);
                    return json.data;
                };

                const openEditCourse = (c) => { isEditingCourse.value = true; courseForm.value = { ...c }; showCourseModal.value = true; };
                const openAddCourse = () => { isEditingCourse.value = false; courseForm.value = { name:'', price:0, capacity:0, startDate:'', endDate:'', type:'單日課程', instructor:'' }; showCourseModal.value = true; };
                const saveCourse = async () => {
                    try {
                        if (isEditingCourse.value) await callApi('ADMIN_UPDATE_COURSE', courseForm.value);
                        else await callApi('ADMIN_ADD_COURSE', courseForm.value);
                        alert('儲存成功'); showCourseModal.value = false; fetchData();
                    } catch (e) { alert('儲存失敗'); }
                };

                const openMember = (u) => { editingMember.value = { ...u }; showMemberModal.value = true; };
                const saveMember = async () => {
                    try {
                        await callApi('ADMIN_UPDATE_MEMBER', { memberData: editingMember.value });
                        alert('更新成功'); showMemberModal.value = false; fetchData();
                    } catch (e) { alert('更新失敗'); }
                };

                return { 
                    isLoggedIn, account, password, isLoading, error, currentTab, courses, orders, users, tabs, 
                    currentTabName: computed(() => tabs.find(x=>x.id===currentTab.value).name), 
                    dashboardStats, login, logout: () => isLoggedIn.value = false, fetchData, 
                    openEditCourse, openAddCourse, saveCourse, showCourseModal, isEditingCourse, courseForm,
                    openMember, saveMember, showMemberModal, editingMember,
                    getCourseName: (id) => courses.value.find(x => x.id === id)?.name || id,
                    getStatusLabel: s => ({ 'PENDING': '待付款', 'PAID': '已完款', 'CANCELLED': '已取消' }[s] || s),
                    getStatusClass: s => ({ 'PENDING': 'text-orange-400 bg-orange-50', 'PAID': 'text-green-500 bg-green-50', 'CANCELLED': 'text-gray-300 bg-gray-50' }[s])
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
