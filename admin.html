<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宏學管理後台</title>
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vue/3.3.4/vue.global.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        [v-cloak] { display: none !important; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: #F4F4F4; color: #333; }
        .sidebar { width: 200px; background: #2C2C2C; color: #FFF; position: fixed; height: 100%; z-index: 10; }
        .main-content { margin-left: 200px; padding: 20px; }
        .menu-item { padding: 15px 20px; cursor: pointer; transition: 0.2s; font-size: 14px; opacity: 0.7; }
        .menu-item:hover, .menu-item.active { background: #3D3D3D; opacity: 1; }
        .line-table { width: 100%; border-collapse: collapse; background: white; border-radius: 0px; overflow: hidden; }
        .line-table th { background: #FBFBFB; padding: 12px 15px; text-align: left; font-size: 13px; color: #888; border-bottom: 1px solid #EEE; font-weight: normal; }
        .line-table td { padding: 15px; border-bottom: 1px solid #F4F4F4; font-size: 14px; vertical-align: middle; }
        .btn-line { background: #06C755; color: #FFF; padding: 8px 16px; border-radius: 4px; font-size: 13px; transition: 0.2s; }
        .btn-line:hover { background: #05b34c; }
        .badge { padding: 2px 8px; border-radius: 4px; font-size: 11px; }
        .input-line { width: 100%; border: 1px solid #DDD; border-radius: 4px; padding: 10px; font-size: 14px; outline: none; background: #FFF; }
        .modal-mask { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 100; }
        .modal-pop { background: #FFF; width: 90%; max-width: 600px; border-radius: 8px; overflow: hidden; display: flex; flex-direction: column; }
        .stat-card { background: white; padding: 20px; border-bottom: 1px solid #EEE; }
        @media (max-width: 768px) { .sidebar { width: 60px; } .sidebar span { display: none; } .main-content { margin-left: 60px; } }
    </style>
</head>
<body>
    <div id="app" v-cloak class="flex">
        <!-- 登入遮罩 -->
        <div v-if="!isLoggedIn" class="fixed inset-0 z-[1000] flex items-center justify-center bg-[#F4F4F4]">
            <div class="bg-white p-10 rounded-lg shadow-sm w-80 text-center border">
                <h2 class="text-xl font-bold mb-6">宏學管理登入</h2>
                <input v-model="account" type="text" class="input-line mb-4" placeholder="帳號">
                <input v-model="password" @keyup.enter="login" type="password" class="input-line mb-6" placeholder="密碼">
                <button @click="login" class="w-full btn-line py-3">登入系統</button>
                <p v-if="error" class="text-red-500 text-xs mt-4">{{ error }}</p>
            </div>
        </div>

        <template v-else>
            <aside class="sidebar">
                <div class="p-6 font-bold text-lg border-b border-white/10 text-center">宏學管理</div>
                <div class="mt-4">
                    <div v-for="tab in tabs" :key="tab.id" @click="currentTab=tab.id" class="menu-item" :class="{active: currentTab===tab.id}">
                        <i :class="tab.icon" class="mr-2"></i> <span>{{ tab.name }}</span>
                    </div>
                </div>
                <div class="absolute bottom-6 w-full px-4"><button @click="logout" class="text-xs opacity-50 w-full text-center">登出系統</button></div>
            </aside>

            <main class="main-content flex-grow">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-bold text-gray-700">{{ currentTabName }}</h2>
                    <div class="flex gap-2">
                        <button @click="fetchData" class="text-xs text-gray-500 bg-white border px-3 py-2 rounded"><i class="fas fa-sync-alt mr-1" :class="{'fa-spin':isLoading}"></i>同步</button>
                        <button v-if="currentTab==='courses'" @click="openAddCourse" class="btn-line"><i class="fas fa-plus mr-1"></i>新增課程</button>
                    </div>
                </div>

                <!-- 營運統計 -->
                <div v-if="currentTab==='dashboard'">
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
                        <div class="stat-card">
                            <div class="text-xs text-gray-400 mb-1">已收款總額</div>
                            <div class="text-2xl font-bold text-[#06C755]">${{ dashboardStats.totalRevenue.toLocaleString() }}</div>
                        </div>
                        <div class="stat-card">
                            <div class="text-xs text-gray-400 mb-1">待收款總額</div>
                            <div class="text-2xl font-bold text-orange-400">${{ dashboardStats.pendingRevenue.toLocaleString() }}</div>
                        </div>
                        <div class="stat-card">
                            <div class="text-xs text-gray-400 mb-1">學員總數</div>
                            <div class="text-2xl font-bold text-blue-500">{{ users.length }}</div>
                        </div>
                        <div class="stat-card">
                            <div class="text-xs text-gray-400 mb-1">訂單總筆數</div>
                            <div class="text-2xl font-bold text-purple-500">{{ orders.length }}</div>
                        </div>
                    </div>
                    
                    <div class="bg-white border rounded-sm overflow-hidden">
                        <div class="p-4 bg-gray-50 border-b text-xs font-bold text-gray-500 tracking-widest">最新報名紀錄</div>
                        <table class="line-table">
                            <thead>
                                <tr><th>單號</th><th>學員</th><th>課程</th><th>金額</th><th>狀態</th></tr>
                            </thead>
                            <tbody>
                                <tr v-for="o in orders.slice(0, 10)" :key="o.orderId">
                                    <td class="text-xs text-gray-400">{{ o.orderId.slice(-6) }}</td>
                                    <td>{{ o.name }}</td>
                                    <td class="text-sm text-gray-500">{{ getCourseName(o.courseId) }}</td>
                                    <td>${{ o.amount }}</td>
                                    <td><span :class="getStatusClass(o.status)" class="badge">{{ getStatusLabel(o.status) }}</span></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- 會員名冊 -->
                <div v-if="currentTab==='members'" class="overflow-x-auto">
                    <table class="line-table">
                        <thead>
                            <tr><th>姓名</th><th>性別</th><th>行業</th><th>電話</th><th class="text-right">管理</th></tr>
                        </thead>
                        <tbody>
                            <tr v-for="u in users" :key="u.userId">
                                <td class="font-bold">{{ u.name }}</td>
                                <td>{{ u.gender }}</td>
                                <td>{{ u.industry || '-' }}</td>
                                <td>{{ u.phone }}</td>
                                <td class="text-right"><button @click="openMember(u)" class="text-blue-500 text-sm">編輯</button></td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <!-- 課程管理 -->
                <div v-if="currentTab==='courses'" class="overflow-x-auto">
                    <table class="line-table">
                        <thead>
                            <tr><th>名稱與編號</th><th>費用 / 類型</th><th>日期</th><th>人數</th><th class="text-right">操作</th></tr>
                        </thead>
                        <tbody>
                            <tr v-for="c in courses" :key="c.id">
                                <td>
                                    <div class="font-bold text-gray-800">{{ c.name }}</div>
                                    <div class="text-[10px] text-gray-400 mt-1">{{ c.id }}</div>
                                </td>
                                <td>
                                    <div class="font-bold text-[#06C755]">${{ c.price.toLocaleString() }}</div>
                                    <span class="text-[11px] text-gray-400">{{ c.type }}</span>
                                </td>
                                <td class="text-xs text-gray-500">{{ c.startDate }}</td>
                                <td class="text-sm">{{ c.enrolled }} / {{ c.capacity }}人</td>
                                <td class="text-right"><button @click="openEditCourse(c)" class="text-gray-400 hover:text-blue-500 transition"><i class="fas fa-edit"></i></button></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </main>
        </template>
        
        <!-- 課程編輯 Modal -->
        <div v-if="showCourseModal" class="modal-mask">
            <div class="modal-pop">
                <div class="p-6 border-b flex justify-between items-center bg-gray-50">
                    <h3 class="font-bold">編輯課程詳情</h3>
                    <button @click="showCourseModal=false" class="text-gray-400"><i class="fas fa-times"></i></button>
                </div>
                <div class="p-6 space-y-6">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="text-xs text-gray-400 mb-1 block">課程 ID (唯讀)</label>
                            <input v-model="courseForm.id" class="input-line bg-gray-50 text-gray-400" readonly>
                        </div>
                        <div>
                            <label class="text-xs text-gray-400 mb-1 block">課程類型</label>
                            <!-- 修復處：確保選單包含正確選項並綁定資料 -->
                            <select v-model="courseForm.type" class="input-line">
                                <option value="單日課程">單日課程</option>
                                <option value="多日營隊">多日營隊</option>
                                <option value="常態課後">常態課後</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <label class="text-xs text-gray-400 mb-1 block">課程名稱</label>
                        <input v-model="courseForm.name" class="input-line">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div><label class="text-xs text-gray-400 mb-1 block">費用</label><input v-model="courseForm.price" type="number" class="input-line"></div>
                        <div><label class="text-xs text-gray-400 mb-1 block">總名額</label><input v-model="courseForm.capacity" type="number" class="input-line"></div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div><label class="text-xs text-gray-400 mb-1 block">開始日期</label><input v-model="courseForm.startDate" type="date" class="input-line"></div>
                        <div><label class="text-xs text-gray-400 mb-1 block">結束日期</label><input v-model="courseForm.endDate" type="date" class="input-line"></div>
                    </div>
                    <div><label class="text-xs text-gray-400 mb-1 block">授課教練</label><input v-model="courseForm.instructor" class="input-line"></div>
                </div>
                <div class="p-4 border-t text-right bg-gray-50">
                    <button @click="saveCourse" class="btn-line px-10">確認儲存</button>
                </div>
            </div>
        </div>

        <!-- 會員資料管理 Modal -->
        <div v-if="showMemberModal" class="modal-mask">
            <div class="modal-pop" style="max-width: 450px;">
                <div class="p-6 border-b flex justify-between items-center bg-gray-50">
                    <h3 class="font-bold">會員資料管理</h3>
                    <button @click="showMemberModal=false"><i class="fas fa-times"></i></button>
                </div>
                <div class="p-6 space-y-4">
                    <div><label class="text-xs text-gray-400 mb-1 block">姓名</label><input v-model="editingMember.name" class="input-line"></div>
                    <div class="grid grid-cols-2 gap-4">
                        <div><label class="text-xs text-gray-400 mb-1 block">性別</label><select v-model="editingMember.gender" class="input-line"><option value="男">男</option><option value="女">女</option></select></div>
                        <div><label class="text-xs text-gray-400 mb-1 block">生日</label><input v-model="editingMember.birthday" type="date" class="input-line"></div>
                    </div>
                    <div><label class="text-xs text-gray-400 mb-1 block">電話</label><input v-model="editingMember.phone" class="input-line"></div>
                    <div><label class="text-xs text-gray-400 mb-1 block">行業類別</label><input v-model="editingMember.industry" class="input-line"></div>
                    <div><label class="text-xs text-gray-400 mb-1 block">居住地址</label><input v-model="editingMember.address" class="input-line"></div>
                </div>
                <div class="p-4 border-t text-right"><button @click="saveMember" class="btn-line px-10">確認更新</button></div>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, computed, onMounted } = Vue;
        const API_ENDPOINT = 'https://action.fangwl591021.workers.dev/';

        createApp({
            setup() {
                const isLoggedIn = ref(false);
                const account = ref('');
                const password = ref('');
                const isLoading = ref(false);
                const error = ref('');
                const authPayload = ref({});
                
                // 固定進入首頁為營運統計 (dashboard)
                const currentTab = ref('dashboard');
                
                const courses = ref([]), orders = ref([]), users = ref([]);
                const tabs = [
                    {id:'dashboard', name:'營運統計', icon:'fas fa-chart-line'},
                    {id:'members', name:'會員名冊', icon:'fas fa-user-friends'},
                    {id:'courses', name:'課程管理', icon:'fas fa-book'}
                ];
                const showCourseModal = ref(false), isEditingCourse = ref(false), courseForm = ref({});
                const showMemberModal = ref(false), editingMember = ref({});

                const dashboardStats = computed(() => {
                    let totalRev = 0, pendingRev = 0;
                    orders.value.forEach(o => {
                        if (o.status === 'PAID') totalRev += Number(o.amount) || 0;
                        else if (o.status === 'PENDING') pendingRev += Number(o.amount) || 0;
                    });
                    return { totalRevenue: totalRev, pendingRevenue: pendingRev };
                });

                const login = async () => {
                    isLoading.value = true; error.value = '';
                    try {
                        authPayload.value = { account: account.value.trim(), password: password.value.trim() };
                        await callApi('ADMIN_LOGIN');
                        isLoggedIn.value = true;
                        fetchData();
                    } catch (e) { error.value = '帳號或密碼錯誤'; } finally { isLoading.value = false; }
                };

                const fetchData = async () => {
                    isLoading.value = true;
                    try {
                        const d = await callApi('ADMIN_GET_DATA');
                        courses.value = d.courses || [];
                        orders.value = (d.orders || []).reverse();
                        users.value = d.users || [];
                    } catch (e) { alert('同步失敗'); } finally { isLoading.value = false; }
                };

                const callApi = async (action, payload = {}) => {
                    const res = await fetch(API_ENDPOINT, { method: 'POST', body: JSON.stringify({ action, payload: { ...authPayload.value, ...payload } }) });
                    const json = await res.json();
                    if (json.status !== 'success') throw new Error(json.message);
                    return json.data;
                };

                const openEditCourse = (c) => { 
                    isEditingCourse.value = true; 
                    courseForm.value = { ...c }; 
                    showCourseModal.value = true; 
                };

                const saveCourse = async () => {
                    try {
                        const action = isEditingCourse.value ? 'ADMIN_UPDATE_COURSE' : 'ADMIN_ADD_COURSE';
                        await callApi(action, courseForm.value);
                        alert('儲存成功'); showCourseModal.value = false; fetchData();
                    } catch (e) { alert('儲存失敗'); }
                };

                const openMember = (u) => { editingMember.value = { ...u }; showMemberModal.value = true; };
                const saveMember = async () => {
                    try {
                        await callApi('ADMIN_UPDATE_MEMBER', { memberData: editingMember.value });
                        alert('更新成功'); showMemberModal.value = false; fetchData();
                    } catch (e) { alert('更新失敗'); }
                };

                return { 
                    isLoggedIn, account, password, isLoading, error, currentTab, courses, orders, users, tabs, 
                    currentTabName: computed(() => tabs.find(x=>x.id===currentTab.value).name), 
                    dashboardStats, login, fetchData, 
                    logout: () => { isLoggedIn.value = false; account.value = ''; password.value = ''; },
                    openEditCourse, openAddCourse: () => { isEditingCourse.value = false; courseForm.value = { name:'', price:0, capacity:0, startDate:'', endDate:'', type:'單日課程', instructor:'' }; showCourseModal.value = true; },
                    saveCourse, showCourseModal, courseForm,
                    openMember, saveMember, showMemberModal, editingMember,
                    getCourseName: (id) => courses.value.find(x => x.id === id)?.name || id,
                    getStatusLabel: s => ({ 'PENDING': '待付款', 'PAID': '已完款', 'CANCELLED': '已取消' }[s] || s),
                    getStatusClass: s => ({ 'PENDING': 'text-orange-400 bg-orange-50', 'PAID': 'text-green-500 bg-green-50', 'CANCELLED': 'text-gray-300 bg-gray-50' }[s])
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
