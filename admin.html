<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宏學管理後台</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vue/3.3.4/vue.global.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap"
        rel="stylesheet">
    <style>
        [v-cloak] { display: none !important; }
        :root { --line-green: #06C755; --bg-body: #f8fafc; --text-main: #1e293b; }
        body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg-body); color: var(--text-main); overflow: hidden; }
        .sidebar { width: 220px; background: white; border-right: 1px solid #e2e8f0; display: flex; flex-direction: column; flex-shrink: 0; z-index: 50; }
        .menu-item { display: flex; align-items: center; width: 100%; height: 50px; padding: 0 24px; color: #64748b; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.2s; border-left: 4px solid transparent; }
        .menu-item:hover { background-color: #f1f5f9; color: var(--line-green); }
        .menu-item.active { background-color: #f0fdf4; color: var(--line-green); border-left-color: var(--line-green); font-weight: 700; }
        .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .top-header { height: 60px; background: white; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; }
        .content-scroll { flex: 1; overflow-y: auto; padding: 24px; }
        .card { background: white; border-radius: 8px; border: 1px solid #e2e8f0; margin-bottom: 20px; overflow: hidden; }
        .data-table { width: 100%; border-collapse: collapse; }
        .data-table th { padding: 12px 16px; background: #f8fafc; color: #94a3b8; font-size: 11px; font-weight: 700; text-align: left; border-bottom: 1px solid #e2e8f0; }
        .data-table td { padding: 14px 16px; font-size: 14px; border-bottom: 1px solid #f1f5f9; }
        .btn-green { background: var(--line-green); color: white; padding: 8px 16px; border-radius: 6px; font-weight: 700; font-size: 13px; display: inline-flex; align-items: center; gap: 6px; transition: 0.2s; }
        .btn-green:active { transform: scale(0.98); opacity: 0.9; }
        .btn-white { background: white; border: 1px solid #e2e8f0; color: #475569; padding: 8px 16px; border-radius: 6px; font-size: 13px; font-weight: 600; transition: 0.2s; }
        .btn-white:hover { border-color: var(--line-green); color: var(--line-green); }
        .input-line { width: 100%; border: 1px solid #e2e8f0; border-radius: 6px; padding: 8px 12px; font-size: 14px; outline: none; transition: border 0.2s; }
        .input-line:focus { border-color: var(--line-green); }
        .modal-mask { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.4); z-index: 9999; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(2px); }
        .modal-pop { background: white; width: 90%; max-width: 800px; max-height: 90vh; border-radius: 12px; display: flex; flex-direction: column; box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
        .upload-placeholder { width: 100%; height: 160px; border: 2px dashed #e2e8f0; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #94a3b8; cursor: pointer; transition: 0.2s; }
        .upload-placeholder:hover { border-color: var(--line-green); color: var(--line-green); background: #f0fdf4; }
        .status-badge { @apply px-2 py-0.5 rounded text-[11px] font-bold; }
        
        @media (max-width: 768px) {
            .sidebar { width: 100%; height: 60px; position: fixed; bottom: 0; flex-direction: row; border-right: 0; border-top: 1px solid #e2e8f0; }
            .main-content { margin-left: 0; padding-bottom: 60px; }
            .menu-item { padding: 0; flex: 1; flex-direction: column; justify-content: center; font-size: 10px; border-left: 0; border-top: 3px solid transparent; }
            .menu-item.active { border-top-color: var(--line-green); background: transparent; }
            .menu-item i { font-size: 18px; margin-bottom: 4px; }
            .top-header h2 { font-size: 16px; }
            .content-scroll { padding: 16px; }
        }
    </style>
</head>

<body>

    <div id="app" v-cloak class="flex h-screen w-full">
        
        <!-- --- 登入畫面 --- -->
        <div v-if="!isLoggedIn" class="fixed inset-0 z-[1000] flex items-center justify-center bg-slate-50">
            <div class="bg-white p-10 rounded-2xl shadow-sm w-[90%] md:w-[400px] text-center border border-slate-200">
                <div class="w-16 h-16 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-6 text-2xl">
                    <i class="fas fa-user-shield"></i>
                </div>
                <h1 class="text-2xl font-black text-slate-800 mb-8 tracking-tight">宏學管理系統</h1>
                <div class="space-y-4 text-left">
                    <div>
                        <label class="text-xs font-bold text-slate-400 mb-1 block">管理帳號</label>
                        <input v-model="account" type="text" class="input-line h-12" placeholder="請輸入帳號">
                    </div>
                    <div>
                        <label class="text-xs font-bold text-slate-400 mb-1 block">管理密碼</label>
                        <input v-model="password" @keyup.enter="login" type="password" class="input-line h-12" placeholder="請輸入密碼">
                    </div>
                    <button @click="login" :disabled="isLoading" class="w-full btn-green justify-center h-12 text-base shadow-sm mt-4">
                        {{ isLoading ? '連線中...' : '登入系統' }}
                    </button>
                </div>
                <p v-if="error" class="text-red-500 text-sm mt-6 font-bold flex items-center justify-center gap-1">
                    <i class="fas fa-exclamation-circle"></i> {{ error }}
                </p>
            </div>
        </div>

        <!-- --- 主管理區域 --- -->
        <template v-else>
            <aside class="sidebar shadow-sm">
                <div class="p-6 font-black text-lg border-b text-slate-800 hidden md:block">宏學管理中心</div>
                <nav class="flex-1 py-2">
                    <div class="menu-item" :class="{active: currentTab==='dashboard'}" @click="currentTab='dashboard'">
                        <i class="fas fa-th-large w-5 mr-3"></i> <span>營運總覽</span>
                    </div>
                    <div class="menu-item" :class="{active: currentTab==='courses'}" @click="currentTab='courses'">
                        <i class="fas fa-book w-5 mr-3"></i> <span>課程管理</span>
                    </div>
                    <div class="menu-item" :class="{active: currentTab==='orders'}" @click="currentTab='orders'">
                        <i class="fas fa-receipt w-5 mr-3"></i> <span>報名訂單</span>
                    </div>
                    <div class="mt-4 border-t pt-2">
                        <div class="menu-item text-slate-400 hover:text-red-500" @click="logout">
                            <i class="fas fa-sign-out-alt w-5 mr-3"></i> <span>登出系統</span>
                        </div>
                    </div>
                </nav>
            </aside>

            <main class="main-content">
                <header class="top-header">
                    <h2 class="text-lg font-black text-slate-800 tracking-tight">{{ tabLabel }}</h2>
                    <div class="flex gap-2">
                        <button v-if="currentTab==='courses'" @click="executeMacroImport" class="btn-white text-blue-600 border-blue-200">
                            <i class="fas fa-cloud-download-alt mr-1"></i> 自動匯入
                        </button>
                        <button @click="fetchData" class="btn-white">
                            <i class="fas fa-sync-alt mr-1" :class="{'fa-spin':isLoading}"></i> 同步資料
                        </button>
                    </div>
                </header>

                <div class="content-scroll">
                    <!-- 統計資訊 -->
                    <div v-if="currentTab==='dashboard'" class="animate-fade-in">
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                            <div class="card p-6 border-l-4 border-l-green-500">
                                <p class="text-slate-400 text-[11px] font-bold uppercase mb-1">實收金額 (已付款)</p>
                                <h3 class="text-2xl font-black text-slate-800">${{ dashboardStats.totalRevenue.toLocaleString() }}</h3>
                            </div>
                            <div class="card p-6 border-l-4 border-l-orange-400">
                                <p class="text-slate-400 text-[11px] font-bold uppercase mb-1">待收筆數</p>
                                <h3 class="text-2xl font-black text-slate-800">{{ dashboardStats.pendingCount }} <span class="text-sm font-normal">筆</span></h3>
                            </div>
                            <div class="card p-6 border-l-4 border-l-blue-500">
                                <p class="text-slate-400 text-[11px] font-bold uppercase mb-1">課程總量</p>
                                <h3 class="text-2xl font-black text-slate-800">{{ courses.length }} <span class="text-sm font-normal">堂</span></h3>
                            </div>
                        </div>
                    </div>

                    <!-- 課程列表 -->
                    <div v-if="currentTab==='courses'" class="animate-fade-in">
                        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
                            <div class="relative w-full md:max-w-xs">
                                <i class="fas fa-search absolute left-3 top-3 text-slate-300 text-sm"></i>
                                <input v-model="searchCourseTerm" class="input-line pl-9 h-10 text-sm" placeholder="搜尋課程名稱、編號...">
                            </div>
                            <button @click="openAddCourse" class="btn-green h-10 shadow-sm w-full md:w-auto justify-center">
                                <i class="fas fa-plus"></i> 新增課程
                            </button>
                        </div>
                        <div class="card">
                            <table class="data-table">
                                <thead>
                                    <tr>
                                        <th class="w-16">預覽</th>
                                        <th>課程名稱 / 編號</th>
                                        <th>日期</th>
                                        <th>費用 / 名額</th>
                                        <th class="text-center">狀態</th>
                                        <th class="text-right">管理</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr v-for="c in filteredCourses" :key="c.id" class="hover:bg-slate-50 transition border-b border-slate-50 last:border-0">
                                        <td>
                                            <div class="w-10 h-10 bg-slate-100 rounded overflow-hidden shadow-inner flex items-center justify-center">
                                                <img v-if="c.image" :src="c.image" class="w-full h-full object-cover" @error="handleImgError">
                                                <i v-else class="fas fa-image text-slate-300"></i>
                                            </div>
                                        </td>
                                        <td>
                                            <div class="font-bold text-slate-700 leading-tight">{{ c.name }}</div>
                                            <div class="text-[10px] text-slate-400 font-mono mt-1 tracking-wider">{{ c.id }}</div>
                                        </td>
                                        <td class="text-sm text-slate-500 font-medium">
                                            <div class="flex items-center gap-1.5"><i class="far fa-calendar-alt text-slate-300"></i>{{ formatDate(c.startDate) }}</div>
                                        </td>
                                        <td>
                                            <div class="font-bold text-green-600">${{ Number(c.price).toLocaleString() }}</div>
                                            <div class="text-[11px] text-slate-400 font-bold mt-0.5">{{ c.enrolled }} / {{ c.capacity }} 人</div>
                                        </td>
                                        <td class="text-center">
                                            <span class="status-badge" :class="c.status==='上架'?'bg-green-100 text-green-700':'bg-slate-100 text-slate-400'">{{ c.status }}</span>
                                        </td>
                                        <td class="text-right space-x-2">
                                            <button @click="openAttendance(c)" class="text-blue-600 font-bold text-xs hover:bg-blue-50 px-2 py-1 rounded transition">簽到</button>
                                            <button @click="openEditCourse(c)" class="text-slate-400 font-bold text-xs hover:bg-slate-100 px-2 py-1 rounded transition">編輯</button>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                            <div v-if="filteredCourses.length === 0" class="p-20 text-center text-slate-300 font-medium">
                                <i class="fas fa-inbox text-4xl mb-4 block opacity-20"></i>
                                沒有符合條件的課程資料
                            </div>
                        </div>
                    </div>

                    <!-- 訂單列表 -->
                    <div v-if="currentTab==='orders'" class="animate-fade-in">
                        <div class="mb-6 relative max-w-md">
                            <i class="fas fa-search absolute left-3 top-3 text-slate-300 text-sm"></i>
                            <input v-model="searchTerm" class="input-line pl-9 h-10 text-sm" placeholder="關鍵字搜尋學員姓名、電話、訂單號碼...">
                        </div>
                        <div class="card overflow-hidden">
                            <table class="data-table">
                                <thead>
                                    <tr>
                                        <th>學員資訊</th>
                                        <th>報名課程</th>
                                        <th class="text-center">金額 / 狀態</th>
                                        <th class="text-right">維護</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr v-for="o in filteredOrders" :key="o.orderId" class="hover:bg-slate-50 transition">
                                        <td>
                                            <div class="font-bold text-slate-700 text-sm">{{ o.name }}</div>
                                            <div class="text-[11px] text-slate-400 font-bold mt-0.5"><i class="fas fa-phone-alt scale-75 mr-1"></i>{{ o.phone }}</div>
                                        </td>
                                        <td class="text-xs text-slate-500 max-w-[200px] truncate">{{ getCourseName(o.courseId) }}</td>
                                        <td class="text-center">
                                            <div class="font-bold text-slate-700 text-sm">${{ Number(o.amount).toLocaleString() }}</div>
                                            <span class="text-[9px] px-1.5 py-0.5 rounded font-black tracking-tighter" :class="o.status==='PAID'?'bg-green-100 text-green-700':'bg-yellow-100 text-yellow-700'">{{ o.status }}</span>
                                        </td>
                                        <td class="text-right">
                                            <button @click="openOrder(o)" class="text-blue-500 font-black text-xs hover:underline">管理</button>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </main>
        </template>

        <!-- --- 課程編輯彈窗 --- -->
        <transition name="fade">
            <div v-if="showCourseModal" class="modal-mask">
                <div class="modal-pop animate-pop">
                    <div class="h-14 border-b px-6 flex justify-between items-center bg-white shrink-0">
                        <h3 class="font-black text-slate-800 tracking-tight">{{ isEditingCourse ? '修改課程資訊' : '建立宏學新課程' }}</h3>
                        <button @click="showCourseModal=false" class="w-8 h-8 rounded-full hover:bg-slate-100 transition flex items-center justify-center"><i class="fas fa-times text-slate-400"></i></button>
                    </div>
                    <div class="flex-1 overflow-y-auto p-6 md:p-8 grid grid-cols-1 md:grid-cols-2 gap-6 bg-slate-50/30">
                        <!-- 圖片上傳區塊 -->
                        <div class="md:col-span-2">
                            <label class="text-[11px] font-black text-slate-400 block mb-2 uppercase tracking-widest">課程封面圖 (JPEG 0.7 壓縮)</label>
                            <div @click="$refs.fileInput.click()" class="upload-placeholder overflow-hidden bg-white shadow-inner">
                                <img v-if="courseForm.image" :src="courseForm.image" class="w-full h-full object-contain">
                                <div v-else class="text-center">
                                    <i class="fas fa-cloud-upload-alt text-3xl mb-3 text-slate-200"></i>
                                    <p class="text-[11px] font-bold">點擊上傳或更換圖片</p>
                                    <p class="text-[10px] text-slate-300 mt-1">系統將自動壓縮至 800px 以內</p>
                                </div>
                            </div>
                            <input type="file" ref="fileInput" @change="processImage" accept="image/*" class="hidden">
                        </div>

                        <div class="md:col-span-2">
                            <label class="text-[11px] font-black text-slate-400 block mb-1 uppercase tracking-widest">課程名稱</label>
                            <input v-model="courseForm.name" class="input-line h-11 font-bold" placeholder="例如：靈脈重啟三日工作坊">
                        </div>
                        <div>
                            <label class="text-[11px] font-black text-slate-400 block mb-1 uppercase tracking-widest">課程編號 (ID)</label>
                            <input v-model="courseForm.id" class="input-line h-11 bg-slate-50 font-mono text-xs" readonly placeholder="系統自動生成">
                        </div>
                        <div>
                            <label class="text-[11px] font-black text-slate-400 block mb-1 uppercase tracking-widest">上架狀態</label>
                            <select v-model="courseForm.status" class="input-line h-11 font-bold">
                                <option value="下架">下架 (暫不對外開放)</option>
                                <option value="上架">上架 (開放學員報名)</option>
                            </select>
                        </div>
                        <div>
                            <label class="text-[11px] font-black text-slate-400 block mb-1 uppercase tracking-widest">上課日期</label>
                            <input v-model="courseForm.startDate" class="input-line h-11" placeholder="YYYY-MM-DD">
                        </div>
                        <div>
                            <label class="text-[11px] font-black text-slate-400 block mb-1 uppercase tracking-widest">課程單價 (TWD)</label>
                            <input v-model="courseForm.price" type="number" class="input-line h-11 font-black text-green-600 text-lg">
                        </div>
                        <div>
                            <label class="text-[11px] font-black text-slate-400 block mb-1 uppercase tracking-widest">總名額</label>
                            <input v-model="courseForm.capacity" type="number" class="input-line h-11">
                        </div>
                        <div>
                            <label class="text-[11px] font-black text-slate-400 block mb-1 uppercase tracking-widest">上課時段</label>
                            <input v-model="courseForm.startTime" class="input-line h-11" placeholder="例如：19:00 - 21:00">
                        </div>
                        <div class="md:col-span-2">
                            <label class="text-[11px] font-black text-slate-400 block mb-1 uppercase tracking-widest">課程介紹</label>
                            <textarea v-model="courseForm.description" rows="4" class="input-line text-sm leading-relaxed" placeholder="請輸入課程詳細內容與介紹..."></textarea>
                        </div>
                    </div>
                    <div class="h-16 border-t px-6 flex justify-end items-center gap-3 bg-white shrink-0">
                        <button @click="showCourseModal=false" class="btn-white px-8">取消</button>
                        <button @click="saveCourse" :disabled="isLoading" class="btn-green px-12 shadow-md">
                            {{ isLoading ? '正在儲存中...' : '確認儲存資料' }}
                        </button>
                    </div>
                </div>
            </div>
        </transition>

        <!-- 其他彈窗 (與原版邏輯一致) -->
        <div v-if="showAttendanceModal" class="modal-mask">...</div>
        <div v-if="showOrderModal" class="modal-mask">...</div>

    </div>

    <script>
        const { createApp, ref, computed, onMounted } = Vue;
        // 使用宏學專屬的 Worker API
        const API_ENDPOINT = 'https://action.fangwl591021.workers.dev/';
        const MACRO_TOKEN = 'macro-import-2026';

        createApp({
            setup() {
                const isLoggedIn = ref(false), account = ref(''), password = ref(''), isLoading = ref(false), error = ref('');
                const currentTab = ref('courses'), courses = ref([]), orders = ref([]);
                const searchTerm = ref(''), searchCourseTerm = ref('');

                const showCourseModal = ref(false), isEditingCourse = ref(false), courseForm = ref({});
                const showOrderModal = ref(false), editingOrder = ref({});
                const showAttendanceModal = ref(false), attendanceCourse = ref(null), attendanceDate = ref(''), attendanceList = ref([]);

                const tabLabel = computed(() => ({ 'dashboard': '營運總覽', 'courses': '課程管理系統', 'orders': '報名訂單維護' }[currentTab.value]));

                const callApi = async (action, payload = {}) => {
                    const res = await fetch(API_ENDPOINT, {
                        method: 'POST',
                        headers: { 
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${MACRO_TOKEN}`
                        },
                        body: JSON.stringify({ action, payload })
                    });
                    const json = await res.json();
                    if (json.status !== 'success' && json.success !== true) throw new Error(json.message || '系統連線錯誤');
                    return json.data || json.message;
                };

                // 處理圖片：遵守手冊雷區 1 的 Canvas 壓縮邏輯
                const processImage = (event) => {
                    const file = event.target.files[0];
                    if (!file) return;
                    
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const img = new Image();
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            let width = img.width;
                            let height = img.height;
                            const max_size = 800; // 手冊建議：限制最大寬度 800px

                            if (width > max_size) {
                                height *= max_size / width;
                                width = max_size;
                            }
                            canvas.width = width;
                            canvas.height = height;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, width, height);
                            
                            // 手冊建議：壓縮為 JPEG 0.7 品質，避免傳輸超載
                            const compressedBase64 = canvas.toDataURL('image/jpeg', 0.7);
                            courseForm.value.image = compressedBase64;
                        };
                        img.src = e.target.result;
                    };
                    reader.readAsDataURL(file);
                };

                const login = async () => {
                    error.value = '';
                    if (account.value !== 'action' || password.value !== '@1234') { error.value = '帳號或密碼輸入錯誤'; return; }
                    isLoading.value = true;
                    try {
                        isLoggedIn.value = true;
                        fetchData();
                    } catch (e) { 
                        error.value = '伺服器連線失敗'; 
                    } finally { 
                        isLoading.value = false; 
                    }
                };

                const fetchData = async () => {
                    isLoading.value = true;
                    try {
                        const d = await callApi('ADMIN_GET_DATA');
                        courses.value = d.courses || [];
                        orders.value = (d.orders || []).reverse();
                    } catch (e) { 
                        console.error('資料更新失敗', e); 
                    } finally { 
                        isLoading.value = false; 
                    }
                };

                const executeMacroImport = async () => {
                    if (!confirm('執行宏學表單自動匯入？系統將偵測並略過重複編號。')) return;
                    isLoading.value = true;
                    try {
                        const msg = await callApi('MACRO_IMPORT');
                        alert(msg); 
                        fetchData();
                    } catch (e) { 
                        alert('匯入異常：' + e.message); 
                    } finally { 
                        isLoading.value = false; 
                    }
                };

                // 排序邏輯：將最新建立/日期的課程排在最上方
                const filteredCourses = computed(() => {
                    const s = searchCourseTerm.value.toLowerCase();
                    let res = courses.value.filter(c => !s || String(c.name).toLowerCase().includes(s) || String(c.id).toLowerCase().includes(s));
                    return res.sort((a, b) => {
                        const idA = String(a.id || "");
                        const idB = String(b.id || "");
                        // 優先依據 ID (包含日期戳記) 做倒序排列
                        return idB.localeCompare(idA);
                    });
                });

                const filteredOrders = computed(() => {
                    const s = searchTerm.value.toLowerCase();
                    return orders.value.filter(o => !s || String(o.name).includes(s) || String(o.phone).includes(s) || String(o.orderId).includes(s));
                });

                const dashboardStats = computed(() => {
                    let rev = 0;
                    orders.value.forEach(o => { if (o.status === 'PAID') rev += Number(o.amount); });
                    return { 
                        totalRevenue: rev, 
                        pendingCount: orders.value.filter(o => o.status === 'PENDING').length 
                    };
                });

                const openAddCourse = () => {
                    isEditingCourse.value = false;
                    courseForm.value = { id: '', name: '', startDate: '', startTime: '19:00', endTime: '21:00', price: 0, capacity: 20, status: '下架', image: '', type: '常態課程', location: '宏學教室', description: '' };
                    showCourseModal.value = true;
                };

                const openEditCourse = (c) => { 
                    isEditingCourse.value = true; 
                    courseForm.value = { ...c }; 
                    showCourseModal.value = true; 
                };
                
                const saveCourse = async () => {
                    isLoading.value = true;
                    try {
                        const action = isEditingCourse.value ? 'ADMIN_UPDATE_COURSE' : 'ADMIN_ADD_COURSE';
                        await callApi(action, courseForm.value);
                        alert('資料儲存成功！'); 
                        showCourseModal.value = false; 
                        fetchData();
                    } catch (e) { 
                        alert('儲存失敗：' + e.message); 
                    } finally { 
                        isLoading.value = false; 
                    }
                };

                const logout = () => { isLoggedIn.value = false; account.value = ''; password.value = ''; };
                const getCourseName = (id) => (courses.value.find(c => c.id === id) || { name: '未知' }).name;
                const formatDate = (d) => {
                    if (!d || d === '1970-01-01') return '未定';
                    return d;
                };
                const handleImgError = (e) => {
                    e.target.style.display = 'none';
                    e.target.parentElement.innerHTML = '<i class="fas fa-image text-slate-200"></i>';
                };

                return {
                    isLoggedIn, account, password, isLoading, error, currentTab, tabLabel,
                    courses, orders, searchTerm, searchCourseTerm, filteredCourses, filteredOrders, dashboardStats,
                    showCourseModal, isEditingCourse, courseForm, showOrderModal, editingOrder, showAttendanceModal, attendanceCourse, attendanceDate, attendanceList,
                    login, logout, fetchData, executeMacroImport, openAddCourse, openEditCourse, saveCourse, processImage, getCourseName, formatDate, handleImgError
                };
            }
        }).mount('#app');
    </script>
</body>

</html>
