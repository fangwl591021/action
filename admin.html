<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>宏學課程系統 - 後台管理</title>
  <style>
    /* 沿用極簡、無外框、貼近 LINE 原生格式 */
    :root {
      --line-bg: #f4f5f6;
      --line-text-main: #111111;
      --line-text-sub: #666666;
      --line-border: #ebebeb;
      --admin-header: #333333;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background-color: var(--line-bg);
      margin: 0;
      padding: 0;
      color: var(--line-text-main);
      -webkit-font-smoothing: antialiased;
    }
    
    .header {
      background-color: var(--admin-header);
      color: white;
      padding: 14px 16px;
      font-size: 16px;
      text-align: center;
      font-weight: 400;
    }

    .list-container {
      background-color: #ffffff;
      width: 100%;
    }
    
    .booking-item {
      padding: 14px 16px;
      border-bottom: 1px solid var(--line-border);
    }
    .booking-item:last-child {
      border-bottom: none;
    }
    
    .booking-title {
      font-size: 15px;
      margin-bottom: 6px;
      color: var(--line-text-main);
      font-weight: 400; 
    }
    
    .booking-info {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      color: var(--line-text-sub);
      margin-bottom: 4px;
      line-height: 1.4;
    }

    .status-tag {
      color: #00b900;
      font-size: 14px;
    }
    
    .loading {
      text-align: center;
      padding: 30px 16px;
      color: var(--line-text-sub);
      font-size: 14px;
    }
  </style>
</head>
<body>

  <div class="header">預約名單管理</div>
  
  <div id="loading" class="loading">讀取預約資料中...</div>
  
  <div id="booking-list" class="list-container"></div>

  <script>
    window.onload = function() {
      // 呼叫後端 getBookings 函式取得預約名單
      if (typeof google !== 'undefined' && google.script) {
        google.script.run
          .withSuccessHandler(renderBookings)
          .withFailureHandler(showError)
          .getBookings();
      } else {
        renderBookings([
          { "預約日期": "2026/04/08 10:00", "課程名稱": "測試課程 (本機)", "預約人": "測試員", "狀態": "已報名" }
        ]);
      }
    };

    function renderBookings(data) {
      document.getElementById('loading').style.display = 'none';
      const container = document.getElementById('booking-list');
      
      if (!data || data.length === 0) {
        container.innerHTML = '<div class="loading">目前尚無任何預約紀錄</div>';
        return;
      }

      let html = '';
      
      data.forEach(function(record) {
        html += '<div class="booking-item">';
        html += '<div class="booking-title">' + escapeHtml(String(record['課程名稱'] || '未命名')) + '</div>';
        
        // 迴圈印出名單詳細資訊
        for (const [key, val] of Object.entries(record)) {
          if (key === '課程名稱') continue; // 標題已顯示
          
          html += '<div class="booking-info">';
          html += '<span>' + escapeHtml(String(key)) + '</span>';
          
          // 針對狀態改變顏色 (純文字不加粗，以顏色區分)
          if (key === '狀態') {
            html += '<span class="status-tag">' + escapeHtml(String(val)) + '</span>';
          } else {
            html += '<span>' + escapeHtml(String(val)) + '</span>';
          }
          html += '</div>';
        }
        
        html += '</div>';
      });

      container.innerHTML = html;
    }

    function showError(error) {
      document.getElementById('loading').innerText = '系統錯誤：' + error.message;
    }

    function escapeHtml(unsafeText) {
      return unsafeText
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }
  </script>
</body>
</html>
