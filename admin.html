<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宏學管理後台</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vue/3.3.4/vue.global.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap"
        rel="stylesheet">
    <style>
        [v-cloak] { display: none !important; }
        :root { --line-green: #06C755; --bg-body: #f8fafc; --text-main: #1e293b; }
        body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg-body); color: var(--text-main); overflow: hidden; }
        .sidebar { width: 220px; background: white; border-right: 1px solid #e2e8f0; display: flex; flex-direction: column; flex-shrink: 0; z-index: 50; }
        .menu-item { display: flex; align-items: center; width: 100%; height: 50px; padding: 0 24px; color: #64748b; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.2s; border-left: 4px solid transparent; }
        .menu-item:hover { background-color: #f1f5f9; color: var(--line-green); }
        .menu-item.active { background-color: #f0fdf4; color: var(--line-green); border-left-color: var(--line-green); font-weight: 700; }
        .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .top-header { height: 60px; background: white; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: space-between; padding: 0 32px; }
        .content-scroll { flex: 1; overflow-y: auto; padding: 24px; }
        .card { background: white; border-radius: 8px; border: 1px solid #e2e8f0; margin-bottom: 20px; overflow: hidden; }
        .data-table { width: 100%; border-collapse: collapse; }
        .data-table th { padding: 12px 16px; background: #f8fafc; color: #94a3b8; font-size: 11px; font-weight: 700; text-align: left; border-bottom: 1px solid #e2e8f0; }
        .data-table td { padding: 14px 16px; font-size: 14px; border-bottom: 1px solid #f1f5f9; }
        .btn-green { background: var(--line-green); color: white; padding: 8px 16px; border-radius: 6px; font-weight: 700; font-size: 13px; display: inline-flex; align-items: center; gap: 6px; transition: 0.2s; }
        .btn-white { background: white; border: 1px solid #e2e8f0; color: #475569; padding: 8px 16px; border-radius: 6px; font-size: 13px; font-weight: 600; }
        .input-line { width: 100%; border: 1px solid #e2e8f0; border-radius: 6px; padding: 8px 12px; font-size: 14px; outline: none; transition: border 0.2s; }
        .modal-mask { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.4); z-index: 9999; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(2px); }
        .modal-pop { background: white; width: 90%; max-width: 800px; max-height: 90vh; border-radius: 12px; display: flex; flex-direction: column; box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
        .upload-placeholder { width: 100%; height: 140px; border: 2px dashed #e2e8f0; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #94a3b8; cursor: pointer; transition: 0.2s; }
        .upload-placeholder:hover { border-color: var(--line-green); color: var(--line-green); background: #f0fdf4; }
        
        @media (max-width: 768px) {
            .sidebar { width: 100%; height: 60px; position: fixed; bottom: 0; flex-direction: row; border-right: 0; border-top: 1px solid #e2e8f0; }
            .main-content { margin-left: 0; padding-bottom: 60px; }
            .menu-item { padding: 0; flex: 1; flex-direction: column; justify-content: center; font-size: 10px; border-left: 0; border-top: 3px solid transparent; }
            .menu-item.active { border-top-color: var(--line-green); background: transparent; }
            .menu-item i { font-size: 18px; margin-bottom: 4px; }
        }
    </style>
</head>

<body>

    <div id="app" v-cloak class="flex h-screen w-full">
        
        <!-- --- 登入頁面 --- -->
        <div v-if="!isLoggedIn" class="fixed inset-0 z-[1000] flex items-center justify-center bg-slate-50">
            <div class="bg-white p-10 rounded-2xl shadow-sm w-[90%] md:w-[400px] text-center border border-slate-200">
                <div class="w-16 h-16 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-6 text-2xl">
                    <i class="fas fa-user-shield"></i>
                </div>
                <h1 class="text-2xl font-black text-slate-800 mb-8 tracking-tight">宏學管理系統</h1>
                <div class="space-y-4 text-left">
                    <input v-model="account" type="text" class="input-line h-12" placeholder="管理帳號">
                    <input v-model="password" @keyup.enter="login" type="password" class="input-line h-12" placeholder="管理密碼">
                    <button @click="login" :disabled="isLoading" class="w-full btn-green justify-center h-12 text-base shadow-sm mt-2">
                        {{ isLoading ? '連線中...' : '登入系統' }}
                    </button>
                </div>
                <p v-if="error" class="text-red-500 text-sm mt-6 font-bold flex items-center justify-center gap-1">
                    <i class="fas fa-exclamation-circle"></i> {{ error }}
                </p>
            </div>
        </div>

        <!-- --- 主管理區域 --- -->
        <template v-else>
            <aside class="sidebar shadow-sm">
                <div class="p-6 font-black text-lg border-b text-slate-800 hidden md:block">宏學管理中心</div>
                <nav class="flex-1 py-2">
                    <div class="menu-item" :class="{active: currentTab==='dashboard'}" @click="currentTab='dashboard'">
                        <i class="fas fa-th-large w-5 mr-3"></i> <span>統計總覽</span>
                    </div>
                    <div class="menu-item" :class="{active: currentTab==='courses'}" @click="currentTab='courses'">
                        <i class="fas fa-book w-5 mr-3"></i> <span>課程管理</span>
                    </div>
                    <div class="menu-item" :class="{active: currentTab==='orders'}" @click="currentTab='orders'">
                        <i class="fas fa-receipt w-5 mr-3"></i> <span>報名訂單</span>
                    </div>
                    <div class="mt-4 border-t pt-2">
                        <div class="menu-item text-slate-400 hover:text-red-500" @click="logout">
                            <i class="fas fa-sign-out-alt w-5 mr-3"></i> <span>登出系統</span>
                        </div>
                    </div>
                </nav>
            </aside>

            <main class="main-content">
                <header class="top-header">
                    <h2 class="text-lg font-black text-slate-800 tracking-tight">{{ tabLabel }}</h2>
                    <div class="flex gap-2">
                        <button v-if="currentTab==='courses'" @click="executeMacroImport" class="btn-white text-blue-600 border-blue-200">
                            <i class="fas fa-cloud-download-alt mr-1"></i> 自動匯入
                        </button>
                        <button @click="fetchData" class="btn-white"><i class="fas fa-sync-alt" :class="{'fa-spin':isLoading}"></i> 資料同步</button>
                    </div>
                </header>

                <div class="content-scroll">
                    <!-- 統計頁面 -->
                    <div v-if="currentTab==='dashboard'" class="animate-fade-in">
                        <div class="grid grid-cols-2 md:grid-cols-5 gap-4 mb-8">
                            <div class="card p-5 border-l-4 border-l-green-500">
                                <p class="text-slate-400 text-[10px] font-bold uppercase mb-1">實收金額</p>
                                <h3 class="text-xl font-black text-green-600">${{ dashboardStats.totalRevenue.toLocaleString() }}</h3>
                            </div>
                            <div class="card p-5 border-l-4 border-l-orange-400">
                                <p class="text-slate-400 text-[10px] font-bold uppercase mb-1">待收金額</p>
                                <h3 class="text-xl font-black text-orange-500">${{ dashboardStats.pendingRevenue.toLocaleString() }}</h3>
                            </div>
                            <div class="card p-5 border-l-4 border-l-blue-500">
                                <p class="text-slate-400 text-[10px] font-bold uppercase mb-1">課程總量</p>
                                <h3 class="text-xl font-black text-blue-600">{{ courses.length }} <span class="text-xs">堂</span></h3>
                            </div>
                            <div class="card p-5 border-l-4 border-l-purple-500">
                                <p class="text-slate-400 text-[10px] font-bold uppercase mb-1">會員總數</p>
                                <h3 class="text-xl font-black text-purple-600">{{ users.length }} <span class="text-xs">人</span></h3>
                            </div>
                            <div class="card p-5 border-l-4 border-l-red-500">
                                <p class="text-slate-400 text-[10px] font-bold uppercase mb-1">退款金額</p>
                                <h3 class="text-xl font-black text-red-500">${{ dashboardStats.refundedRevenue.toLocaleString() }}</h3>
                            </div>
                        </div>

                        <div class="card overflow-hidden">
                            <table class="data-table">
                                <thead class="bg-gray-50">
                                    <tr>
                                        <th>各課程營收明細</th>
                                        <th class="text-center">已付</th>
                                        <th class="text-center">實收</th>
                                        <th class="text-center">待付</th>
                                        <th class="text-center">待收</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr v-for="stat in courseStats" :key="stat.id" class="hover:bg-slate-50 transition">
                                        <td class="font-bold text-slate-700 text-sm">{{ stat.name }}</td>
                                        <td class="text-center">{{ stat.paidCount }}</td>
                                        <td class="text-center text-green-600 font-bold">${{ stat.paidRevenue.toLocaleString() }}</td>
                                        <td class="text-center text-orange-500">{{ stat.pendingCount }}</td>
                                        <td class="text-center text-orange-500 font-bold">${{ stat.pendingRevenue.toLocaleString() }}</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <!-- 課程管理 -->
                    <div v-if="currentTab==='courses'" class="animate-fade-in">
                        <div class="flex justify-between items-center mb-6">
                            <input v-model="searchCourseTerm" class="input-line max-w-xs h-10" placeholder="搜尋課程名稱、編號...">
                            <button @click="openAddCourse" class="btn-green h-10 shadow-sm"><i class="fas fa-plus"></i> 新增課程</button>
                        </div>
                        <div class="card overflow-hidden">
                            <table class="data-table">
                                <thead>
                                    <tr>
                                        <th class="w-16">預覽</th>
                                        <th>課程資訊 (依編號與日期排序)</th>
                                        <th>開始日期</th>
                                        <th>費用 / 名額</th>
                                        <th class="text-center">狀態</th>
                                        <th class="text-right">管理</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr v-for="c in filteredCourses" :key="c.id" class="hover:bg-slate-50 transition">
                                        <td>
                                            <div class="w-10 h-10 bg-slate-100 rounded overflow-hidden flex items-center justify-center border">
                                                <img v-if="c.image" :src="c.image" class="w-full h-full object-cover" @error="handleImgError">
                                                <i v-else class="fas fa-image text-slate-300"></i>
                                            </div>
                                        </td>
                                        <td>
                                            <div class="font-bold text-slate-700">{{ c.name }}</div>
                                            <div class="text-[10px] text-slate-400 font-mono mt-1">{{ c.id }}</div>
                                        </td>
                                        <td class="text-sm text-slate-500">{{ formatDate(c.startDate) }}</td>
                                        <td>
                                            <div class="font-bold text-green-600 text-sm">${{ Number(c.price).toLocaleString() }}</div>
                                            <div class="text-[10px] text-slate-400 font-bold">{{ c.enrolled }} / {{ c.capacity }} 人</div>
                                        </td>
                                        <td class="text-center">
                                            <span class="px-2 py-0.5 rounded text-[10px] font-bold" :class="c.status==='上架'?'bg-green-100 text-green-700':'bg-slate-100 text-slate-400'">{{ c.status }}</span>
                                        </td>
                                        <td class="text-right space-x-3">
                                            <button @click="openAttendance(c)" class="text-blue-600 font-bold text-xs hover:underline">簽到</button>
                                            <button @click="openEditCourse(c)" class="text-slate-400 font-bold text-xs hover:underline">編輯</button>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                            <div v-if="filteredCourses.length === 0" class="p-20 text-center text-slate-300">查無資料</div>
                        </div>
                    </div>

                    <!-- 訂單管理 -->
                    <div v-if="currentTab==='orders'" class="animate-fade-in">
                        <div class="mb-6"><input v-model="searchTerm" class="input-line max-w-md h-10" placeholder="搜尋姓名、電話、單號..."></div>
                        <div class="card overflow-hidden">
                            <table class="data-table">
                                <thead>
                                    <tr>
                                        <th>學員資訊</th>
                                        <th>報名課程</th>
                                        <th class="text-center">金額 / 狀態</th>
                                        <th class="text-right">操作</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr v-for="o in filteredOrders" :key="o.orderId" class="hover:bg-slate-50 transition">
                                        <td>
                                            <div class="font-bold text-slate-700 text-sm">{{ o.name }}</div>
                                            <div class="text-[10px] text-slate-400">{{ o.phone }}</div>
                                        </td>
                                        <td class="text-xs text-slate-500 max-w-[200px] truncate">{{ getCourseName(o.courseId) }}</td>
                                        <td class="text-center">
                                            <div class="font-bold text-green-600 text-sm">${{ Number(o.amount).toLocaleString() }}</div>
                                            <span class="text-[9px] px-1.5 py-0.5 rounded font-bold" :class="o.status==='PAID'?'bg-green-100 text-green-700':'bg-yellow-100 text-yellow-700'">{{ o.status }}</span>
                                        </td>
                                        <td class="text-right"><button @click="openOrder(o)" class="text-blue-500 font-bold text-xs hover:underline">維護</button></td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </main>
        </template>

        <!-- --- MODALS --- -->

        <!-- 課程編輯/新增彈窗 -->
        <div v-if="showCourseModal" class="modal-mask">
            <div class="modal-pop">
                <div class="h-14 border-b px-6 flex justify-between items-center bg-white shrink-0">
                    <h3 class="font-black text-slate-800 tracking-tight">{{ isEditingCourse ? '修改課程資訊' : '建立宏學新課程' }}</h3>
                    <button @click="showCourseModal=false"><i class="fas fa-times text-slate-400"></i></button>
                </div>
                <div class="p-8 overflow-y-auto grid grid-cols-1 md:grid-cols-2 gap-6 bg-slate-50/50">
                    <div class="md:col-span-2">
                        <label class="text-[11px] font-bold text-slate-400 block mb-2 uppercase">課程封面 (自動壓縮 800px 0.7品質)</label>
                        <div @click="$refs.fileInput.click()" class="upload-placeholder overflow-hidden bg-white shadow-inner">
                            <img v-if="courseForm.image" :src="courseForm.image" class="w-full h-full object-contain">
                            <div v-else class="text-center"><i class="fas fa-cloud-upload-alt text-2xl mb-1 opacity-20"></i><p class="text-[10px]">點擊上傳封面</p></div>
                        </div>
                        <input type="file" ref="fileInput" @change="processImage" accept="image/*" class="hidden">
                    </div>
                    <div class="md:col-span-2">
                        <label class="text-[11px] font-black text-slate-400 block mb-1">課程名稱</label>
                        <input v-model="courseForm.name" class="input-line h-11 font-bold" placeholder="輸入課程名稱">
                    </div>
                    <div>
                        <label class="text-[11px] font-black text-slate-400 block mb-1">日期 (YYYY-MM-DD)</label>
                        <input v-model="courseForm.startDate" class="input-line h-11" placeholder="例如：2026-04-06">
                    </div>
                    <div>
                        <label class="text-[11px] font-black text-slate-400 block mb-1">上架狀態</label>
                        <select v-model="courseForm.status" class="input-line h-11">
                            <option value="下架">下架中 (不開放)</option>
                            <option value="上架">上架中 (開放報名)</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[11px] font-black text-slate-400 block mb-1">單價 (TWD)</label>
                        <input v-model="courseForm.price" type="number" class="input-line h-11 font-black text-green-600">
                    </div>
                    <div>
                        <label class="text-[11px] font-black text-slate-400 block mb-1">名額限制</label>
                        <input v-model="courseForm.capacity" type="number" class="input-line h-11">
                    </div>
                    <div class="md:col-span-2">
                        <label class="text-[11px] font-black text-slate-400 block mb-1">課程簡介</label>
                        <textarea v-model="courseForm.description" rows="3" class="input-line text-sm"></textarea>
                    </div>
                </div>
                <div class="h-16 border-t px-6 flex justify-end items-center gap-3 bg-white shrink-0">
                    <button @click="showCourseModal=false" class="btn-white px-8">取消</button>
                    <button @click="saveCourse" :disabled="isLoading" class="btn-green px-12 shadow-md">
                        {{ isLoading ? '儲存中...' : '確認並儲存資料' }}
                    </button>
                </div>
            </div>
        </div>

        <!-- 簽到管理 -->
        <div v-if="showAttendanceModal" class="modal-mask">
            <div class="modal-pop" style="max-width:500px;">
                <div class="h-14 border-b px-6 flex justify-between items-center bg-white shrink-0">
                    <h3 class="font-bold text-slate-800">簽到點名表</h3>
                    <button @click="showAttendanceModal=false"><i class="fas fa-times text-slate-400"></i></button>
                </div>
                <div class="p-4 border-b bg-slate-50 flex items-center justify-between">
                    <span class="text-xs font-bold text-slate-500">課程：{{ attendanceCourse.name }}</span>
                    <input type="date" v-model="attendanceDate" @change="loadAttendanceList" class="input-line w-36 text-xs h-8">
                </div>
                <div class="flex-1 overflow-y-auto p-4 space-y-2">
                    <div v-for="p in attendanceList" :key="p.orderId" class="flex justify-between items-center p-3 bg-white border border-slate-100 rounded-lg shadow-sm">
                        <span class="font-bold text-slate-700 text-sm">{{ p.name }}</span>
                        <select v-model="p.status" class="border rounded p-1 text-[11px] font-bold outline-none focus:border-green-500">
                            <option value="NONE">未點</option>
                            <option value="PRESENT" class="text-green-600">出席</option>
                            <option value="ABSENT" class="text-red-500">缺席</option>
                            <option value="LEAVE" class="text-orange-500">請假</option>
                        </select>
                    </div>
                </div>
                <div class="p-4 border-t bg-white shadow-lg"><button @click="saveAttendance" :disabled="isLoading" class="btn-green w-full justify-center h-10 font-bold">儲存簽到表</button></div>
            </div>
        </div>

        <!-- 訂單編輯彈窗 -->
        <div v-if="showOrderModal" class="modal-mask">
            <div class="modal-pop" style="max-width:380px; height:auto;">
                <div class="h-14 border-b px-6 flex justify-between items-center bg-white">
                    <h3 class="font-bold text-slate-800">報名訂單維護</h3>
                    <button @click="showOrderModal=false"><i class="fas fa-times text-slate-400"></i></button>
                </div>
                <div class="p-6 space-y-5 bg-slate-50">
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 block mb-1">付款狀態</label>
                        <select v-model="editingOrder.status" class="input-line font-bold h-10">
                            <option value="PENDING">待付款</option>
                            <option value="PAID">已完款</option>
                            <option value="CANCELLED">已取消</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 block mb-1">訂單金額</label>
                        <input v-model="editingOrder.amount" type="number" class="input-line h-10 font-black text-green-600">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 block mb-1">匯款末五碼</label>
                        <input v-model="editingOrder.remittance" class="input-line text-center h-10 font-mono tracking-widest" maxlength="5">
                    </div>
                </div>
                <div class="p-4 border-t bg-white"><button @click="saveOrder" :disabled="isLoading" class="btn-green w-full justify-center h-10 font-bold">更新訂單資料</button></div>
            </div>
        </div>

    </div>

    <script>
        const { createApp, ref, computed, onMounted } = Vue;
        const API_ENDPOINT = 'https://action.fangwl591021.workers.dev/';
        const MACRO_TOKEN = 'macro-import-2026';

        createApp({
            setup() {
                const isLoggedIn = ref(false), account = ref(''), password = ref(''), isLoading = ref(false), error = ref('');
                const currentTab = ref('dashboard'), courses = ref([]), orders = ref([]), users = ref([]);
                const searchTerm = ref(''), searchCourseTerm = ref('');

                const showCourseModal = ref(false), isEditingCourse = ref(false), courseForm = ref({});
                const showOrderModal = ref(false), editingOrder = ref({});
                const showAttendanceModal = ref(false), attendanceCourse = ref(null), attendanceDate = ref(''), attendanceList = ref([]);

                const tabLabel = computed(() => ({ 'dashboard': '統計數據分析', 'courses': '全課程管理系統', 'orders': '報名訂單紀錄' }[currentTab.value]));

                const callApi = async (action, payload = {}) => {
                    const res = await fetch(API_ENDPOINT, {
                        method: 'POST',
                        headers: { 
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${MACRO_TOKEN}`
                        },
                        body: JSON.stringify({ action, payload })
                    });
                    const json = await res.json();
                    if (json.status !== 'success' && json.success !== true) throw new Error(json.message || '連線失敗');
                    return json.data || json.message;
                };

                const login = async () => {
                    error.value = '';
                    if (account.value !== 'action' || password.value !== '@1234') { error.value = '帳號或密碼錯誤'; return; }
                    isLoading.value = true;
                    try {
                        isLoggedIn.value = true;
                        fetchData();
                    } catch (e) { error.value = '登入失敗 (401/CORS)，請確認 Worker 設定'; } finally { isLoading.value = false; }
                };

                const fetchData = async () => {
                    isLoading.value = true;
                    try {
                        const d = await callApi('ADMIN_GET_DATA');
                        courses.value = d.courses || [];
                        orders.value = (d.orders || []).reverse();
                        users.value = d.users || [];
                    } catch (e) { console.error('同步失敗', e); } finally { isLoading.value = false; }
                };

                const logout = () => {
                    isLoggedIn.value = false;
                    account.value = '';
                    password.value = '';
                    localStorage.removeItem('sportIsland_sso_uid');
                };

                const executeMacroImport = async () => {
                    if (!confirm('執行表單匯入？系統將偵測重複。')) return;
                    isLoading.value = true;
                    try {
                        const msg = await callApi('MACRO_IMPORT');
                        alert(msg); fetchData();
                    } catch (e) { alert('匯入失敗：' + e.message); } finally { isLoading.value = false; }
                };

                // 優化後的排序邏輯
                const filteredCourses = computed(() => {
                    const s = searchCourseTerm.value.toLowerCase();
                    let res = courses.value.filter(c => !s || String(c.name).toLowerCase().includes(s) || String(c.id).toLowerCase().includes(s));
                    
                    return res.sort((a, b) => {
                        // 1. 優先按日期倒序
                        const dateCompare = (b.startDate || '').localeCompare(a.startDate || '');
                        if (dateCompare !== 0) return dateCompare;
                        
                        // 2. 日期相同，嘗試按名稱數字倒序排列 (處理 1, 6, 11 這種情況)
                        const nameA = String(a.name || '');
                        const nameB = String(b.name || '');
                        const matchA = nameA.match(/\d+/);
                        const matchB = nameB.match(/\d+/);
                        const numA = matchA ? parseInt(matchA[0]) : 0;
                        const numB = matchB ? parseInt(matchB[0]) : 0;
                        
                        if (numA !== 0 || numB !== 0) {
                            return numB - numA;
                        }
                        
                        // 3. 最後才用 ID 倒序
                        return (b.id || '').localeCompare(a.id || '');
                    });
                });

                const filteredOrders = computed(() => {
                    const s = searchTerm.value.toLowerCase();
                    return orders.value.filter(o => !s || String(o.name).includes(s) || String(o.phone).includes(s) || String(o.orderId).includes(s));
                });

                const dashboardStats = computed(() => {
                    let rev = 0, pending = 0, refund = 0;
                    orders.value.forEach(o => {
                        if (o.status === 'PAID') rev += Number(o.amount);
                        if (o.status === 'PENDING') pending += Number(o.amount);
                        if (o.status === 'REFUNDED') refund += Number(o.amount);
                    });
                    return { totalRevenue: rev, pendingRevenue: pending, refundedRevenue: refund, pendingCount: orders.value.filter(o => o.status === 'PENDING').length };
                });

                const courseStats = computed(() => {
                    return courses.value.map(c => {
                        const cOrders = orders.value.filter(o => o.courseId === c.id);
                        return {
                            id: c.id, name: c.name,
                            paidCount: cOrders.filter(o => o.status === 'PAID').length,
                            paidRevenue: cOrders.filter(o => o.status === 'PAID').reduce((a, b) => a + Number(b.amount), 0),
                            pendingCount: cOrders.filter(o => o.status === 'PENDING').length,
                            pendingRevenue: cOrders.filter(o => o.status === 'PENDING').reduce((a, b) => a + Number(b.amount), 0)
                        };
                    });
                });

                const processImage = (event) => {
                    const file = event.target.files[0];
                    if (!file) return;
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const img = new Image();
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            let width = img.width, height = img.height, max = 800;
                            if (width > max) { height *= max / width; width = max; }
                            canvas.width = width; canvas.height = height;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, width, height);
                            courseForm.value.image = canvas.toDataURL('image/jpeg', 0.7);
                        };
                        img.src = e.target.result;
                    };
                    reader.readAsDataURL(file);
                };

                const openAddCourse = () => {
                    isEditingCourse.value = false;
                    courseForm.value = { id: '', name: '', startDate: '', price: 0, capacity: 20, status: '下架', image: '', type: '常態課程', description: '' };
                    showCourseModal.value = true;
                };

                const openEditCourse = (c) => { isEditingCourse.value = true; courseForm.value = { ...c }; showCourseModal.value = true; };
                
                const saveCourse = async () => {
                    isLoading.value = true;
                    try {
                        const action = isEditingCourse.value ? 'ADMIN_UPDATE_COURSE' : 'ADMIN_ADD_COURSE';
                        await callApi(action, courseForm.value);
                        alert('儲存成功！'); showCourseModal.value = false; fetchData();
                    } catch (e) { alert('儲存失敗：' + e.message); } finally { isLoading.value = false; }
                };

                const openAttendance = (c) => {
                    attendanceCourse.value = c;
                    attendanceDate.value = new Date().toISOString().split('T')[0];
                    loadAttendanceList();
                    showAttendanceModal.value = true;
                };

                const loadAttendanceList = async () => {
                    const courseOrders = orders.value.filter(o => o.courseId === attendanceCourse.value.id && o.status !== 'CANCELLED');
                    attendanceList.value = courseOrders.map(o => ({
                        orderId: o.orderId, name: o.name, phone: o.phone,
                        status: (o.extraData && o.extraData.attendance && o.extraData.attendance[attendanceDate.value]) || 'NONE'
                    }));
                };

                const saveAttendance = async () => {
                    isLoading.value = true;
                    try {
                        await callApi('ADMIN_UPDATE_ATTENDANCE', {
                            courseId: attendanceCourse.value.id, date: attendanceDate.value,
                            attendanceData: attendanceList.value.map(a => ({ orderId: a.orderId, status: a.status }))
                        });
                        alert('簽到表儲存成功！'); showAttendanceModal.value = false; fetchData();
                    } catch (e) { alert('儲存失敗'); } finally { isLoading.value = false; }
                };

                const openOrder = (o) => { editingOrder.value = { ...o }; showOrderModal.value = true; };
                const saveOrder = async () => {
                    isLoading.value = true;
                    try {
                        await callApi('ADMIN_UPDATE_ORDER', { orderData: editingOrder.value });
                        alert('訂單已更新！'); showOrderModal.value = false; fetchData();
                    } catch (e) { alert('更新失敗'); } finally { isLoading.value = false; }
                };

                const formatDate = (d) => { if (!d || d === '1970-01-01' || d.startsWith('1899')) return '未定'; return d; };
                const handleImgError = (e) => { e.target.style.display = 'none'; e.target.parentElement.innerHTML = '<i class="fas fa-image text-slate-300"></i>'; };
                const getCourseName = (id) => (courses.value.find(c => c.id === id) || { name: '未知' }).name;

                return {
                    isLoggedIn, account, password, isLoading, error, currentTab, tabLabel,
                    courses, orders, users, searchTerm, searchCourseTerm, filteredCourses, filteredOrders, dashboardStats, courseStats,
                    showCourseModal, isEditingCourse, courseForm, showOrderModal, editingOrder, showAttendanceModal, attendanceCourse, attendanceDate, attendanceList,
                    login, logout, fetchData, executeMacroImport, openAddCourse, openEditCourse, saveCourse, processImage, getCourseName, formatDate, handleImgError
                };
            }
        }).mount('#app');
    </script>
</body>

</html>
