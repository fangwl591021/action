<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宏學管理後台</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vue/3.3.4/vue.global.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap"
        rel="stylesheet">
    <style>
        [v-cloak] {
            display: none !important;
        }

        :root {
            --line-green: #06C755;
            --bg-body: #f8fafc;
            --text-main: #1e293b;
        }

        body {
            font-family: 'Noto Sans TC', -apple-system, sans-serif;
            background: var(--bg-body);
            color: var(--text-main);
            overflow: hidden;
        }

        .sidebar {
            width: 220px;
            background: white;
            border-right: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            z-index: 50;
        }

        .menu-item {
            display: flex;
            align-items: center;
            width: 100%;
            height: 50px;
            padding: 0 24px;
            color: #64748b;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            border-left: 4px solid transparent;
        }

        .menu-item:hover {
            background-color: #f1f5f9;
            color: var(--line-green);
        }

        .menu-item.active {
            background-color: #f0fdf4;
            color: var(--line-green);
            border-left-color: var(--line-green);
            font-weight: 700;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .top-header {
            height: 60px;
            background: white;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
        }

        .content-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
        }

        .card {
            background: white;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            margin-bottom: 20px;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
        }

        .data-table th {
            padding: 12px 16px;
            background: #f8fafc;
            color: #94a3b8;
            font-size: 12px;
            font-weight: 700;
            text-align: left;
            border-bottom: 1px solid #e2e8f0;
        }

        .data-table td {
            padding: 14px 16px;
            font-size: 14px;
            border-bottom: 1px solid #f1f5f9;
        }

        .btn-green {
            background: var(--line-green);
            color: white;
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: 700;
            font-size: 13px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-white {
            background: white;
            border: 1px solid #e2e8f0;
            color: #475569;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
        }

        .input-line {
            width: 100%;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            padding: 8px 12px;
            font-size: 14px;
            outline: none;
        }

        .input-line:focus { border-color: var(--line-green); }

        .modal-mask {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(2px);
        }

        .modal-pop {
            background: white;
            width: 90%;
            max-width: 800px;
            max-height: 90vh;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1);
        }

        @media (max-width: 768px) {
            .sidebar { width: 100%; height: 60px; position: fixed; bottom: 0; flex-direction: row; border-right: 0; border-top: 1px solid #e2e8f0; }
            .main-content { margin-left: 0; padding-bottom: 60px; }
            .menu-item { padding: 0; flex: 1; flex-direction: column; justify-content: center; font-size: 10px; border-left: 0; border-top: 3px solid transparent; }
            .menu-item.active { border-top-color: var(--line-green); background: transparent; }
            .menu-item i { font-size: 18px; margin-bottom: 4px; }
            .hidden-mobile { display: none; }
        }
    </style>
</head>

<body>

    <div id="app" v-cloak class="flex h-screen w-full">
        
        <!-- --- 登入頁面 --- -->
        <div v-if="!isLoggedIn" class="fixed inset-0 z-[1000] flex items-center justify-center bg-slate-50">
            <div class="bg-white p-10 rounded-2xl shadow-sm w-[90%] md:w-[400px] text-center border border-slate-200">
                <div class="w-16 h-16 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-6 text-2xl">
                    <i class="fas fa-user-shield"></i>
                </div>
                <h1 class="text-2xl font-black text-slate-800 mb-8 tracking-tight">宏學管理系統</h1>
                <div class="space-y-4">
                    <input v-model="account" type="text" class="input-line h-12" placeholder="管理帳號">
                    <input v-model="password" @keyup.enter="login" type="password" class="input-line h-12" placeholder="管理密碼">
                    <button @click="login" :disabled="isLoading" class="w-full btn-green justify-center h-12 text-base shadow-sm">
                        {{ isLoading ? '連線中...' : '登入系統' }}
                    </button>
                </div>
                <p v-if="error" class="text-red-500 text-sm mt-6 font-bold"><i class="fas fa-exclamation-circle mr-1"></i>{{ error }}</p>
            </div>
        </div>

        <!-- --- 主管理介面 --- -->
        <template v-else>
            <aside class="sidebar shadow-sm">
                <div class="p-6 font-black text-lg border-b tracking-tight text-slate-800 hidden md:block">宏學課程中心</div>
                <nav class="flex-1 py-2">
                    <div class="menu-item" :class="{active: currentTab==='dashboard'}" @click="currentTab='dashboard'">
                        <i class="fas fa-th-large w-5 mr-3"></i> <span>總覽</span>
                    </div>
                    <div class="menu-item" :class="{active: currentTab==='courses'}" @click="currentTab='courses'">
                        <i class="fas fa-book w-5 mr-3"></i> <span>課程</span>
                    </div>
                    <div class="menu-item" :class="{active: currentTab==='orders'}" @click="currentTab='orders'">
                        <i class="fas fa-receipt w-5 mr-3"></i> <span>訂單</span>
                    </div>
                    <div class="mt-4 border-t pt-2">
                        <div class="menu-item text-slate-400" @click="logout">
                            <i class="fas fa-sign-out-alt w-5 mr-3"></i> <span>登出</span>
                        </div>
                    </div>
                </nav>
            </aside>

            <main class="main-content">
                <header class="top-header">
                    <h2 class="text-lg font-bold text-slate-800">{{ tabName }}</h2>
                    <div class="flex gap-2">
                        <button v-if="currentTab==='courses'" @click="executeMacroImport" class="btn-white text-blue-600 border-blue-200">
                            <i class="fas fa-cloud-download-alt mr-1"></i> 自動匯入
                        </button>
                        <button @click="fetchData" class="btn-white"><i class="fas fa-sync-alt" :class="{'fa-spin':isLoading}"></i> 同步</button>
                    </div>
                </header>

                <div class="content-scroll">
                    <!-- 儀表板 -->
                    <div v-if="currentTab==='dashboard'" class="animate-fade-in">
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                            <div class="card p-6 border-l-4 border-l-green-500">
                                <p class="text-slate-400 text-xs font-bold uppercase tracking-wider mb-1">累計收費</p>
                                <h3 class="text-2xl font-black text-slate-800">${{ dashboardStats.totalRevenue.toLocaleString() }}</h3>
                            </div>
                            <div class="card p-6 border-l-4 border-l-orange-400">
                                <p class="text-slate-400 text-xs font-bold uppercase tracking-wider mb-1">待收筆數</p>
                                <h3 class="text-2xl font-black text-slate-800">{{ dashboardStats.pendingCount }} 筆</h3>
                            </div>
                            <div class="card p-6 border-l-4 border-l-blue-500">
                                <p class="text-slate-400 text-xs font-bold uppercase tracking-wider mb-1">課程總量</p>
                                <h3 class="text-2xl font-black text-slate-800">{{ courses.length }} 堂</h3>
                            </div>
                        </div>
                    </div>

                    <!-- 課程管理 -->
                    <div v-if="currentTab==='courses'">
                        <div class="flex justify-between items-center mb-6">
                            <input v-model="searchCourseTerm" class="input-line max-w-xs h-10" placeholder="關鍵字搜尋...">
                            <button @click="openAddCourse" class="btn-green h-10 shadow-sm"><i class="fas fa-plus"></i> 新增課程</button>
                        </div>
                        <div class="card overflow-hidden">
                            <table class="data-table">
                                <thead>
                                    <tr>
                                        <th>課程名稱 / 編號</th>
                                        <th>日期與時間</th>
                                        <th>費用 / 名額</th>
                                        <th class="text-center">狀態</th>
                                        <th class="text-right">管理</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr v-for="c in filteredCourses" :key="c.id" class="hover:bg-slate-50 transition">
                                        <td>
                                            <div class="font-bold text-slate-700">{{ c.name }}</div>
                                            <div class="text-[10px] text-slate-400 font-mono">{{ c.id }}</div>
                                        </td>
                                        <td class="text-sm text-slate-500">
                                            <div>{{ c.startDate }}</div>
                                            <div class="text-xs">{{ c.startTime }} - {{ c.endTime }}</div>
                                        </td>
                                        <td>
                                            <div class="font-bold text-green-600">${{ c.price }}</div>
                                            <div class="text-xs text-slate-400">{{ c.enrolled }} / {{ c.capacity }} 人</div>
                                        </td>
                                        <td class="text-center">
                                            <span class="px-2 py-0.5 rounded text-[11px] font-bold" :class="c.status==='上架'?'bg-green-100 text-green-700':'bg-slate-100 text-slate-400'">{{ c.status }}</span>
                                        </td>
                                        <td class="text-right space-x-3">
                                            <button @click="openAttendance(c)" class="text-blue-600 font-bold text-xs hover:underline">簽到</button>
                                            <button @click="openEditCourse(c)" class="text-slate-500 font-bold text-xs hover:underline">編輯</button>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                            <div v-if="filteredCourses.length === 0" class="p-20 text-center text-slate-300">查無課程資料</div>
                        </div>
                    </div>

                    <!-- 訂單管理 -->
                    <div v-if="currentTab==='orders'">
                        <div class="mb-6"><input v-model="searchTerm" class="input-line max-w-md" placeholder="搜尋姓名、電話、單號..."></div>
                        <div class="card overflow-hidden">
                            <table class="data-table">
                                <thead>
                                    <tr>
                                        <th>訂單學員</th>
                                        <th>報名課程</th>
                                        <th>金額 / 狀態</th>
                                        <th class="text-right">操作</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr v-for="o in filteredOrders" :key="o.orderId" class="hover:bg-slate-50 border-b">
                                        <td>
                                            <div class="font-bold text-slate-700">{{ o.name }}</div>
                                            <div class="text-xs text-slate-400">{{ o.phone }}</div>
                                        </td>
                                        <td class="text-sm text-slate-500">{{ getCourseName(o.courseId) }}</td>
                                        <td class="text-center">
                                            <div class="font-bold text-green-600 text-sm">${{ o.amount }}</div>
                                            <span class="text-[10px] px-1.5 py-0.5 rounded" :class="o.status==='PAID'?'bg-green-100 text-green-700':'bg-yellow-100 text-yellow-700'">{{ o.status }}</span>
                                        </td>
                                        <td class="text-right"><button @click="openOrder(o)" class="text-blue-500 font-bold text-xs hover:underline">維護</button></td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </main>
        </template>

        <!-- --- 彈窗模組 --- -->

        <!-- 課程編輯/新增 -->
        <div v-if="showCourseModal" class="modal-mask">
            <div class="modal-pop">
                <div class="h-14 border-b px-6 flex justify-between items-center bg-white shrink-0">
                    <h3 class="font-black text-slate-800">{{ isEditingCourse ? '修改課程資訊' : '建立宏學新課程' }}</h3>
                    <button @click="showCourseModal=false" class="w-8 h-8 rounded-full hover:bg-slate-100 transition"><i class="fas fa-times text-slate-400"></i></button>
                </div>
                <div class="p-8 overflow-y-auto grid grid-cols-1 md:grid-cols-2 gap-5 bg-slate-50/50">
                    <div class="md:col-span-2">
                        <label class="text-[11px] font-bold text-slate-400 block mb-1 uppercase">課程名稱</label>
                        <input v-model="courseForm.name" class="input-line" placeholder="輸入完整名稱">
                    </div>
                    <div>
                        <label class="text-[11px] font-bold text-slate-400 block mb-1 uppercase">課程類型</label>
                        <select v-model="courseForm.type" class="input-line">
                            <option value="常態課程">常態課程</option>
                            <option value="短期課程">短期課程</option>
                            <option value="特別講座">特別講座</option>
                            <option value="冬夏令營">冬夏令營</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[11px] font-bold text-slate-400 block mb-1 uppercase">上架狀態</label>
                        <select v-model="courseForm.status" class="input-line">
                            <option value="下架">下架 (前台隱藏)</option>
                            <option value="上架">上架 (開放報名)</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[11px] font-bold text-slate-400 block mb-1 uppercase">開始日期</label>
                        <input v-model="courseForm.startDate" class="input-line" placeholder="YYYY-MM-DD">
                    </div>
                    <div>
                        <label class="text-[11px] font-bold text-slate-400 block mb-1 uppercase">上課地點</label>
                        <input v-model="courseForm.location" class="input-line" placeholder="教室/地點">
                    </div>
                    <div>
                        <label class="text-[11px] font-bold text-slate-400 block mb-1 uppercase">費用 (TWD)</label>
                        <input v-model="courseForm.price" type="number" class="input-line font-bold text-green-600">
                    </div>
                    <div>
                        <label class="text-[11px] font-bold text-slate-400 block mb-1 uppercase">名額限制</label>
                        <input v-model="courseForm.capacity" type="number" class="input-line">
                    </div>
                    <div class="md:col-span-2">
                        <label class="text-[11px] font-bold text-slate-400 block mb-1 uppercase">課程說明</label>
                        <textarea v-model="courseForm.description" rows="3" class="input-line text-sm"></textarea>
                    </div>
                </div>
                <div class="h-16 border-t px-6 flex justify-end items-center gap-3 bg-white shrink-0">
                    <button @click="showCourseModal=false" class="btn-white px-6">取消</button>
                    <button @click="saveCourse" :disabled="isLoading" class="btn-green px-10 shadow-sm">確認儲存</button>
                </div>
            </div>
        </div>

        <!-- 簽到管理 -->
        <div v-if="showAttendanceModal" class="modal-mask">
            <div class="modal-pop" style="max-width:500px;">
                <div class="h-14 border-b px-6 flex justify-between items-center bg-white shrink-0">
                    <h3 class="font-bold text-slate-800">簽到表：{{ attendanceCourse.name }}</h3>
                    <button @click="showAttendanceModal=false" class="w-8 h-8 rounded-full hover:bg-slate-100"><i class="fas fa-times text-slate-400"></i></button>
                </div>
                <div class="p-4 border-b bg-slate-50 flex items-center justify-between">
                    <span class="text-xs font-bold text-slate-500">點名日期</span>
                    <input type="date" v-model="attendanceDate" @change="loadAttendanceList" class="input-line w-40 text-sm">
                </div>
                <div class="flex-1 overflow-y-auto p-4 space-y-2">
                    <div v-for="p in attendanceList" :key="p.orderId" class="flex justify-between items-center p-3 bg-white border border-slate-100 rounded-lg shadow-sm">
                        <span class="font-bold text-slate-700 text-sm">{{ p.name }}</span>
                        <select v-model="p.status" class="border rounded p-1 text-xs font-bold focus:border-green-500 outline-none">
                            <option value="NONE">未點</option>
                            <option value="PRESENT" class="text-green-600">出席</option>
                            <option value="ABSENT" class="text-red-500">缺席</option>
                            <option value="LEAVE" class="text-orange-500">請假</option>
                        </select>
                    </div>
                </div>
                <div class="p-4 border-t bg-white"><button @click="saveAttendance" :disabled="isLoading" class="btn-green w-full justify-center h-11 text-sm">儲存點名紀錄</button></div>
            </div>
        </div>

        <!-- 訂單編輯 -->
        <div v-if="showOrderModal" class="modal-mask">
            <div class="modal-pop" style="max-width:380px;">
                <div class="h-14 border-b px-6 flex justify-between items-center bg-white">
                    <h3 class="font-bold text-slate-800">訂單維護</h3>
                    <button @click="showOrderModal=false" class="w-8 h-8 rounded-full hover:bg-slate-100"><i class="fas fa-times text-slate-400"></i></button>
                </div>
                <div class="p-6 space-y-5 bg-slate-50">
                    <div>
                        <label class="text-[11px] font-bold text-slate-400 block mb-1">付款狀態</label>
                        <select v-model="editingOrder.status" class="input-line font-bold">
                            <option value="PENDING">待付款</option>
                            <option value="PAID">已完款</option>
                            <option value="CANCELLED">已取消</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[11px] font-bold text-slate-400 block mb-1">實收金額</label>
                        <input v-model="editingOrder.amount" type="number" class="input-line font-bold text-green-600">
                    </div>
                    <div>
                        <label class="text-[11px] font-bold text-slate-400 block mb-1">匯款後五碼</label>
                        <input v-model="editingOrder.remittance" class="input-line text-center font-mono tracking-widest" maxlength="5">
                    </div>
                </div>
                <div class="p-4 border-t bg-white"><button @click="saveOrder" :disabled="isLoading" class="btn-green w-full justify-center h-11 text-sm">更新訂單</button></div>
            </div>
        </div>

    </div>

    <script>
        const { createApp, ref, computed, onMounted } = Vue;
        const API_ENDPOINT = 'https://action.fangwl591021.workers.dev/';

        createApp({
            setup() {
                const isLoggedIn = ref(false), account = ref(''), password = ref(''), isLoading = ref(false), error = ref('');
                const currentTab = ref('dashboard'), courses = ref([]), orders = ref([]), users = ref([]);
                const searchTerm = ref(''), searchCourseTerm = ref('');

                const showCourseModal = ref(false), isEditingCourse = ref(false), courseForm = ref({});
                const showOrderModal = ref(false), editingOrder = ref({});
                const showAttendanceModal = ref(false), attendanceCourse = ref(null), attendanceDate = ref(''), attendanceList = ref([]);

                const tabName = computed(() => ({ 'dashboard': '營運總覽', 'courses': '課程管理', 'orders': '報名訂單' }[currentTab.value]));

                const callApi = async (action, payload = {}) => {
                    const res = await fetch(API_ENDPOINT, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer macro-import-2026' },
                        body: JSON.stringify({ action, payload })
                    });
                    const json = await res.json();
                    if (json.status !== 'success' && json.success !== true) throw new Error(json.message || 'API 錯誤');
                    return json.data || json.message;
                };

                const login = async () => {
                    error.value = '';
                    if (account.value !== 'action' || password.value !== '@1234') { error.value = '帳號或密碼錯誤'; return; }
                    isLoading.value = true;
                    try {
                        isLoggedIn.value = true;
                        fetchData();
                    } catch (e) { error.value = '登入失敗，請確認 Worker 連線'; } finally { isLoading.value = false; }
                };

                const fetchData = async () => {
                    isLoading.value = true;
                    try {
                        const d = await callApi('ADMIN_GET_DATA');
                        courses.value = d.courses || [];
                        orders.value = (d.orders || []).reverse();
                        users.value = d.users || [];
                    } catch (e) { console.error('同步失敗', e); } finally { isLoading.value = false; }
                };

                const executeMacroImport = async () => {
                    if (!confirm('執行宏學表單匯入？系統將自動偵測新課程。')) return;
                    isLoading.value = true;
                    try {
                        const msg = await callApi('MACRO_IMPORT');
                        alert(msg); fetchData();
                    } catch (e) { alert('匯入失敗：' + e.message); } finally { isLoading.value = false; }
                };

                const logout = () => { isLoggedIn.value = false; account.value = ''; password.value = ''; };

                const filteredCourses = computed(() => {
                    const s = searchCourseTerm.value.toLowerCase();
                    return courses.value.filter(c => !s || String(c.name).toLowerCase().includes(s) || String(c.id).toLowerCase().includes(s));
                });

                const filteredOrders = computed(() => {
                    const s = searchTerm.value.toLowerCase();
                    return orders.value.filter(o => !s || String(o.name).includes(s) || String(o.phone).includes(s) || String(o.orderId).includes(s));
                });

                const dashboardStats = computed(() => {
                    let rev = 0;
                    orders.value.forEach(o => { if (o.status === 'PAID') rev += Number(o.amount); });
                    return { totalRevenue: rev, pendingCount: orders.value.filter(o => o.status === 'PENDING').length, totalOrders: orders.value.length };
                });

                const openAddCourse = () => {
                    isEditingCourse.value = false;
                    courseForm.value = { id: '', name: '', startDate: '', startTime: '19:00', endTime: '21:00', price: 0, capacity: 20, status: '下架', type: '常態課程', location: '宏學教室', description: '' };
                    showCourseModal.value = true;
                };

                const openEditCourse = (c) => {
                    isEditingCourse.value = true;
                    courseForm.value = { ...c };
                    showCourseModal.value = true;
                };

                const saveCourse = async () => {
                    isLoading.value = true;
                    try {
                        const action = isEditingCourse.value ? 'ADMIN_UPDATE_COURSE' : 'ADMIN_ADD_COURSE';
                        await callApi(action, courseForm.value);
                        alert('儲存成功！'); showCourseModal.value = false; fetchData();
                    } catch (e) { alert('儲存失敗'); } finally { isLoading.value = false; }
                };

                const openAttendance = (c) => {
                    attendanceCourse.value = c;
                    attendanceDate.value = new Date().toISOString().split('T')[0];
                    loadAttendanceList();
                    showAttendanceModal.value = true;
                };

                const loadAttendanceList = async () => {
                    const courseOrders = orders.value.filter(o => o.courseId === attendanceCourse.value.id && o.status !== 'CANCELLED');
                    attendanceList.value = courseOrders.map(o => ({
                        orderId: o.orderId, name: o.name, phone: o.phone,
                        status: (o.extraData && o.extraData.attendance && o.extraData.attendance[attendanceDate.value]) || 'NONE'
                    }));
                };

                const saveAttendance = async () => {
                    isLoading.value = true;
                    try {
                        await callApi('ADMIN_UPDATE_ATTENDANCE', {
                            courseId: attendanceCourse.value.id, date: attendanceDate.value,
                            attendanceData: attendanceList.value.map(a => ({ orderId: a.orderId, status: a.status }))
                        });
                        alert('簽到紀錄已更新！'); showAttendanceModal.value = false; fetchData();
                    } catch (e) { alert('儲存失敗'); } finally { isLoading.value = false; }
                };

                const openOrder = (o) => { editingOrder.value = { ...o }; showOrderModal.value = true; };
                const saveOrder = async () => {
                    isLoading.value = true;
                    try {
                        await callApi('ADMIN_UPDATE_ORDER', { orderData: editingOrder.value });
                        alert('更新成功！'); showOrderModal.value = false; fetchData();
                    } catch (e) { alert('更新失敗'); } finally { isLoading.value = false; }
                };

                return {
                    isLoggedIn, account, password, isLoading, error, currentTab, tabName,
                    courses, orders, searchTerm, searchCourseTerm, filteredCourses, filteredOrders, dashboardStats,
                    showCourseModal, isEditingCourse, courseForm, showOrderModal, editingOrder, showAttendanceModal, attendanceCourse, attendanceDate, attendanceList,
                    login, logout, fetchData, executeMacroImport, openAddCourse, openEditCourse, saveCourse, openAttendance, loadAttendanceList, saveAttendance, openOrder, saveOrder,
                    getCourseName: id => (courses.value.find(c => c.id === id) || { name: '未知' }).name,
                    formatTime: d => d ? new Date(d).toLocaleDateString() : '-',
                    createProgress: { isCreating: false }
                };
            }
        }).mount('#app');
    </script>
</body>

</html>
