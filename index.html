<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>宏學課程系統</title>
  <style>
    :root {
      --line-bg: #f4f5f6;
      --line-text-main: #111111;
      --line-text-sub: #666666;
      --line-border: #ebebeb;
      --line-green: #06c755;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background-color: var(--line-bg);
      margin: 0;
      padding: 0;
      color: var(--line-text-main);
      -webkit-font-smoothing: antialiased;
    }
    .list-container {
      background-color: #ffffff;
      width: 100%;
    }
    .course-item {
      padding: 14px 16px;
      border-bottom: 1px solid var(--line-border);
    }
    .course-item:last-child {
      border-bottom: none;
    }
    .course-title {
      font-size: 16px;
      margin-bottom: 6px;
      color: var(--line-text-main);
      font-weight: 400; 
    }
    .course-info {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      color: var(--line-text-sub);
      margin-bottom: 4px;
      line-height: 1.4;
    }
    .book-btn {
      margin-top: 10px;
      width: 100%;
      background-color: var(--line-green);
      color: #ffffff;
      border: none;
      padding: 10px 0;
      font-size: 15px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 400;
    }
    .book-btn:active {
      opacity: 0.8;
    }
    .book-btn:disabled {
      background-color: #cccccc;
      cursor: not-allowed;
    }
    .loading {
      text-align: center;
      padding: 30px 16px;
      color: var(--line-text-sub);
      font-size: 14px;
    }
  </style>
</head>
<body>

  <div id="loading" class="loading">讀取課程表資料中...</div>
  <div id="course-list" class="list-container"></div>

  <script>
    window.onload = function() {
      if (typeof google !== 'undefined' && google.script) {
        google.script.run
          .withSuccessHandler(renderCourses)
          .withFailureHandler(showError)
          .getCourses();
      } else {
        renderCourses([
          {"課程名稱": "測試課程", "日期": "2026/05/01", "教練": "測試員"}
        ]);
      }
    };

    function renderCourses(data) {
      document.getElementById('loading').style.display = 'none';
      const container = document.getElementById('course-list');
      
      if (!data || data.length === 0) {
        container.innerHTML = '<div class="loading">目前沒有課程資料可以預約</div>';
        return;
      }

      let html = '';
      data.forEach(function(course) {
        const keys = Object.keys(course);
        if (keys.length === 0) return;

        const titleKey = keys[0];
        const titleValue = course[titleKey] || '未命名課程';

        html += '<div class="course-item">';
        html += '<div class="course-title">' + escapeHtml(String(titleValue)) + '</div>';

        for (let i = 1; i < keys.length; i++) {
          const key = keys[i];
          const val = course[key];
          
          if (val !== undefined && val !== '') {
            html += '<div class="course-info">';
            html += '<span>' + escapeHtml(String(key)) + '</span>';
            html += '<span>' + escapeHtml(String(val)) + '</span>';
            html += '</div>';
          }
        }

        html += '<button class="book-btn" onclick="bookCourse(this, \'' + escapeHtml(String(titleValue)) + '\')">預約</button>';
        html += '</div>';
      });
      container.innerHTML = html;
    }

    function showError(error) {
      document.getElementById('loading').innerText = '系統錯誤：' + error.message;
    }

    function bookCourse(btnElement, courseName) {
      if (typeof google !== 'undefined' && google.script) {
        const originalText = btnElement.innerText;
        btnElement.innerText = '處理中...';
        btnElement.disabled = true;

        google.script.run
          .withSuccessHandler(function(result) {
            alert(result);
            btnElement.innerText = '已預約';
          })
          .withFailureHandler(function(error) {
            alert('預約失敗：' + error.message);
            btnElement.innerText = originalText;
            btnElement.disabled = false;
          })
          .submitBooking(courseName);
      } else {
        alert('預約行為觸發：' + courseName);
      }
    }

    function escapeHtml(unsafeText) {
      return unsafeText
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }
  </script>
</body>
</html>
