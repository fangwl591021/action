<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>宏學</title>
    <!-- LINE SDK -->
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <!-- Vue 3 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vue/3.3.4/vue.global.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        input, select, textarea { font-size: 16px; }
        [v-cloak] { display: none !important; }
        
        /* 解放版面：完全扁平化 */
        body { background-color: #FFFFFF; }
        
        /* 註冊畫面方框風格 */
        .input-box { width: 100%; border: 1px solid #333333; padding: 12px; border-radius: 4px; font-size: 16px; color: #18181b; outline: none; }
        .input-box:focus { border-color: #06C755; }
        .input-label { display: block; font-size: 15px; font-weight: 500; color: #333; margin-bottom: 6px; }
        
        .btn-primary { background: #06C755; color: white; padding: 16px; border-radius: 8px; font-weight: bold; font-size: 16px; transition: 0.2s; width: 100%; }
        .btn-primary:active { transform: scale(0.98); opacity: 0.9; }
        
        /* 綠底白字標籤樣式 */
        .category-tab { @apply px-5 py-2 rounded-full text-[14px] font-medium transition-all whitespace-nowrap border border-transparent; }
        .category-tab-active { @apply bg-[#06C755] text-white border-[#06C755] shadow-sm; }
        .category-tab-inactive { @apply bg-gray-100 text-gray-500 hover:bg-gray-200; }
        
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* 課程卡片優化 */
        .course-card { @apply bg-white border border-gray-100 p-3 flex flex-col justify-between transition-all active:bg-gray-50; }
    </style>
</head>

<body class="text-gray-800 font-sans">
    <div id="app" v-cloak class="max-w-md mx-auto min-h-screen flex flex-col relative overflow-hidden">
        
        <!-- Header -->
        <header class="bg-[#06C755] text-white p-4 sticky top-0 z-30 flex items-center justify-between">
            <h1 class="text-[17px] font-bold tracking-tight">宏學</h1>
            <div v-if="userInfo.name || userProfile" class="flex items-center bg-black/10 px-3 py-1 rounded-full border border-white/5">
                <span class="text-xs font-normal">{{ userInfo.name || userProfile.displayName }}</span>
            </div>
        </header>

        <main class="flex-grow relative pb-24 overflow-y-auto">
            <div v-if="error" class="m-5 p-4 bg-red-50 text-red-700 rounded-xl text-sm border border-red-100">
                {{ error }}
            </div>

            <!-- 1. 課程列表視圖 -->
            <div v-else-if="view === 'course_list'" class="animate-fade-in">
                <!-- Banner 優先載入 -->
                <div class="w-full">
                    <img src="https://s3.us-west-1.wasabisys.com/aitw/2026/04/001bd74e24a00403a292608ec2853cb9.jpg" class="w-full h-auto block object-cover">
                </div>
                
                <!-- 功能按鈕區 -->
                <div class="px-5 py-6 grid grid-cols-3 gap-4 border-b border-gray-100">
                    <button @click="editProfile" class="text-gray-400 flex flex-col items-center gap-1 hover:text-[#06C755] transition">
                        <div class="w-12 h-12 bg-gray-50 rounded-full flex items-center justify-center text-xl text-gray-500"><i class="fas fa-user-gear"></i></div>
                        <span class="text-[11px] font-medium">基本資料</span>
                    </button>
                    <button @click="goToMyOrders" class="text-gray-400 flex flex-col items-center gap-1 hover:text-[#06C755] transition">
                        <div class="w-12 h-12 bg-gray-50 rounded-full flex items-center justify-center text-xl text-gray-500"><i class="fas fa-file-invoice"></i></div>
                        <span class="text-[11px] font-medium">報名紀錄</span>
                    </button>
                    <a href="https://lin.ee/Y0FKXqD" class="text-gray-400 flex flex-col items-center gap-1 hover:text-[#06C755] transition">
                        <div class="w-12 h-12 bg-gray-50 rounded-full flex items-center justify-center text-xl text-gray-500"><i class="fab fa-line"></i></div>
                        <span class="text-[11px] font-medium">聯絡客服</span>
                    </a>
                </div>

                <!-- 課程分類導覽 (綠底白字標籤) -->
                <div class="sticky top-0 bg-white z-20 px-5 py-4 border-b border-gray-50">
                    <div class="flex gap-2 overflow-x-auto hide-scrollbar">
                        <button v-for="cat in dynamicCategories" :key="cat.id" 
                                @click="expandedCategory = cat.id"
                                :class="expandedCategory === cat.id ? 'category-tab-active' : 'category-tab-inactive'"
                                class="category-tab">
                            {{ cat.name }}
                        </button>
                        <div v-if="isCoursesLoading" class="flex items-center ml-2">
                            <i class="fas fa-circle-notch fa-spin text-gray-300 text-xs"></i>
                        </div>
                    </div>
                </div>

                <!-- 課程列表區塊 -->
                <div class="p-4">
                    <div v-if="filteredCourses.length > 0" class="grid grid-cols-2 gap-3">
                        <div v-for="c in filteredCourses" :key="c.id" class="course-card rounded-xl shadow-sm">
                            <div>
                                <h3 class="font-bold text-gray-800 text-[14px] leading-snug mb-2 line-clamp-2 min-h-[2.5rem]">{{ c.name }}</h3>
                                <div class="text-[#06C755] font-black text-[15px] mb-3">${{ c.price }}</div>
                                <div class="text-[10px] text-gray-400 font-medium space-y-1 mb-4">
                                    <div class="flex items-center gap-1"><i class="far fa-calendar-alt"></i>{{ c.startDate }}</div>
                                </div>
                            </div>
                            <button @click="selectCourse(c)" :disabled="c.enrolled >= c.capacity" 
                                    class="w-full bg-gray-100 text-gray-800 py-2 rounded-lg text-[12px] font-bold active:bg-[#06C755] active:text-white transition disabled:opacity-30">
                                {{ c.enrolled >= c.capacity ? '額滿' : '立即報名' }}
                            </button>
                        </div>
                    </div>
                    <div v-else-if="!isCoursesLoading" class="text-center py-20 text-gray-400 font-medium">該分類暫無課程內容</div>
                    <!-- 載入中的骨架顯示 -->
                    <div v-if="isCoursesLoading" class="grid grid-cols-2 gap-3">
                        <div v-for="i in 4" :key="i" class="h-40 bg-gray-50 rounded-xl animate-pulse"></div>
                    </div>
                </div>
            </div>

            <!-- 2. 註冊畫面 (保持黑線方框架構) -->
            <div v-else-if="view === 'register'" class="p-6 animate-fade-in bg-white">
                <h2 class="text-[22px] font-bold text-gray-800 mb-6">基本資料設定</h2>

                <div v-if="regStep === 1" class="space-y-6">
                    <div>
                        <label class="input-label">姓名</label>
                        <input type="text" v-model="regForm.name" class="input-box" placeholder="真實姓名">
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div><label class="input-label">業種</label><input type="text" v-model="regForm.industry" class="input-box" placeholder="行銷"></div>
                        <div><label class="input-label">性別</label><select v-model="regForm.gender" class="input-box"><option value="男">男</option><option value="女">女</option></select></div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div><label class="input-label">手機</label><input type="tel" v-model="regForm.phone" class="input-box" placeholder="09xx-xxx-xxx"></div>
                        <div><label class="input-label">生日</label><input type="date" v-model="regForm.birthday" class="input-box"></div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div><label class="input-label">居住地區</label><input type="text" v-model="regForm.area" class="input-box" placeholder="桃園"></div>
                        <div><label class="input-label">完整地址</label><input type="text" v-model="regForm.address" class="input-box" placeholder="街道門牌"></div>
                    </div>

                    <div class="pt-10">
                        <button @click="regStep = 2" class="btn-primary">確認並繼續</button>
                    </div>
                </div>

                <div v-if="regStep === 2" class="space-y-8 animate-fade-in">
                    <div class="text-center py-10 bg-gray-50 rounded-3xl border border-dashed border-gray-200">
                        <i class="fas fa-address-card text-4xl text-[#06C755] mb-4"></i>
                        <h3 class="font-bold text-lg">建立商務名片</h3>
                        <p class="text-xs text-gray-400 mt-2 px-10">上傳名片後 AI 將自動辨識資訊，<br>產生您的專屬數位標籤。</p>
                    </div>
                    
                    <div class="flex gap-4">
                        <button @click="$refs.cameraInput.click()" class="flex-1 bg-[#06C755]/10 text-[#06C755] py-4 rounded-2xl font-bold flex items-center justify-center gap-2 border border-[#06C755]/20"><i class="fas fa-camera"></i> 拍照</button>
                        <button @click="$refs.albumInput.click()" class="flex-1 bg-gray-50 text-gray-500 py-4 rounded-2xl font-bold flex items-center justify-center gap-2 border border-gray-200"><i class="fas fa-image"></i> 相簿</button>
                    </div>
                    <input type="file" ref="cameraInput" accept="image/*" capture="environment" class="hidden" @change="submitMemberRegister">
                    <input type="file" ref="albumInput" accept="image/*" class="hidden" @change="submitMemberRegister">
                    <div class="text-center pt-4"><button @click="submitMemberRegister" :disabled="isSubmitting" class="text-sm text-gray-400 font-bold py-2 px-6">略過，直接進入系統</button></div>
                </div>
            </div>

            <!-- 3. 報名確認視圖 -->
            <div v-else-if="view === 'form'" class="p-6 animate-fade-in">
                <button @click="view='course_list'" class="mb-8 text-gray-400 flex items-center gap-2 text-sm font-medium"><i class="fas fa-chevron-left"></i> 返回課程列表</button>
                <div class="space-y-6">
                    <h3 class="font-bold text-xl text-gray-800 pb-2 border-b-2 border-[#06C755] inline-block">確認報名資訊</h3>
                    <div class="bg-gray-50 p-6 rounded-2xl">
                        <p class="text-[11px] text-gray-400 font-bold uppercase tracking-widest mb-2">Selected Course</p>
                        <h3 class="font-bold text-gray-800 text-[17px] mb-3 leading-snug">{{ selectedCourse.name }}</h3>
                        <p class="text-[#06C755] font-black text-2xl tracking-tighter">${{ selectedCourse.price }}</p>
                    </div>
                    <div>
                        <label class="input-label">報名備註 (選填)</label>
                        <textarea v-model="registrationNote" class="input-box min-h-[120px]" placeholder="如有特殊需求或需開立收據抬頭請告知"></textarea>
                    </div>
                    <button @click="submitRegistration" :disabled="isSubmitting" class="btn-primary mt-6">送出報名 ‧ 確認預約</button>
                </div>
            </div>

            <!-- 4. 成功訊息 -->
            <div v-else-if="view === 'success'" class="animate-fade-in flex flex-col items-center justify-center pt-24 px-10 text-center">
                <div class="w-24 h-24 bg-[#06C755] text-white rounded-full flex items-center justify-center text-4xl shadow-xl shadow-green-100 mb-8 animate-bounce"><i class="fas fa-check"></i></div>
                <h2 class="text-2xl font-bold mb-4 text-gray-800">報名申請已送出</h2>
                <p class="text-gray-400 mb-12">管理員將儘速審核您的報名，<br>請前往「報名紀錄」查看繳費資訊。</p>
                <button @click="view='course_list'" class="btn-primary max-w-[240px]">回到首頁</button>
            </div>
        </main>
    </div>

    <script>
        const { createApp, ref, computed, onMounted, watch } = Vue;
        const API_ENDPOINT = 'https://action.fangwl591021.workers.dev/';
        const LIFF_ID = '2009130603-vTHZv1LW';

        createApp({
            setup() {
                const view = ref('course_list');
                const regStep = ref(1);
                const error = ref('');
                const isSubmitting = ref(false);
                const isCoursesLoading = ref(false); // 追蹤課程載入狀態
                const userProfile = ref(null);
                const userInfo = ref({});
                const courses = ref([]);
                const regForm = ref({ name: '', industry: '', gender: '男', phone: '', birthday: '', area: '', address: '' });
                const selectedCourse = ref(null);
                const registrationNote = ref('');
                const expandedCategory = ref('');

                // 動態分類計算
                const dynamicCategories = computed(() => {
                    if (!courses.value || courses.value.length === 0) return [];
                    const types = [...new Set(courses.value.map(c => c.type))];
                    return types.map(t => ({ id: t, name: t }));
                });

                // 分類載入後自動選取第一個
                watch(dynamicCategories, (newVal) => {
                    if (newVal.length > 0 && !expandedCategory.value) {
                        expandedCategory.value = newVal[0].id;
                    }
                }, { immediate: true });

                const filteredCourses = computed(() => {
                    return courses.value.filter(c => c.type === expandedCategory.value);
                });

                const callApi = async (act, pl = {}) => {
                    const res = await fetch(API_ENDPOINT, { 
                        method: 'POST', 
                        body: JSON.stringify({ 
                            action: act, 
                            userProfile: { userId: userProfile.value.userId }, 
                            payload: pl 
                        }) 
                    });
                    const json = await res.json();
                    if (json.status !== 'success') throw new Error(json.message);
                    return json.data;
                };

                const loadCourses = async () => {
                    isCoursesLoading.value = true;
                    try { 
                        courses.value = await callApi('GET_COURSES'); 
                    } catch (e) { error.value = '課程載入失敗'; }
                    finally { isCoursesLoading.value = false; }
                };

                const init = async () => {
                    try {
                        await liff.init({ liffId: LIFF_ID });
                        if (!liff.isLoggedIn()) { liff.login(); return; }
                        userProfile.value = await liff.getProfile();
                        
                        // 1. 優先獲取用戶註冊狀態
                        const data = await callApi('CHECK_USER');
                        
                        if (data && data.registered) {
                            userInfo.value = data.info;
                            // 2. 確定註冊後立即切換至首頁 (Banner 會先出)
                            view.value = 'course_list';
                            // 3. 非同步載入後面的課程內容
                            loadCourses();
                        } else {
                            regForm.value.name = userProfile.value.displayName;
                            view.value = 'register';
                            regStep.value = 1;
                        }
                    } catch (err) { 
                        error.value = '連線異常，請重新進入。'; 
                    }
                };

                const submitMemberRegister = async () => {
                    isSubmitting.value = true;
                    try {
                        await callApi('REGISTER_USER', { userId: userProfile.value.userId, ...regForm.value });
                        const data = await callApi('CHECK_USER');
                        userInfo.value = data.info;
                        view.value = 'course_list';
                        await loadCourses();
                    } catch (e) { alert('儲存失敗'); } finally { isSubmitting.value = false; }
                };

                const submitRegistration = async () => {
                    isSubmitting.value = true;
                    try {
                        await callApi('REGISTER', { courseId: selectedCourse.value.id, userId: userProfile.value.userId, name: userInfo.value.name, phone: userInfo.value.phone, note: registrationNote.value, amount: selectedCourse.value.price });
                        view.value = 'success';
                    } catch (e) { alert(e.message); } finally { isSubmitting.value = false; }
                };

                onMounted(init);

                return {
                    view, regStep, error, isSubmitting, isCoursesLoading, userInfo, userProfile, courses, regForm, selectedCourse, registrationNote, expandedCategory, dynamicCategories, filteredCourses,
                    toggleCategory: (id) => expandedCategory.value = id,
                    editProfile: () => { regForm.value = { ...userInfo.value }; view.value = 'register'; regStep.value = 1; },
                    goToMyOrders: () => alert('紀錄查詢即將開放'),
                    selectCourse: (c) => { selectedCourse.value = c; view.value = 'form'; },
                    submitMemberRegister, submitRegistration
                };
            }
        }).mount('#app');
    </script>
</body>

</html>
