<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>人生進化ACTION</title>
    <!-- Version: 2026.04.29.V315_Restore_Banner_UI -->
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vue/3.3.4/vue.global.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        [v-cloak] { display: none !important; }
        body { background-color: #F4F4F4; color: #111111; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; -webkit-tap-highlight-color: transparent; overscroll-behavior-y: none; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        
        /* 簡潔的分類標籤 */
        .category-tab { white-space: nowrap; padding: 10px 16px; font-size: 14px; font-weight: bold; color: #888888; border-bottom: 2px solid transparent; transition: 0.2s; }
        .category-tab.active { color: #111111; border-bottom: 2px solid #111111; }
        
        /* 扁平化的課程卡片 */
        .course-card { background: #ffffff; border: 1px solid #EBEBEB; border-radius: 8px; overflow: hidden; display: flex; flex-direction: column; cursor: pointer; transition: background-color 0.2s; }
        .course-card:active { background-color: #F9F9F9; }
        
        /* 輕量級標籤 */
        .category-pill-orange { background: #FF5809; color: white; padding: 2px 6px; border-radius: 4px; font-size: 10px; display: inline-block; }
        
        /* 底部導覽列 */
        .nav-btn { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 33.33%; color: #AAAAAA; font-size: 10px; font-weight: bold; gap: 4px; }
        .nav-btn.active { color: #06C755; }
        .nav-btn i { font-size: 22px; }
        
        /* 動畫 */
        .slide-up-enter-active, .slide-up-leave-active { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .slide-up-enter-from, .slide-up-leave-to { transform: translateY(100%); }
        .animate-fade-in { animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Loader */
        .loader-spinner { width: 30px; height: 30px; border: 3px solid #EBEBEB; border-top: 3px solid #06C755; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="app" v-cloak class="max-w-md mx-auto min-h-screen bg-[#F4F4F4] flex flex-col relative pb-[60px]">
        
        <!-- 全局載入畫面 -->
        <div v-if="isLoading && !isInitialized && !liffErrorMsg" class="fixed inset-0 bg-white z-[100] flex flex-col items-center justify-center">
            <div class="loader-spinner mb-3"></div>
            <div class="text-[#888888] font-bold text-sm">{{ loadingText }}</div>
        </div>

        <!-- 致命錯誤防護面板 -->
        <div v-if="liffErrorMsg" class="flex-1 flex flex-col items-center justify-center p-6 text-center animate-fade-in h-screen bg-white">
            <i class="fas fa-exclamation-triangle text-red-500 text-5xl mb-4"></i>
            <h2 class="text-xl font-bold text-[#111111] mb-2">系統連線異常</h2>
            <p class="text-[#888888] text-sm mb-6">無法啟動 LINE 授權元件。<br>請稍後重試，或確認 LIFF ID 設定。</p>
            <div class="bg-[#F9F9F9] border border-[#EBEBEB] p-4 rounded-lg text-[#555555] font-mono text-[12px] text-left w-full break-all">
                <div class="text-[10px] text-[#AAAAAA] font-bold mb-1">錯誤訊息：</div>
                {{ liffErrorMsg }}
            </div>
            <button @click="retryInit" class="mt-6 px-6 py-2.5 bg-[#111111] text-white rounded-lg font-bold hover:bg-[#333333] transition">重新嘗試</button>
        </div>

        <template v-else-if="isInitialized">
            <!-- 🏠 1. 首頁 (退回單一標籤邏輯 + 恢復 BANNER) -->
            <div v-show="view === 'home'" class="flex-1 flex flex-col animate-fade-in bg-white">
                
                <!-- 頂部資訊列 (固定於上方) -->
                <div class="bg-white px-4 py-3 border-b border-[#EBEBEB] sticky top-0 z-30 flex justify-between items-center">
                    <div class="font-bold text-[#111111] text-lg">{{ userStatus.info?.name || '學員' }}</div>
                    <div @click="view = 'profile'" class="flex items-center gap-1.5 cursor-pointer">
                        <i class="fas fa-ticket-alt text-[#FF5809]"></i>
                        <span class="font-bold text-[#FF5809] text-[15px]">{{ formatPrice(userStatus.info?.points || 0) }} 點</span>
                    </div>
                </div>

                <!-- ========================================================== -->
                <!-- 🖼️ 原本設計的 BANNER 區塊 (為您恢復) -->
                <!-- ========================================================== -->
                <div class="w-full bg-white relative">
                    <!-- 預設比例為 21:9，您可以依據您原本 Banner 的高度調整 aspect ratio -->
                    <div class="w-full aspect-[21/9] bg-[#EBEBEB] relative overflow-hidden">
                        <!-- ⚠️ 請在此替換為您原本的 BANNER 圖片網址 -->
                        <img src="https://storage.googleapis.com/gweb-uniblog-publish-prod/images/image_dec3c0.max-1000x1000.png" alt="活動 Banner" class="w-full h-full object-cover">
                    </div>
                </div>

                <!-- 分類標籤列 (滾動到此處時會黏在資訊列下方) -->
                <div class="bg-white px-2 border-b border-[#EBEBEB] overflow-x-auto hide-scrollbar flex sticky top-[53px] z-20 shadow-sm">
                    <button v-for="cat in categories" :key="cat" @click="activeCategory = cat" class="category-tab" :class="{'active': activeCategory === cat}">
                        {{ cat }}
                    </button>
                </div>

                <!-- 課程清單 -->
                <div class="px-3 py-4 grid grid-cols-2 gap-3 bg-[#F4F4F4] min-h-[calc(100vh-160px)] content-start">
                    <div v-for="c in filteredCourses" :key="c.id" @click="openCourseDetail(c)" class="course-card">
                        <div class="w-full aspect-video bg-[#EBEBEB] relative border-b border-[#EBEBEB] shrink-0">
                            <!-- 單一標籤顯示 -->
                            <div class="absolute top-1.5 left-1.5 z-10 max-w-[95%]">
                                <span class="category-pill-orange">{{ String(c.type || '一般').trim() }}</span>
                            </div>
                            <img v-if="c.image" :src="c.image" class="absolute inset-0 w-full h-full object-cover">
                            <div v-else class="absolute inset-0 flex items-center justify-center text-[#AAAAAA]"><i class="far fa-image text-xl"></i></div>
                        </div>
                        <div class="p-2.5 flex flex-col flex-1">
                            <div class="text-[13px] font-bold text-[#111111] leading-snug mb-1 line-clamp-2">{{ String(c.name || '').split('\n')[0] }}</div>
                            <div class="text-[11px] text-[#888888] mb-2 flex-1">{{ c.startDate || '常態開放' }}</div>
                            <div class="text-[15px] font-bold text-[#06C755]">$ {{ formatPrice(c.price) }}</div>
                        </div>
                    </div>
                    
                    <div v-if="filteredCourses.length === 0" class="col-span-2 flex flex-col items-center justify-center text-[#AAAAAA] py-16">
                        <p class="font-bold text-sm">此分類目前無開放課程</p>
                    </div>
                </div>
            </div>

            <!-- 📄 2. 訂單紀錄 -->
            <div v-show="view === 'orders'" class="flex-1 flex flex-col animate-fade-in bg-white min-h-screen">
                <div class="px-4 py-3 border-b border-[#EBEBEB] sticky top-0 bg-white z-20">
                    <h2 class="text-lg font-bold text-[#111111]">報名紀錄</h2>
                </div>
                <div class="bg-[#F4F4F4] flex-1 pb-4">
                    <div v-for="o in orders" :key="o.orderId" class="bg-white border-b border-[#EBEBEB] p-4 mb-2">
                        <div class="flex justify-between items-center mb-2">
                            <div class="text-[12px] text-[#888888]">{{ String(o.createdAt || '') }}</div>
                            <div class="text-[12px] font-bold px-2 py-0.5 rounded-sm" :class="o.status === 'PAID' ? 'bg-[#EAF9EE] text-[#06C755]' : 'bg-[#FFF3EB] text-[#FF5809]'">
                                {{ o.status === 'PAID' ? '已完款' : '待付款' }}
                            </div>
                        </div>
                        <div class="font-bold text-[15px] text-[#111111] mb-2">{{ getCourseName(o.courseId) }}</div>
                        <div class="text-[13px] text-[#555555]">
                            <div class="flex justify-between mt-1"><span>訂單金額</span><span>$ {{ formatPrice(o.amount) }}</span></div>
                            <div class="flex justify-between mt-1 text-[#FF5809]" v-if="o.pointsUsed > 0"><span>紅包折抵</span><span>- {{ formatPrice(o.pointsUsed) }}</span></div>
                        </div>
                    </div>
                    <div v-if="orders.length === 0" class="text-center py-16 text-[#AAAAAA] font-bold text-sm">
                        目前沒有任何報名紀錄
                    </div>
                </div>
            </div>

            <!-- 👤 3. 會員中心 -->
            <div v-show="view === 'profile'" class="flex-1 flex flex-col animate-fade-in bg-[#F4F4F4] min-h-screen">
                <div class="px-4 py-3 border-b border-[#EBEBEB] sticky top-0 bg-white z-20">
                    <h2 class="text-lg font-bold text-[#111111]">會員與紅包資產</h2>
                </div>
                
                <div class="bg-white p-5 border-b border-[#EBEBEB] mb-2">
                    <div class="text-[#888888] font-bold text-[13px] mb-1">可用紅包點數</div>
                    <div class="text-3xl font-bold text-[#FF5809] mb-4">{{ formatPrice(userStatus.info?.points || 0) }}</div>
                    <button @click="dailyCheckin" :disabled="isCheckingIn" class="w-full py-2.5 bg-[#06C755] text-white rounded-lg font-bold text-sm hover:bg-[#05a647] disabled:opacity-50">
                        {{ isCheckingIn ? '領取中...' : '每日打卡領紅包' }}
                    </button>
                </div>

                <div class="bg-white p-5 border-b border-[#EBEBEB] mb-2">
                    <h3 class="text-[15px] font-bold text-[#111111] mb-2">專屬分享連結</h3>
                    <p class="text-[13px] text-[#888888] mb-4">好友透過此連結註冊，雙方皆可自動獲得紅包獎勵。</p>
                    <div class="flex justify-center mb-4 border border-[#EBEBEB] p-2 rounded-lg inline-block mx-auto">
                        <img :src="'https://chart.googleapis.com/chart?chs=150x150&cht=qr&chl=' + encodeURIComponent(shareUrl) + '&choe=UTF-8'" alt="QR Code" class="w-[120px] h-[120px]">
                    </div>
                    <div class="flex gap-2 mt-2">
                        <button @click="shareToFriend" class="flex-1 py-2.5 bg-[#111111] text-white rounded-lg font-bold text-sm flex items-center justify-center gap-2">
                            <i class="fab fa-line text-lg"></i> 傳送給好友
                        </button>
                        <button @click="copyShareUrl" class="px-4 py-2.5 bg-[#F4F4F4] text-[#111111] rounded-lg font-bold text-sm">複製</button>
                    </div>
                </div>

                <div class="bg-white p-5 border-b border-[#EBEBEB] mb-2">
                    <div class="flex justify-between items-center mb-3">
                        <h3 class="text-[15px] font-bold text-[#111111]">成功邀請名單</h3>
                        <span class="text-[13px] font-bold text-[#888888]">{{ userStatus.referrals?.length || 0 }} 人</span>
                    </div>
                    <div class="space-y-0">
                        <div v-for="(r, index) in userStatus.referrals" :key="r.id || index" class="py-2.5 border-b border-[#F4F4F4] flex justify-between items-center last:border-0">
                            <div class="font-bold text-[14px] text-[#333333]">{{ String(r.name || '') }}</div>
                            <div class="text-[12px] text-[#AAAAAA]">{{ String(r.date || '') }}</div>
                        </div>
                        <div v-if="!userStatus.referrals || userStatus.referrals.length === 0" class="text-center py-4 text-[#AAAAAA] font-bold text-[13px]">尚無紀錄</div>
                    </div>
                </div>

                <div class="bg-white border-b border-[#EBEBEB]">
                    <div @click="showPointsLog = !showPointsLog" class="p-5 flex justify-between items-center cursor-pointer active:bg-[#F9F9F9]">
                        <h3 class="text-[15px] font-bold text-[#111111]">點數異動明細</h3>
                        <i class="fas text-[#AAAAAA]" :class="showPointsLog ? 'fa-chevron-up' : 'fa-chevron-down'"></i>
                    </div>
                    <div v-show="showPointsLog" class="px-5 pb-5">
                        <div class="space-y-0 border-t border-[#F4F4F4] pt-2">
                            <div v-for="(p, idx) in pointsLog" :key="idx" class="py-2.5 border-b border-[#F4F4F4] flex justify-between items-center last:border-0">
                                <div>
                                    <div class="text-[13px] font-bold text-[#333333] mb-0.5">{{ String(p.reason || '') }}</div>
                                    <div class="text-[11px] text-[#AAAAAA]">{{ String(p.createdAt || '') }}</div>
                                </div>
                                <div class="font-bold text-[14px]" :class="p.amount > 0 ? 'text-[#06C755]' : 'text-[#111111]'">
                                    {{ p.amount > 0 ? '+' : '' }}{{ formatPrice(p.amount) }}
                                </div>
                            </div>
                            <div v-if="pointsLog.length === 0" class="text-center py-4 text-[#AAAAAA] font-bold text-[13px]">尚無明細</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 📖 課程詳細介紹頁面 -->
            <transition name="slide-up">
                <div v-if="view === 'courseDetail' && selectedCourse" class="fixed inset-0 bg-white z-[60] flex flex-col overflow-hidden">
                    <div class="h-[50px] bg-white border-b border-[#EBEBEB] flex items-center px-4 sticky top-0 z-50">
                        <button @click="view = 'home'" class="p-2 -ml-2 text-[#111111]"><i class="fas fa-chevron-left text-lg"></i></button>
                        <h2 class="ml-2 font-bold text-[16px] text-[#111111] truncate w-full">{{ String(selectedCourse.name || '').split('\n')[0] }}</h2>
                    </div>
                    
                    <div class="flex-1 overflow-y-auto pb-[80px] bg-[#F4F4F4]">
                        <div class="w-full aspect-video bg-[#EBEBEB] relative shrink-0">
                            <img v-if="selectedCourse.image" :src="selectedCourse.image" class="absolute inset-0 w-full h-full object-cover">
                        </div>

                        <div class="p-5 bg-white mb-2 border-b border-[#EBEBEB]">
                            <div class="mb-2">
                                <span class="category-pill-orange !text-[11px] !px-2 !py-0.5">{{ String(selectedCourse.type || '一般').trim() }}</span>
                            </div>
                            <h2 class="text-[18px] font-bold text-[#111111] leading-snug mb-3">{{ String(selectedCourse.name || '') }}</h2>
                            <div class="flex items-end gap-2">
                                <span class="text-xl font-bold text-[#06C755]">$ {{ formatPrice(selectedCourse.price) }}</span>
                                <span v-if="selectedCourse.priceText" class="text-xs text-[#888888] font-bold mb-1">{{ String(selectedCourse.priceText || '') }}</span>
                            </div>
                        </div>

                        <div class="p-5 bg-white mb-2 border-y border-[#EBEBEB] space-y-3">
                            <div class="flex items-center gap-3">
                                <i class="far fa-calendar-alt text-[#AAAAAA] w-5 text-center text-lg"></i>
                                <div class="text-[14px] text-[#333333]"><span class="text-[#888888] mr-2 text-[13px]">時間</span>{{ String(selectedCourse.startDate || '常態開放') }}</div>
                            </div>
                            <div class="flex items-center gap-3" v-if="selectedCourse.instructor">
                                <i class="fas fa-chalkboard-teacher text-[#AAAAAA] w-5 text-center text-lg"></i>
                                <div class="text-[14px] text-[#333333]"><span class="text-[#888888] mr-2 text-[13px]">導師</span>{{ String(selectedCourse.instructor || '') }}</div>
                            </div>
                            <div class="flex items-center gap-3" v-if="selectedCourse.location">
                                <i class="fas fa-map-marker-alt text-[#AAAAAA] w-5 text-center text-lg"></i>
                                <div class="text-[14px] text-[#333333]"><span class="text-[#888888] mr-2 text-[13px]">地點</span>{{ String(selectedCourse.location || '') }}</div>
                            </div>
                        </div>

                        <div class="p-5 bg-white border-t border-[#EBEBEB]">
                            <h3 class="text-[15px] font-bold text-[#111111] mb-3">詳細介紹</h3>
                            <div class="text-[14px] text-[#555555] leading-relaxed whitespace-pre-wrap">{{ String(selectedCourse.description || '暫無詳細說明') }}</div>
                        </div>
                    </div>

                    <div class="absolute bottom-0 left-0 w-full bg-white border-t border-[#EBEBEB] p-3 pb-[max(env(safe-area-inset-bottom),12px)]">
                        <button @click="openCheckout" class="w-full py-3 bg-[#06C755] text-white rounded-lg font-bold text-[15px] hover:bg-[#05a647] transition">
                            前往報名結帳
                        </button>
                    </div>
                </div>
            </transition>

            <!-- 💳 結帳確認頁面 -->
            <transition name="slide-up">
                <div v-if="showCheckout" class="fixed inset-0 bg-white z-[70] flex flex-col">
                    <div class="h-[50px] bg-white border-b border-[#EBEBEB] flex items-center px-4 sticky top-0">
                        <button @click="showCheckout = false" class="p-2 -ml-2 text-[#111111]"><i class="fas fa-times text-lg"></i></button>
                        <h2 class="ml-2 font-bold text-[16px] text-[#111111]">結帳明細</h2>
                    </div>
                    
                    <div class="flex-1 overflow-y-auto p-5 bg-[#F4F4F4]">
                        <div class="bg-white rounded-lg border border-[#EBEBEB] p-4 mb-4">
                            <div class="text-[12px] text-[#888888] mb-1">報名項目</div>
                            <div class="text-[15px] font-bold text-[#111111] mb-4 leading-snug">{{ String(selectedCourse?.name || '').split('\n')[0] }}</div>
                            <div class="h-px bg-[#EBEBEB] w-full mb-3"></div>
                            
                            <div class="space-y-2">
                                <div class="flex justify-between items-center text-[14px]">
                                    <span class="text-[#555555]">課程金額</span><span class="font-bold">$ {{ formatPrice(selectedCourse?.price || 0) }}</span>
                                </div>
                                <div class="flex justify-between items-center text-[14px]">
                                    <span class="text-[#FF5809]">紅包折抵 <span class="text-[10px] bg-[#FFF3EB] px-1.5 py-0.5 rounded ml-1">{{ discountRuleText }}</span></span>
                                    <span class="font-bold text-[#FF5809]">- {{ formatPrice(calculatedDiscount) }} 點</span>
                                </div>
                            </div>
                        </div>

                        <div class="bg-white rounded-lg border border-[#EBEBEB] p-4 flex justify-between items-center">
                            <span class="text-[#111111] text-[14px] font-bold">實際應付總額</span>
                            <span class="font-bold text-xl text-[#06C755]">$ {{ formatPrice(finalPayAmount) }}</span>
                        </div>
                    </div>

                    <div class="bg-white p-3 border-t border-[#EBEBEB] pb-[max(env(safe-area-inset-bottom),12px)]">
                        <button @click="submitOrder" :disabled="isSubmittingOrder" class="w-full py-3 rounded-lg font-bold text-[15px] transition flex justify-center items-center gap-2" :class="finalPayAmount === 0 ? 'bg-[#111111] text-white hover:bg-[#333333]' : 'bg-[#06C755] text-white hover:bg-[#05a647]'">
                            <i v-if="isSubmittingOrder" class="fas fa-spinner fa-spin"></i>
                            <template v-else>
                                {{ finalPayAmount === 0 ? '確認報名 (全額抵扣)' : '前往線上刷卡' }}
                            </template>
                        </button>
                    </div>
                </div>
            </transition>

            <!-- 底部導覽列 -->
            <nav class="fixed bottom-0 left-0 w-full bg-white border-t border-[#EBEBEB] flex justify-between items-center pb-[env(safe-area-inset-bottom)] z-40 h-[60px]">
                <button @click="view = 'home'" class="nav-btn" :class="{'active': view === 'home'}"><i class="fas fa-list-ul"></i>探索</button>
                <button @click="view = 'orders'" class="nav-btn" :class="{'active': view === 'orders'}"><i class="far fa-file-alt"></i>訂單</button>
                <button @click="view = 'profile'" class="nav-btn" :class="{'active': view === 'profile'}"><i class="far fa-user"></i>我的</button>
            </nav>
        </template>
    </div>

    <!-- Vue 3 邏輯 -->
    <script>
        const { createApp, ref, computed, onMounted } = Vue;
        const WORKER_URL = 'https://action.fangwl591021.workers.dev/';

        createApp({
            setup() {
                const isInitialized = ref(false);
                const isLoading = ref(true);
                const loadingText = ref('系統載入中...');
                const liffErrorMsg = ref(''); 
                
                const isCheckingIn = ref(false);
                const isSubmittingOrder = ref(false);
                const view = ref('home'); 
                const activeCategory = ref('全部');
                
                const userStatus = ref({ registered: false, info: null, referrals: [] });
                const courses = ref([]);
                const orders = ref([]);
                const pointsLog = ref([]);
                const showPointsLog = ref(false);
                
                const selectedCourse = ref(null);
                const showCheckout = ref(false);

                // API 共用模組
                const callApi = async (action, payload = {}, silent = false) => {
                    if (!silent) isLoading.value = true;
                    try {
                        const liffToken = liff.isLoggedIn() ? liff.getAccessToken() : 'DUMMY_TOKEN';
                        const res = await fetch(WORKER_URL, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${liffToken}` },
                            body: JSON.stringify({ action, payload })
                        });
                        const json = await res.json();
                        if (json.status !== 'success') throw new Error(json.message);
                        return json.data;
                    } catch (e) {
                        if (!silent) alert(`連線錯誤: ${e.message}`);
                        return null;
                    } finally {
                        if (!silent) isLoading.value = false;
                    }
                };

                // ✅ 保留：序列化請求解決 GAS 並發鎖定，不空轉。
                const initLiffAndFetch = async () => {
                    try {
                        isLoading.value = true;
                        liffErrorMsg.value = '';
                        loadingText.value = '連線至伺服器...';
                        let liffId = '2009130603-RYWWBxUf'; // ✅ 正確的 LIFF ID
                        
                        try {
                            const controller = new AbortController();
                            const timeoutId = setTimeout(() => controller.abort(), 5000); 
                            const liffIdRes = await fetch(WORKER_URL, { method: 'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ action: 'GET_LIFF_ID' }), signal: controller.signal });
                            clearTimeout(timeoutId);
                            if (liffIdRes.ok) {
                                const liffIdData = await liffIdRes.json();
                                if (liffIdData && liffIdData.data && liffIdData.data.liffId) liffId = liffIdData.data.liffId;
                            }
                        } catch(e) { console.warn("無法取得伺服器設定，啟用預設值。"); }

                        try {
                            await liff.init({ liffId });
                        } catch(e) {
                            liffErrorMsg.value = `LINE 模組啟動失敗\n使用的 ID: ${liffId}\n錯誤詳情: ${e.message}`;
                            return; 
                        }

                        if (!liff.isLoggedIn()) { 
                            loadingText.value = '正在喚起 LINE 授權...';
                            liff.login(); 
                            setTimeout(() => { liffErrorMsg.value = "LINE 登入無回應。請確保在 LINE 內部開啟。"; }, 3000);
                            return; 
                        }
                        
                        const profile = await liff.getProfile();
                        const urlParams = new URLSearchParams(window.location.search);
                        const refCode = urlParams.get('ref');
                        if (refCode) localStorage.setItem('referral_uid', refCode);

                        // ⚠️ 依序執行，避免死鎖
                        loadingText.value = '讀取會員資料...';
                        const checkRes = await callApi('CHECK_USER', { userId: profile.userId, _t: Date.now() }, true);
                        
                        loadingText.value = '整理最新課程...';
                        const cData = await callApi('GET_COURSES', { _t: Date.now() }, true);
                        
                        loadingText.value = '結算歷史訂單...';
                        const oData = await callApi('GET_USER_ORDERS', { userId: profile.userId, _t: Date.now() }, true);
                        
                        loadingText.value = '更新紅包點數...';
                        const pData = await callApi('GET_USER_POINTS', { userId: profile.userId, _t: Date.now() }, true);

                        if (!checkRes || !cData) throw new Error("伺服器無回應或發生壅塞，請稍後重試。");

                        userStatus.value = checkRes;
                        courses.value = cData;
                        if (oData) orders.value = oData;
                        if (pData) pointsLog.value = pData;

                        if (!userStatus.value.registered) {
                            loadingText.value = '建立新檔案...';
                            const savedRef = localStorage.getItem('referral_uid') || '';
                            const regRes = await callApi('REGISTER_USER', { userId: profile.userId, name: profile.displayName, pictureUrl: profile.pictureUrl, referrerUid: savedRef }, true);
                            if (regRes) {
                                userStatus.value.registered = true;
                                userStatus.value.info = regRes.info;
                                alert("系統註冊成功，歡迎加入！");
                            }
                        }
                        isInitialized.value = true;
                    } catch (e) {
                        liffErrorMsg.value = `載入異常: ${e.message}`;
                    } finally {
                        isLoading.value = false;
                    }
                };

                const retryInit = () => { initLiffAndFetch(); };
                const formatPrice = (p) => Number(p).toLocaleString();
                const getCourseName = (id) => { const c = courses.value.find(x => String(x.id) === String(id)); return c ? String(c.name || '').split('\n')[0] : String(id); };

                const dailyCheckin = async () => {
                    isCheckingIn.value = true;
                    const res = await callApi('DAILY_CHECKIN', { userId: userStatus.value.info.userId });
                    if (res && res.success) {
                        alert(`打卡成功！獲得 ${res.earned} 點紅包。`);
                        userStatus.value.info.points = res.newBalance;
                        const pData = await callApi('GET_USER_POINTS', { userId: userStatus.value.info.userId, _t: Date.now() }, true);
                        if (pData) pointsLog.value = pData;
                    } else if (res && !res.success) {
                        alert(res.message || "今日已打卡過了喔！");
                    }
                    isCheckingIn.value = false;
                };

                const shareUrl = computed(() => {
                    const liffBase = liff.getContext() ? `https://liff.line.me/${liff.getContext().liffId}` : window.location.href.split('?')[0];
                    return `${liffBase}?ref=${userStatus.value.info?.referCode || userStatus.value.info?.userId || ''}`;
                });
                
                const shareToFriend = () => {
                    if (liff.isApiAvailable('shareTargetPicker')) {
                        liff.shareTargetPicker([{
                            type: "flex",
                            altText: `${userStatus.value.info?.name} 邀請您加入人生進化ACTION`,
                            contents: {
                                type: "bubble",
                                hero: { type: "image", url: "https://storage.googleapis.com/gweb-uniblog-publish-prod/images/image_dec3c0.max-1000x1000.png", size: "full", aspectRatio: "16:9", aspectMode: "cover" },
                                body: { type: "box", layout: "vertical", contents: [
                                    { type: "text", text: "人生進化ACTION", weight: "bold", size: "xl", color: "#06C755" },
                                    { type: "text", text: "專屬邀請福利發送中！立即註冊領取迎新紅包，開始你的進化之旅。", margin: "md", wrap: true, color: "#666666", size: "sm" }
                                ]},
                                footer: { type: "box", layout: "vertical", spacing: "sm", contents: [
                                    { type: "button", style: "primary", color: "#06C755", height: "sm", action: { type: "uri", label: "點此領取紅包", uri: shareUrl.value } }
                                ]}
                            }
                        }]).then(res => { if(res) alert("已成功傳送邀請卡！"); }).catch(err => console.error(err));
                    } else { alert("您的裝置不支援此分享功能，請使用複製連結。"); }
                };
                
                const copyShareUrl = () => { navigator.clipboard.writeText(shareUrl.value).then(() => alert("專屬邀請連結已複製！")); };

                const openCourseDetail = (c) => { selectedCourse.value = c; view.value = 'courseDetail'; };
                const openCheckout = () => { showCheckout.value = true; };
                
                const calculatedDiscount = computed(() => {
                    if (!selectedCourse.value || !userStatus.value.info) return 0;
                    const price = Number(selectedCourse.value.price) || 0;
                    const balance = Number(userStatus.value.info.points) || 0;
                    const rule = selectedCourse.value.discountRule;
                    
                    let maxDiscount = 0;
                    if (rule === 'RULE_A') maxDiscount = Math.floor(price * 0.2);
                    else if (rule === 'RULE_B') maxDiscount = Math.floor(price * 0.5);
                    else if (rule === 'RULE_C') maxDiscount = price; 
                    else return 0;

                    return Math.min(balance, maxDiscount, price);
                });
                
                const finalPayAmount = computed(() => { return Math.max(0, (Number(selectedCourse.value?.price) || 0) - calculatedDiscount.value); });
                const discountRuleText = computed(() => {
                    const rule = selectedCourse.value?.discountRule;
                    if (rule === 'RULE_A') return '最高20%';
                    if (rule === 'RULE_B') return '最高50%';
                    if (rule === 'RULE_C') return '全額抵';
                    return '不可折抵';
                });

                const submitOrder = async () => {
                    isSubmittingOrder.value = true;
                    try {
                        const payload = {
                            userId: userStatus.value.info.userId,
                            courseId: selectedCourse.value.id,
                            courseName: selectedCourse.value.name,
                            price: selectedCourse.value.price,
                            pointsUsed: calculatedDiscount.value,
                            finalAmount: finalPayAmount.value,
                            userName: userStatus.value.info.name,
                            userPhone: userStatus.value.info.phone || ''
                        };

                        const res = await callApi('CREATE_ORDER', payload);
                        if (res && res.success) {
                            alert("報名已受理！");
                            showCheckout.value = false;
                            view.value = 'orders';
                            const oData = await callApi('GET_USER_ORDERS', { userId: userStatus.value.info.userId, _t: Date.now() }, true);
                            const pData = await callApi('GET_USER_POINTS', { userId: userStatus.value.info.userId, _t: Date.now() }, true);
                            if (oData) orders.value = oData;
                            if (pData) pointsLog.value = pData;
                            
                            if (userStatus.value.info) userStatus.value.info.points -= calculatedDiscount.value;
                        }
                    } catch (e) {
                        alert("報名失敗: " + e.message);
                    } finally {
                        isSubmittingOrder.value = false;
                    }
                };

                onMounted(() => { initLiffAndFetch(); });

                return {
                    isInitialized, isLoading, loadingText, liffErrorMsg, isCheckingIn, isSubmittingOrder, view, userStatus, courses, orders, pointsLog, showPointsLog,
                    activeCategory, selectedCourse, showCheckout, retryInit, formatPrice, getCourseName, dailyCheckin, openCourseDetail, openCheckout,
                    calculatedDiscount, finalPayAmount, discountRuleText, submitOrder,
                    
                    // ✅ 退回單一標籤的簡單去重邏輯
                    categories: computed(() => {
                        const tabSet = new Set();
                        courses.value.forEach(c => {
                            const t = String(c.type || '一般').trim();
                            if (t) tabSet.add(t);
                        });
                        const order = ['全部', '會員', '喚醒階', '蛻變階', '完整階', '一般'];
                        const currentTags = Array.from(tabSet);
                        const sortedTabs = order.filter(t => t === '全部' || currentTags.includes(t));
                        currentTags.forEach(t => { if (!order.includes(t)) sortedTabs.push(t); });
                        return sortedTabs;
                    }),
                    
                    // ✅ 退回單一標籤的比對邏輯
                    filteredCourses: computed(() => {
                        return courses.value.filter(c => {
                            if (c.isPublished === false) return false;
                            if (activeCategory.value === '全部') return true;
                            return String(c.type || '一般').trim() === activeCategory.value;
                        });
                    }),
                    shareUrl, shareToFriend, copyShareUrl
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
