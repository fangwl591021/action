<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>人生進化三部曲</title>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vue/3.3.4/vue.global.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    </head>

<body class="text-gray-900 bg-slate-50">
    <div id="app" v-cloak class="max-w-md mx-auto min-h-screen flex flex-col relative bg-slate-50 shadow-lg overflow-hidden">
        
        <header v-if="view !== 'course_detail' && view !== 'calendar'" class="bg-[#06C755] text-white px-4 py-3 sticky top-0 z-50 flex items-center shadow-sm">
            <h1 class="text-lg font-bold mr-auto">人生進化三部曲</h1>
            
            <button v-if="isAdmin" @click="goToAdmin" class="mr-3 bg-black/15 hover:bg-black/25 text-white text-[12px] font-bold px-2.5 py-1.5 rounded-full transition border border-white/20">
                <i class="fas fa-cog mr-1"></i> 後台
            </button>

            <button v-if="!isLoggedIn && !isLiffLoading" @click="handleLiffLogin" class="bg-white text-[#06C755] text-[12px] font-bold px-3 py-1.5 rounded-full shadow-sm">
                LINE 登入
            </button>

            <div v-else-if="userInfo.name" class="flex items-center gap-2 bg-black/10 pl-1 pr-3 py-1 rounded-full border border-white/10 shadow-inner">
                <img v-if="userProfile && userProfile.pictureUrl" :src="userProfile.pictureUrl" class="w-7 h-7 rounded-full object-cover border border-white/40 shadow-sm">
                <div class="flex flex-col justify-center">
                    <span class="text-xs font-bold leading-none mb-0.5">{{ userInfo.name }}</span>
                    <span class="text-[10px] text-[#06C755] bg-white font-bold leading-none px-1.5 py-0.5 rounded">{{ userInfo.memberTier || '一般會員' }}</span>
                </div>
            </div>
        </header>

        <div v-if="isLiffLoading" class="fixed inset-0 bg-white z-[60] flex flex-col items-center justify-center">
            <i class="fas fa-circle-notch fa-spin text-4xl text-[#06C755] mb-4"></i>
            <div class="text-slate-500 font-bold text-sm">WEB 系統載入中...</div>
        </div>

        <main v-if="!isLiffLoading" class="flex-grow pb-20 overflow-y-auto bg-white">
            </main>
    </div>

    <script>
        const { createApp, ref, computed, onMounted } = Vue;
        const WORKER_URL = 'https://action.fangwl591021.workers.dev/';

        createApp({
            setup() {
                const view = ref('course_list'); 
                const isLoadingCourses = ref(true); 
                const isLiffLoading = ref(true);    
                const isLoggedIn = ref(false);
                const userProfile = ref(null); 
                const userInfo = ref({}); 
                const courses = ref([]); 
                const sysSettings = ref({ liff_id: '' });
                const currentBrand = ref('DEFAULT');

                const callApi = async (act, pl = {}) => {
                    try {
                        const res = await fetch(WORKER_URL, { 
                            method: 'POST', 
                            headers: { 'Content-Type': 'application/json' }, 
                            body: JSON.stringify({ 
                                action: act, 
                                userProfile: { userId: userProfile.value?.userId }, 
                                payload: { ...pl, brand: currentBrand.value } // 🚀 傳遞品牌識別
                            }) 
                        });
                        const json = await res.json();
                        if (json.status !== 'success') throw new Error(json.message);
                        return json.data;
                    } catch (e) {
                        alert("☁️ 伺服器冷啟動中，請再點一次即可載入！");
                        return null;
                    }
                };

                const handleLiffLogin = () => {
                    liff.login({ redirectUri: window.location.href });
                };

                onMounted(async () => {
                    const urlParams = new URLSearchParams(window.location.search);
                    currentBrand.value = urlParams.get('brand') || 'DEFAULT';

                    // 1. 取得後台設定
                    const settingsData = await callApi('GET_SETTINGS');
                    if (settingsData) sysSettings.value = settingsData;

                    const targetLiffId = (sysSettings.value.liff_id || '').trim();
                    if (!targetLiffId) {
                        alert("⚠️ 尚未設定 LIFF ID");
                        isLiffLoading.value = false;
                        return;
                    }

                    // 2. 初始化 LIFF (核心：WEB 相容模式)
                    try {
                        await liff.init({ liffId: targetLiffId });
                        if (liff.isLoggedIn()) {
                            isLoggedIn.value = true;
                            userProfile.value = await liff.getProfile();
                            const checkData = await callApi('CHECK_USER');
                            if (checkData && checkData.registered) {
                                userInfo.value = checkData.info;
                            }
                        }
                    } catch (err) {
                        console.warn("WEB 模式登入跳過", err.message);
                    } finally {
                        await loadCourses();
                        isLiffLoading.value = false;
                    }
                });

                const loadCourses = async () => {
                    const data = await callApi('GET_COURSES');
                    if (data) courses.value = data;
                    isLoadingCourses.value = false;
                };

                // 原有其餘 Vue logic 略，保持與 V102 一致
                return { 
                    view, isLiffLoading, isLoggedIn, userInfo, userProfile, sysSettings, 
                    handleLiffLogin, switchView: (v) => view.value = v 
                    // ... 其餘 return 略
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
